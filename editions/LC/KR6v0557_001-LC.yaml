body:
  text: 前言呂澂居士的生平與學術成就一小傳呂澂大師是江蘇省丹陽縣人字秋逸又字秋一鷲子出生於光緒二十二年一八九六年輕時曾肄業於常州高等實業學校農科後又入南京民國大學就讀經濟系十九歲時曾到日本專攻美術翌年一九一六回國出任劉海粟的上海專科學校教務長這時他才不過二十歲從上面的履歷可以看出呂澂早年涉獵的學術層面頗廣他先後曾讀過農科與經濟對美學也曾刻意鑽研台灣佛學界的一般人也許多少曾讀過他的佛學著作但是大概很少人知道在美學方面他也出版過不少書他曾經撰有美學概論美學淺說現代美學思潮西洋美術史四部書問世在學術領域裡農科經濟與美學這三者都與佛學沾不上邊但是到後來呂澂卻完全捨棄這三者而一意研究佛學呂澂在十四歲時開始自修內典十八歲一九一四時到南京金陵刻經處的佛學研究部隨歐陽漸學佛學這是他一生生命的重要轉捩點從此唯識學大師歐陽漸得到一位超敏縝密歐陽漸語的傳人而呂澂一生中的後面七十五年也從此奉獻在佛學研究領域裡呂澂在二十二歲那年一九一八開始協助歐陽漸籌辦支那內學院四年後該院成立他也專駐該院以襄佐其師到歐陽逝世後呂澂曾先後出任該院的教務長及院長等職中共政權成立後他續掌院務到一九五二年該院停辦為止此外在世俗職務方面他也曾擔任中共中國科學院哲學社會科學部後改名為中國社會科學院委員及中國佛教協會常務理事等職一九六一年呂澂接受中國科學院哲學社會科學部委託在南京開辦一個為期五年的佛學班他在該院所授的課程後來被整理成書的有中國佛學源流略講印度佛學源流略講與因明入正理論講解等書此外在一九六三年他還編了一部新編漢文大藏經目錄這四部書加上若干篇論文是他在中共政權成立後的所有著述成果大陸的文革似乎為呂澂的佛學著述活動劃下休止符因為從文革開始以後他就不曾有過新著問世文革之初呂澂的年齡大約七十歲這是人文學者思想趨於圓熟的年齡加上他的身體還算健康到九十一歲時還曾向訪者自謂耳聰目明且能研討佛學問題可見他在七十歲時是肯定有著述能力的可惜從那時開始即告封筆中國大陸佛教研究界的第一碩學有二十餘年不著一字實在是學術界的一件憾事從一九七一年起呂澂即卜居於清華大學的清華園住在他那執教於清華大學的兒子家中直到去世為止他的著述在文革過後先後曾由他的學生加以整理出版其中較早的有談壯飛整理的印度佛學源流略講與中國佛學源流略講張春波整理的因明入正理論講解其後李安又將上述這三書併入呂澂佛學論著選集之中於一九九一年由山東齊魯書社出版這部選集雖然不能盡收呂澂的畢生著述但卻是目前所能看到的呂澂著述集中內容最豐富的一部二佛學著述呂澂研佛時間早加上通曉英日梵藏巴利等多種文字因此其學術工具之多與研究領域之廣在我國佛學界無人堪與比擬其著述在呂澂佛學論著選集出版之前即已印行成書者共有下列幾種一譯介類佛學研究法印度佛教史略佛典泛論等三書二印度佛學類印度佛學源流略講三中國佛學類中國佛學源流略講四西藏佛學類西藏佛學原論五因明聲明類因明綱要因明入正理論講解聲明略六目錄學類新編漢文大藏經目錄至於單篇論文除有二十幾篇收在印度中國二部略講等書中作為附錄之外其餘多刊載在各期刊之中其後則被收入選集之內在台灣另外還有二本上列諸文的選輯其一是呂澂選集另一是呂澂文集前者收在現代佛學大系第五十一冊後者則為單行本在上列諸書中最具份量而且較能看出呂澂的功力的是印度佛學源流略講與中國佛學源流略講二書此外譯介類三書常被誤為呂氏的著作其實只是編譯及增訂而已其中佛學研究法與佛典泛論分別取材自日人深浦正文的佛教研究法與佛教聖典概論而印度佛教史略則大體取自荻原雲來的印度之佛教關於這些書的原始取材呂氏都曾在序文或卷末書目中加以說明因此只能把他們視為譯介不能視之為呂氏的重要著作大陸的中國大百科全書宗教編將這三書也一併歸為呂氏的主要佛學著作是不恰當的從上列呂氏的著作表可以看出其治學領域廣泛地涵蓋了印度包含南傳中國與西藏的三系佛學事實上他不祇深入這三系佛學的義理大海而且對梵藏佛典的對勘與版本目錄等文獻學也極為精審在因明學研究方面他也是開風氣之先的啟蒙大師從他的佛學深度廣度與語文來看他是最有資格睥睨於當代國際佛學界的我國學人三學術成就關於呂澂的學術成就可以從他本人所撰內學院研究工作的總結和計劃一文中摘錄出來該文所提到的雖然是所有支那內學院的綜合成果但是其中有好幾項正是呂澂本人的重要學術業績這幾項是一在玄奘所譯瑜伽論最後二十卷裡發現了引用全部雜阿含經本母這是連玄奘本人也未嘗知道的因此明白了瑜伽一系學說的真正來源並連帶訂正了翻譯以後便弄紊亂的雜阿含經雜阿含經刊定記據旅居日本的友人傳述有一年在日本的一次佛教學術會議裡北海道大學教授向井亮也曾提出類似呂澂的看法當他被指出這一事實早在六十幾年前已經被呂澂發現時曾撰文表示無限的唏噓與嗟嘆二認清了梵藏本唯識論書的文義自成一系跟玄奘所傳的迥然不同因而確定了唯識古今學說分歧之所在詳見內學第三輯所載安慧三十唯識釋略抄引言三匯萃漢藏梵文所有的資料並參酌時人已得的結論對於佛學縱面的思想源流徹底作了一番考訂著有諸家戒本通論佛學七宗源流十講等這樣刊定了印度時代佛學的實際地位和它們理論的確詁而建立起學說史的標準再據以返觀我國所傳的各說就容易發現它們和印度原本的距離其間更見出有相反的趨勢像流傳很久的起信論楞嚴經一類返本歸元的思想都決定是國人錯解義理而偽託為佛家之言我們曾毫不容情地予以破斥見楞伽與起信楞嚴百偽等論文又由此一貫錯誤的思想影響到禪宗方面構成本覺異說我們也都完全揭發它出來見禪學述原還有西藏所傳顯密各宗學說之是非我們也作了一番全般的批判見西藏佛學原論略論西藏佛學之傳承藏密三書導言等這都是為要做到真正佛學的實踐而來掃除一切的障礙除了上述三項之外如前文所述呂氏對於因明學的弘揚與研究也有為時人所不及的成績他對勘因明論書之藏漢譯本校正不少窺基因明入正理論疏的謬誤而且也譯出若干因明學名著如因明抉擇論集量論釋略抄等對因明學的闡釋是有一定成績的此外對於漢文大藏經目錄他也曾重分大乘經的部類校覈譯本與譯者在佛典目錄學上也有突破性的創見至於對部派佛教的研究業績迄今為止也罕有國人能與相擬他在印度佛學源流略講書中所附錄的七篇關於部派佛教研究的文章也是民國以來最具深度的同類著述綜合地看呂澂的學術地位及成就可以從下列幾方面來衡量一對於十九世紀以來歐美所盛行的新穎的佛學研究法亦即以文獻學歷史學哲學等等各類學術方法及學術態度去研究佛教的方法呂澂有完整而深入的理解他是將這種研究態度與方法介紹給中國佛學界並且本身的成就也最大的中國學人我們也可以說呂澂是這種新式佛教研究在中國的主要奠基者二呂澂的佛學研究不唯功力深厚而且所涉及的領域也至為廣博從他的著作來分類他在佛書版本及辨偽印度原典的研究與迻譯因明與聲明戒律西藏佛教印度佛教中國佛教等方面都有卓越的成績在所有佛教研究領域裡如果綜合起來衡量在廣度與深度上他可以說是二十世紀中國佛學界的第一人三在學術創見方面除了前面所提及的學術發現之外呂澂的大部份論文其實或多或少都有發人所未發言人所未言之處而綜合性的創見與對中印佛學融貫疏解則表現在他那兩部講稿印度佛學源流略講與中國佛學源流略講之中尤其印度佛學源流略講一書更大體可以展示其一生主要佛學功力之所繫該書大陸版的編輯說明中曾扼要地舉出全書的精華所在及呂澂的主要研究成果這段文字可以使讀者對呂澂的學術功力有初步的理解其文略云本書把印度佛學分為原始佛學部派佛學初期大乘佛學小乘佛學中期大乘佛學晚期大乘佛學等六個階段作者根據漢文藏文的大量文獻對勘巴利文三藏以及現存的有關梵文原典按照各階段出現的典籍先後順序說明它們各時期學說的特點和變化對印度佛學一千五百年的歷史發展概況基本上勾劃出一個清晰的輪廓這樣原原本本講述印度佛學史的在我國這是第一部書呂澂先生專力於佛學研究數十年在文字上對版本原典或異譯本做了大量的校勘在義理上對各宗各派的根本典據師承以及前後學說的發展變化做了詳盡的考證一字一校一書之勘竟委窮原務求落實因此有一些長期以來被弄錯了的或者模糊不清的史實也能夠獲得了比較合理的答案講稿中如關於佛滅年代點記說的提出分別論者是上座部的刊定說一切有部相應阿含的發現唯識古今學的辨析等等都屬作者孤明先發之見諸如此類書中還隨處可睹至於中國佛學源流略講一書則是呂澂對中國佛教之若干主流學說的探討他在書中分析中國佛學體系之形成發展與衰落之各階段的特徵釐清各家思想的異同並藉此以彰顯中國佛學與印度佛學的基本差異這部書共計十章如果附錄的十幾篇文章不算那麼單憑這十章本文在份量上顯然不如印度佛學源流略講儘管如此如果不具有呂澂其人的學養其他人還是不容易寫出這種程度的論著的上述這兩部印度與中國的佛學著述加上他早期的西藏佛學原論這三部書使呂澂為現代中國佛學界奠定了印度中國西藏三系佛學紮實的研究基礎此外有一項奇特的現象值得附此一提呂澂是唯識學大師歐陽漸的大弟子也是唯識學重鎮支那內學院的核心支柱其對唯識學所下的功夫也非尋常學者所能比擬然而奇特的是他所撰的唯識學論著為數甚少在他所出版的十本書裡沒有一本是專論唯識學的在他所撰的七十篇左右的論文中專論唯識學的比例也不大可見呂澂所矚目的是印度中國與西藏的三系佛學而不是唯識宗一隅而已四風格與際遇在歐陽漸逝世後支那內學院由呂澂主持一九四三一九五二內學院是從楊仁山的金陵刻經處演化而成的楊歐陽呂三人雖然是直系的學術傳承但三人的風格並不一樣楊仁山生在佛學極端衰弱的清末研學環境太壞可用的古今典籍甚少又缺乏良師益友因此他雖然是復興中國佛教的樞紐人物但本人的學說平平給人的印象只是一個有心做事的傳統佛教知識分子而已歐陽漸的印象則不同他具有濃烈的宗教熱忱與精純的宗教情操而且願力深厚是一個能將生命溶入佛法之中的宗教思想家至於呂澂在風格上又與歐陽漸顯然不同他給人的印象是學者風範大於宗教家風範冷靜客觀求真求實性格上似乎較缺乏宗教家的淑世熱情因此與其視之為宗教家不如視之為具有文化使命感的佛教學者反而來得恰當些作為一個二十世紀的佛教學者呂澂的際遇並不順暢他與同時代的日本學者宇井伯壽在學養等方面都頗為相似但是外在環境與對後代的影響則不可同日而語他們都熟諳現代佛學研究方法通曉多種語文都具有世界眼光治學領域也遍及印度中國與西藏三系的佛學論學說的廣度及深度兩人的水平大體是相同的在師友方面宇井是著名學者高楠順次郎的門下與木村泰賢長井真琴等名家又是同學同樣地呂澂是唯識學大師歐陽漸的上足也是王恩洋黃懺華熊十力等名家的掌門師兄可見在人事環境中宇井呂澂二人都同有良師益友可供提攜與琢磨然而在現實際遇上宇井則遠比呂澂順利得多宇井先後出任日本東京大學東北大學與駒澤大學等校教授現實上的優渥學術環境使他在八十一歲的生涯中著作產量遠多於擁有九十三歲高齡的呂澂宇井在學術研究與教育學生方面的成果也使日本佛學界產生了一股資料豐贍考證周詳義理深入的綿密學風這股學風曾影響了甚多二十世紀的日本佛教學人宇井的成就固然出自於他本人的天賦與努力但是一個不容忽視的外在條件也是使他成功的重要原因之一這就是日本有容納一流佛教學者的環境因為日本有數十所佛教大學數以千計的佛教學人以及數以百千萬計的佛教徒與佛書讀者在這方面呂澂是不能與宇井相比擬的支那內學院在抗戰期間由南京遷到四川江津蜀院抗日勝利後卻無法在南京復校一九六一年他受中國科學院委託的佛學班僅數年即告停止文革之後他幾乎全然消聲匿跡就其一生所學與著作的比例來衡量其已出版的各種著作幾乎不及他的學問的十分之一如果環境好社會需要他那麼再寫出十種具有國際水準的著作應該是很可能的的確整個現代中國的大環境似乎並不需要呂澂這樣傑出的學者一般大學不需要他佛學界與佛教文化界自顧不暇對他也無法關注至於哲學界與歷史學界更無法給他應有的文化尊重與支持最令人感到悵然的不祇是整個社會對他的冷漠也不祇是其學術思想的後繼無人而是他所竭力去廓清掃除他所認為的佛學上的重重障蔽與錯誤思想迄今仍然百花齊放盛行一時他認為楞嚴起信偽說流毒千年說起信論是一部來歷不明而面目模糊的書列舉一百餘條證據去證明楞嚴經的內容集偽說之大成但是這兩部書仍然盛行於當今佛教界而不為所動他認為四分律不如有部律認為梵網經是偽經但是佛教界每年傳戒時仍然依據四分與梵網他看不起熊十力的思想及熊氏的新唯識論認為熊氏思想如浮光掠影全按不得實在然而熊氏思想卻甚受海內外華人哲學界重視與歡迎這些現象不祇烘托出哲人的孤獨也顯示出治學的艱難而且也不禁使人懷疑學者對佛學的研究結論與現實的佛教信仰是否有必然的關涉回顧這位當代佛學大師的一生不祇使人感覺到生為現代中國的佛教學者是何等的不易也凸顯出我國佛學研究環境的某些問題這些問題不解決中國的佛教學人勢必難有出頭之日中國的佛學研究勢將永遠落後日本一大截本文原載於一九九一年新文豐版之拙著二十世紀的中日佛教書中法鼓山中華佛學研究所研究員藍吉富謹識
