body:
  text: 摩訶衍寶嚴經講要經典簡介今講寶積用晉譯摩訶衍寶嚴經此經一卷為後來大部寶積之源泉要義如寶聚集為積故名為寶積也自龍樹著述智論菩提資糧論至於寂天之書莫不引據龍樹至寂天相去六七百年足證其為大乘中最古最要之籍又在中土從後漢始有譯事以來直至趙宋罷譯之際疊經翻傳又足證其流行之盛且久現存譯本尚有四種初名摩尼寶經為後漢支讖與安世高同時所譯次即現用之本已失譯人錄家附之晉錄觀其筆致與術語出於西晉無疑三名大寶積經即普明菩薩會亦失譯附姚秦錄編於大寶積經四十三會大寶積共四十九會四名大迦葉問大寶積正法經文句略繁共有五卷為趙宋施護等譯四譯詳略各異蓋愈晚出愈增繁也今講取瑜伽論菩薩地抉擇分釋文與經配合瑜伽但有解釋不牒經本對勘四譯唯晉譯結構差近故取用之又此經現有梵文孤本一種俄人得之於于闐藏其國學士院中帝俄時男爵鋼和泰講學吾國北庠取校西藏譯本付印名大寶積經迦葉品商務印書館出版但梵藏本皆晚出勘同宋譯不能全符瑜伽釋文僅足為參證之資耳此外元魏菩提留支譯有釋論一種名大寶積經論凡四卷不詳作者譯文亦錯亂拙劣西藏藏經中同有此本題安慧作覈其體例乃依瑜伽配合經文詳為之解家法井然或真是安慧之作也鋼氏亦以魏譯對勘印行惜不嫺漢文對照之處錯謬不少但亦可供參考瑜伽論詳釋此經者以其能略舉菩薩藏中所有教授也釋係舊文彌勒無著集之亦猶雜含本母之例教授與教誡為佛說法之通例大抵教誡詳於律禁止所行通常以之屬於消極方面教授重在法獎勵所行通常以之屬於積極方面實則教授中亦三學戒定慧具足如何使此三學清淨正屬教授之事大乘教授既繁且廣唯此經條列為十六門最為簡要亦猶戒本廣之有二百五十條約其要義乃具於諸惡莫作一頌耳十六門教授列名詳見於瑜伽釋凡分三段初五門為敘論說菩薩行之品類差別一知菩薩邪行二知菩薩正行三知菩薩正行勝利四知菩薩正行中所安立之法行平等行善行法住行等相五知於菩薩起信譬喻相次八門為正宗說菩薩行之自性一知菩薩正行中安立所學二知聲聞菩薩所學殊勝差別三知菩薩學以致用而為世出世間利益他事四知菩薩藏教授中聲聞所學五知非善學沙門六知善學沙門七知住世俗律儀者八知住勝義律儀者後三門為結論說菩薩教授所依一知佛說調伏方便二知諸佛密意語三知佛說教授有勝解果此三段中敘結兩段文義易了略而不講今但於正宗一段詳闡發之第一門正宗分經文初門是故迦葉菩薩欲學此寶嚴經者當正觀諸法云云上文已明此經為大乘學之樞要今更總略其義為一句曰正觀諸法正觀即真實觀即中道觀能正觀諸法則大乘學之一切要義畢在此即寶積法門之總持也學有次第菩薩之學先當具足法住法即十法行乃依法而住矣詳釋之則一面於聲聞乘相應經典據世俗諦道理所說者知為言說解釋非是了義不應如言取以為依但善巧通達而複超出又一面於大乘相應經典契合甚深空性道理與世俗勝義二諦道理所說了義相應者如理正勤修學是即名為正修中道勝行由此正法能貫穿十三中道行故十三中道行即辯中邊論之十五中道行中邊據此經而開合之釋亦略異可以對勘而明也十三中道行者第一為貫穿補特伽羅空性經文謂不觀我人壽命是為中道真實觀法此中補特伽羅即指有情眾生我人壽者命者等於此而空乃空之最初步中道行由此而入補特伽羅空性由一種相不可得所顯云何不可得謂於佛說之種種事上我不可得也事有三類一有情事即五蘊佛說五蘊有情不相離故有情以五蘊成身故二彼差別事彼謂五蘊各從其類有十八界即有情差別事也三彼受用事謂有情內有能受用之六根外有所受用之六塵如是內外相關之十二處即有情受用事也佛就有情分說蘊界處但於此等法內外中間徧尋愚夫所執之實我人壽命等悉不可得是即中道行亦為人空最初之門也第二貫穿補特伽羅無我性經文謂不觀色有常無常乃至不觀我有常無常亦複不觀地水火風有常無常是謂中道真實觀法此由一相可得所顯小乘愚夫為破實我故執蘊處界三事為常住緣生法今正觀彼常性不可得而與彼相異之無常性相可得此即補特伽羅無我觀也第三貫穿法空性上說無常性相隨順涅槃以為可得但仍不可執作實有故繼說此法空性也經云不觀地有常無常云云此由一相不可得所顯謂於蘊界處上愚夫所執實有無常性若內即蘊若外離蘊若中間不即不離蘊了不可得蓋依佛說名言徧計無常性仍成執著今正觀此言說自性是無即為法空中道觀也第四貫穿法無我性經云有常是一邊無常為二邊云云謂此法無我性由一相可得所顯即法實相謂彼事上無常性不可得而聖智所行道理可得未證得離言性時但於道理中可得即彼離言自性可得也但此離言自性為各別自內體會而非言語所能宣說如攝論喻根本智謂如啞受義親知而不能言又如人飲水冷煖自知難為他說然此自內所得之境非無有也經於此境又以六相明之示其與言說自性有異一者不可自尋思謂自不能以意言指陳此即是此經文云無色謂無固定形式可指也二者不可說示他經文略應云無示三者超過色根所行經云不可見應云非依謂非色聲等所能類別之以色聲之別亦落抽象也四者超過一切相經文略應云無顯現或無相謂非一切相所能相也五者超過識所行經文略應云無了別謂非如意識之所了別也六者超過煩惱所行經云不可得應云無住謂離言自性非煩惱生起之所依也如是六相皆離言自性之所依可知法無我性者自有其積極內容非概歸消極否定也此經談空即以此法無我性為據所餘九種法門皆此法無我所顯也第五貫穿增益邊既知法無我性自能辯別增減言增益者此由二相所顯一者差別相之增益二者自體相之增益差別自體皆依法言法即前蘊等三事也差別相增益者即於彼蘊等三事後復次第展轉引生而有八相一於三事執為常相以相續似一故二或於彼事執無常相以緣生起滅故然彼事實相非常非無常常無常言皆為增益由增益常為依止故有第三增益我執許有個體存在故以彼增益無常為依止故復有第四增益無我執許其滅壞空無故然彼法實相非我非無我有假名我無實體我所以我無我執俱屬增益復由此所分別之常我為依止故有第五增益能分別不實在心執反之由無常無我之分別為依止故而有第六增益真實心執此真實心有決定尋求二類決定為心尋求不定為思由此而生徧計所依之意徧計相應之識然其實相無心無思無意無識故彼真實心不真實心之言皆屬增益又執真實心為依止故有第七增益善等能治清淨相等執經文次序顛倒善法等五種如次配論釋能對治顛倒等清淨法反之由執不真實心為依止故有第八增益不善等所治雜染相等執然彼蘊等實相中於此能所二邊皆無所有故能所淨染皆為增益如是次第八種差別相皆於彼彼事上增益所得菩薩於彼等皆不取論釋作不執著不說論作不勸他執亦不稱讚復次自體相增益者經云有者是一邊云云謂先於蘊等三事執有自體故而後有常無常等差別相然此自體不外愚夫徧計所執所有言說自性增益若知彼蘊等唯是言說自性而無實體則如石女兒本無何有石女兒書射等事耶第六貫穿損減邊此由一相所顯謂損減實事無而謂有是增益邊有而謂無即損減邊前之增益乃以所無之自體差別為有今之損減則以真實離言自性概歸之滅無也不知離言自性乃真實法無我性於此起邪勝解論文綴句有誤應云於法無我性起邪勝解即是損減事實此指小乘人等不辨法無我以為但於法上無所執之我即蘊等內外中間不能得我實則仍屬於生無我由是起邪勝解執為法無我以與無常苦空齊觀謂蘊等實有法中實有此無常苦空無我法此但法執耳與真正法無我性相去遠矣大乘謂空法執即由此始法執空而後離言自性顯是故經言常我是一邊無常無我仍是一邊又云有者是一邊無者無我為二邊也尋常所謂無常無我乃言說自性佛隨眾生常我等邊見而說小乘誤解於此增益以法中無我為法無我反成法執必無此法執我言說自性即法無自性而後真為法無我性也中觀學者月稱之徒謂小乘亦知法無我瑜伽宗以法無我之有無判大小乘為不合理云此乃不明小乘所謂法無我性實是人無我性也月稱不許有離言自性遂撥無一切種差別一切法相與小乘同歸斷滅無足怪也第七貫穿法現觀明了法無我性不增不減如實證知是為法現觀現觀者兩相對晤中無隔礙即是實證然此建立於對治上去所治相而後得法實相以成其證無對治亦無所謂證也此由三相通達一者彼自性不可得所顯謂於彼蘊等三事此三事概括世間一切事及第四佛說九事中第四緣起事安立所治能治二類即以無明等為所治明等為能治均屬有為法由無明滅等所得之滅是無為法如是順逆緣起事皆就實證中安立佛於菩提座上即據順逆觀而證道成佛然此亦僅如彼安立而已實無安立自性可得也所以經言無有此二謂無所治無明等能治明等之二自性此二自性不可得即與無自性同亦即同無名言自性也二者彼差別不可得所顯謂彼自自性既無則亦無相依而起之種種行相是即順逆緣起二分不可得所以經言亦無二行行即行相謂無彼各別種類行相也三者即彼串習故如實通達智所顯謂於此無二及無二行之理多多修習即串習觀察思惟契性驗事即能如實通達是即於彼自性差別相不加作意思惟行思擇行而能常於事法各別親證也所以經言中間可知即如是知是即所謂通達法現觀之中道行第八貫穿法現觀回向大菩提性此由一相謂有能力於對治行已得能治而復不斷所治小乘菩提得能治即斷所治以是直趨無餘涅槃所得菩提亦無所用設若由得能治回向大菩提不急棄捨煩惱但求淨化庶幾可盡能治之用而非斷然棄捨斷滅之行矣煩惱云何淨耶曰以無貪淨貪以無瞋痴淨瞋痴菩薩無量行皆從此立腳又此中能所治法大同中邊以煩惱業生三種雜染為所治邊空智無相智等七智為能治邊七智中三智治煩惱三相即空智治見無相智治貪等相無願智治有願也又不作智治業煩惱又有三智治生有三相即無生智治生無起智治心心所起無自性智治相續又釋論云名滅涅槃行無自性者行即有為法有為本無自性即是涅槃但以生死流轉為所對治也此即經云不以空三昧觀諸法空諸法自空故乃至不以如觀諸法如諸法自如故是如即無自性也又不斷所治全由悲愍眾生而然亦可謂順乎法之無自性也所以菩薩於得能治時即加思擇不斷所治回向無上菩提求一切智智蓋諸法本空本自無相無願無行無起無生法如自爾不以空空如實自空如是不斷所治乃正符順法之實性耳第九貫穿如是行者煩惱眾苦不纏繞心此段中道行義即含攝於上段經文之內謂證法無我行自然無染無苦以染苦皆是法上增益分別執之求淨求離實為多事若能順法實相而行即能運用染苦不為所纏增益之生死何有於我哉第十貫穿差別此勝於彼謂之差別亦即殊勝之義勝論外道因差別六句而得名同屬此例按其所指蓋謂菩薩中道之法無我有別於聲聞乘之補特伽羅無我觀且較為殊勝也此由四相而顯一者見不同故二者即此見極遠損減故三者於斷迷失故四者於心迷失故一見不同者謂小乘談空不免顛倒彼空有二次第先觀蘊界處上無有情相但有所執之無常苦空謂之有情空復觀蘊等亦無有為生滅流行之相而成彼等所解生滅滅已寂滅為樂之涅槃相是為行空如此依於補特伽羅無我有所執著而成空見於當來身起斷滅增上慢終必墮入灰身滅智無餘涅槃之深淵因所觀不正僅見所取補特伽羅之無大乘亦無此而於能取之諸行有所障蔽不知畢竟遠離言說自性之空性竟執佛言諸行無常為實性進而執生滅滅已寂滅為樂之為究竟致有住於補特伽羅無我有情空及住於涅槃行空之失是即為慢亦為倒見菩薩不爾經云不以無人觀諸法空諸法自空前際空後際空現際亦空也因離言性本性自空非斷滅令空故大乘涅槃乃在淨與轉上用功於諸煩惱非斷滅棄捨而求淨化或轉變使之回向大菩提故經言當令依空離言空性莫依於人也此即見差別二極遠損減者即人無我見過失極重之意執著補特伽羅無我之眾生與一般我見之異生相較下中更下此有二因一由苦不解脫論本此下多一故字安住苦故二由前後二種執著而至失壞故安住苦者謂彼依空執空之空見眾生遠離法無我性不免於苦蓋我見可由空除空見則無對治也是以經言若有依空倚此空者我說是人遠離此法即法無我性如是迦葉寧倚我見積若須彌不以憍慢倚空以我見能除而空見不治也又彼增上慢人於空起見未除我見初自以為除乃於我見更加固執反住於苦故較一般我見眾生更為下下也由二執著失壞者謂諸法自性空非由補特伽羅無我而空是故前執我見後執空見益離此法而愈見失壞譬如良醫應病與藥若藥不消反增其病也菩薩因解法無我觀故隨宜運用巧便無礙故無此失三於斷迷失者謂於所斷有迷亂處不得正解小乘人不知真空以無補特伽羅為空認此即是法之自性一聞諸行離言自性其性本空便生驚怖反求除遣作空無想此乃於不應斷而求斷即是於斷迷失經喻有人畏空而求去空空何可去若在菩薩則知如實觀察但使轉淨而不除遣故無迷失也四於心迷失者謂於不應遣除而求遣除是即思惟顛倒小乘執蘊等實有謂是眾生眾苦所依滅此入無餘依涅槃而後安靜彼不知色等皆是自心徧計所起猶如畫師自畫鬼像實無可滅可怖但可轉染成淨所以經言眾生造空而復畏之也此乃菩薩小乘之差別處彼此觀點不同因而施設有異也以上四相皆顯法無我之中道行第十一貫穿因性菩薩小乘之觀法雖有差別然法無我觀實由生無我觀而來故當進而通達法無我之因性此由二相所顯一者觀察能取所顯生無我觀之結果雖無有情但仍執法為能取即所謂唯行也今於此唯行之能取應起觀察有如經言幻師化作幻人復自食之不真實故經復釋言隨所思維一切虛偽者思維即觀察虛即是空謂種種有為法空與言說自性不相涉故偽謂妄而不實不如彼分別之實也論云應捨相故有剎那故者捨對取言捨染取淨但捨所不取者非同斷滅即捨不真實而有剎那之幻相此剎那之現有而不實亦復非無但不堅固耳二者彼如實通達所顯由此通達能所俱空亦有次第先觀生無我智為觀所取次由生無我智得法無我智為觀能取前為有情所取後即唯行能取此二智但是加行智為根本智生起之因非根本智經喻之云如二木生火而燒彼木蓋由生法二智生根本智已根本智復燒法無我智故以智言非徒生無我不究竟即加行之法無我亦不究竟唯根本智乃究竟也如是正觀是名通達法無我智因性中道第十二貫穿到邊際空性前知其因今續觀果此由一相所顯即法無我智如實顯現是乃一竿到底之談正同般若之說十六空對治十散動也經喻如實顯現云譬如然燈諸冥悉除此暗無所從來亦無所至此喻顯三種相一明暗俱空相謂智慧與業煩惱能治所治均是離言說自性故說俱空二能所治平等相謂於能治所治心無高下不起執著以二者均離言說無實有性得平等相即能對治如是明來暗除智生惑去如實顯現不容存一毫私意也三智生惑滅任運相論云有剎那故即任運智生惑滅乃自然之事非造作而然也小乘堅執惑應去智應生即不解此平等到邊際之空性第十三貫穿彼空性威德由一相顯即能斷業煩惱之對治對治為相反克制之義空性智能克制業煩惱而成就其寂靜性論謂彼剎那光明想生能斷無始所集一切煩惱是也經喻百歲冥室燈然暗滅而暗不作念當住不去是故眾生百千劫中造作結行以一正觀無漏智燈即得除盡此種空性威德皆依法無我智而成法無我智即中道行也中邊論引此段經文據唯識義釋之與此稍異蓋彼論談唯識能無境所此釋言唯行無生以與小乘生無我義相銜接故二者不同也第二門知聲聞菩薩二種所學殊勝差別此即菩薩所學勝於聲聞聲聞有多種此舉其四一者變化聲聞諸佛菩薩為化度有情而化作者二者增上慢聲聞即執著生無我智及邪法無我智者三者回向菩提聲聞謂不定性聲聞親佛聞法故亦能發趨廣大菩提者四者一向趨寂聲聞即定性聲聞決定趨寂不轉者此定性聲聞悲心最弱於利生事一向棄背但與增上慢者有異雖不能趨大菩提而能趣聲聞菩提畢竟解脫身與菩薩同至於增上慢聲聞以見障故並此解脫亦無之也今以聲聞與菩薩較量即就定性者說經文喻如二王子受用快樂雖同但於王政諸論一能善巧一不善巧如是菩薩聲聞雖解脫身平等而於菩提善巧與否則各異其趣也次略舉菩薩之殊勝處凡十三種一者由意樂故定性聲聞一向安住寂滅於有為雜染避之若浼菩薩雖趣向寂靜而不背棄利生事不疾斷諸行雜染此即知見意樂之差別處所以經云五穀不從空中生蓮花不從陸地生乃從眾穢之地與污泥中生佛法亦爾不從無為即安住寂靜義生而從邪眾生結縛中生也二者由白法善法集成故定性聲聞亦積善法然意樂狹小唯圖一己解脫所作善法經喻如一毛破為百分之一所取於大海者一滴水耳菩薩則為增長一切有情安樂而長養善法如滿四海之醍醐豈僅量之有差其質亦大異矣三者由智集成故聲聞由無為智故除自煩惱菩薩不但有無為智且有現證智而能回向經喻聲聞所得智如芥子中空菩薩則如十方虛空大小之殊於此可見四者由種類故謂所繫屬聲聞以最勝解脫法為境所緣雖勝然僅為一己安樂作意甚為卑下菩薩以雜染諸行之有情法為境所緣雖劣然欲與有情同得解脫作意至為殊勝所以經喻皇后與賤人會所生不為王子王與賤人會所生反是王子以況聲聞終非佛子菩薩實如來種也五者由種姓故聲聞能勤精進可謂有力於諦四諦善巧可謂有勢心善安定可謂有威經中應有三句謂大力捷利威勢今經文缺雖具三德而不成就佛種非佛所攝菩薩雖不定有三德然佛攝受以為佛子經喻聖王雖有千子無聖王相不作子想可知聲聞雖有千百佛又奚念之哉六者由持種故謂繼續佛種亦非聲聞所能承當此金剛經但以攝受咐囑諸菩薩之意經喻皇后所生童子即具王相能續王種以況初發趣菩薩即可成佛紹隆佛種七者由加行故加行為菩薩預備之行發軔即異初發意菩薩即是佛子住如來家作諸佛事而為天人等之所禮拜經喻聖王子初生即為臣民所禮敬也各經以此段為第八今從瑜伽釋文為第七八者由威德故菩薩發趣菩提雖未至究竟然其最初意樂所感威德及與智力已可映蔽一切聲聞而為其所依經喻摩尼雖小然勝於大如須彌之水晶也九者由正行故聲聞雖能成滿療煩惱病之智慧良藥而不能施治一切眾生煩惱之病菩薩則異於彼經喻如須彌山王良藥為一切人療治苦患無所適莫也適莫者主也無適莫即平等不差別意十者由福田故正行為菩薩利濟於人福田則菩薩所受於人者也聲聞經中有施僧不如施佛之說以佛在僧中福田最勝故大乘菩薩則更勝於佛以佛亦由菩薩所集成故此有二因一能成熟諸有情故二能成熟諸佛法故譬如有人能作勝饌與人受用智慧過於端然坐食者佛由菩薩成就聲聞隨成佛而後有故菩薩以比聲聞則勝中之勝也經喻初生之月人所禮敬禮初生月為印習俗初發心菩薩能成長善根勝諸如來亦復如是十一者由殊勝差別故聲聞雖到究竟於諸有情智光明照然不及未盡煩惱之菩薩經以星光喻聲聞月光喻初發心菩薩誰有捨月光而禮星光者菩薩福田之勝實非無漏智聲聞可比擬也十二者由因果故菩薩非如聲聞一向受學修行淨業法因亦非定為善友所擬然能引發成就大菩提果以能接近雜染有情作佛事故經云一切天人不能以水晶為摩尼真珠聲聞小行小德固不足以成等正覺也十三者由殊勝依止故佛法由菩薩不棄雜染諸行之所成就是故世間有菩薩出現則有佛有佛則有聲聞由是一切世間善法賢聖無不依止菩薩而得出現經喻如摩尼珠為無量財寶之所出也從上述十三種殊勝義可見菩薩所以為菩薩者精神之何在矣第三門知菩薩學以致用而為世出世間利他事菩薩學即利他學此須以智成辦謂世間智及出世間智也菩薩具足二智則能徧於十方世界國土而為有情宣說正法由三學而清淨之道療治煩惱眾病作大醫王二智自有次第世智治標出世智治本先言世智粗品雜染勢力不強此智可使止息不起對於中品亦能為製伏對治制伏者培養本身力能以制伏之之意何謂粗品雜染謂在家人多貪等行行謂習慣久習成性出家者雖於貪等微薄而復生見即有不正作意或復希求後有於非解脫處執為解脫等遂有無常等四倒生起如是等病皆能使之暫時止息至於對治貪等行方法有如經言以惡露不淨治貪欲慈心治瞋恚緣起治愚痴又於出家眾之見障見即身見等五則以空治之由見而有相執則治以無相有後有願則治以無願有無常等四倒則治以四無倒如是始以一切行無常治非常有常想等次趨涅槃後臻寂靜也以上所言止息對治僅限於各別現行煩惱若其習久力強即成中品雜染則有賴於三十七菩提分為之對治而令制伏菩提分始於四念住即於所緣正繫念故令心安定次四意斷即四正勤由精進功力於四念住精勤修習便不於此生起我見是為制伏對治對治計著身受心法等我見次於心所住境攝受不散而有神足則於常人所執聚集身一合想以為真實者即能制伏神足為依即能引生出世智之加行出世智所治者此亦能治即五根五力能治不信懈怠亂念不定經文脫此一句無智也從此能伏諸緣起等三種愚痴即無生無我法無我之無明為七覺智進而於邪正道皆得決定為八聖道中品雜染以此三十七分次第對治仍是世間智中邊論以菩提分為聲聞菩薩所共學而非菩薩不共之十度行故不以為出世智正同此說也次出世智能治微細隨眠所有雜染隨眠即隱伏心中之貪等種子經言耆域醫王但治身病唯有菩薩所求出世智藥能除心病菩薩雖以出世智如實治諸心病而仍不廢世間智藥故論云依彼世智制伏對治而有三處善巧一者緣起善巧即經之因緣智能知諸法生起之染淨因果二者補特伽羅無我勝解善巧即無我人壽命智三者法無我勝解善巧即解一切諸法空無恐怖之心此三善巧皆屬勝解勝解者由聞而生之決定信解也由信解而實證故信解就果立名亦稱為智菩薩既得三智為欲超度無餘雜染對治四種無知乃自內精勤觀察自心不賴他緣而有異於聲聞之依佛聲而得解脫四種無知者指所知障蓋煩惱障前已制伏不能為患今特致力斷所知障以明心相論特提示觀察自心此乃歸本之談菩薩行固始終不離於自心也云何四種無知一於共相無知二於自相無知三於雜染相無知四於清淨相無知三智所觀之染淨緣起人法無我皆於心上見之故此四相乃就心之四相說也共相者謂緣生有為法之生滅相生滅墮三世中故於時間上顯而三世又於心上觀察謂已生者過去未生者未來俱不現在前無作用故又心於現在正生不住剎那滅故滅不待因現有不住不住亦無作用也又貪等心法所對治與貪等相應之心即不限於貪等法由自種子生非心所作知此三事而心之共相自明但有相續而無生滅作用也經與論配次序不順何者心欲何怒痴論為第三相為過去耶至心未起為第一相若現在至不住為第二相心之共相如是一切法之共相亦然又心之自相者由三相知一者如前言說自性不可得故即心之自性不如言說故經言心不在內等二者如前有六種相如實可得故即由無色無示非依無相無識無住所顯之離言自相心之言說自性不可得而離言自性應可得所以經言心者非色不可見等何以諸異生僅得言說自性不得離言性耶此由亂識之虛妄分別故經言倒想三者一切聖者無差別智之所得故謂彼亂識為聖者智之所得是知虛妄分別即心自相也經云但以顛倒想故有諸法行此亂識外別無所有是即三界唯心之義也如是了知心之自相一切法之自相準此推知心之染相者亦由三相而知一者由生故謂始起二者由轉故謂相續三者由行故謂緣境經文共有二十六喻說此染相初言染生相者謂眾生於諸趣中現種種自體如天人畜類等即有種種心故所以經言諸法如幻化能受種種生亦謂心如幻化種種不定即心生相也次心轉相者謂眾生既生彼趣其心自然相續流轉譬如流水難可得住又其心遇境即趣一切所緣不可伏轉如風遠行不可持故又隨貪等勢力而轉譬如燈焰待油炷生此三即心之轉相也三心之行相者此有二段一心行處即若於彼行謂行之處所二所行相即心於彼如是行謂行之方式心行處者謂或一時行於善中有如電光難可久住或於一時行不善中如空為霧染而有不淨或於一時行不定境中譬如獼猴貪一切境或行造業中不能作意隨其勢力有善惡之形跡可尋猶如畫師造種種行故心行之方式者謂對煩惱行貪瞋等無決定行即經所云心不得住隨煩惱行經文缺喻又此心僅能向隨一境界行行有貪者即不行無貪行無貪者即不行有貪即經所云心獨無侶又於隨順樂等法中於樂等受勢力強盛心之現行為其增上有如人王為一切法之首故又心自生苦斷壞眾樂喻如仇敵經誤為母又心如沙聚經言燄聚誤狂象奔赴即便散壞心以無常為常一切善根不得積集亦復如是又心如魚鉤以苦為樂故如夢以無我為我故如蠅以不淨為淨故是皆由顛倒見故又心引發眾苦無有厭足有如怨家棄捨善法但求瑕隙故又心才著善法即便棄捨有如羅剎常樂求便故又為食等所損惱得間即令不善現行如憎嫉者伺求過故又心於衰盛中有高下隨恩愛痴起故又心隨放逸壞善如賊斷善根故又心著色等五境妄以為淨樂著不捨如蛾投火自歿故色如軍樂鼓音故聲如豕樂臭穢故香如役人樂殘食故味如蠅樂羶故觸如是諸喻皆所以狀心行之染相也心之淨相者是心非但染而已矣亦復有其清淨此由三相而知一者不得得相即如何得淨如何不得淨之相謂由如理勤修即能證得清淨所謂不見心之言說自相而見心之真如相也若由別異安立執相以求心淨即不能證得二者無為相謂心本相如是不待造作也此以九相觀心遠離言說分別一謂不行世即超越三世分別經云設無不可得者則過三世云云二無二相謂雖越三世然不似入滅盡定者一入千劫內心一無所有證得心無為相者言說自相不可得而真如相可得故三非生身相謂此淨無為相本來如是非他所生也經云不有不無云云四超過生身因自性相謂此非他所生亦非生他因性經云若不生者是為無性五過超當生六超死歿經云若無性者則為無起若無起則亦不滅故七超剎那展轉不遠離相剎那展轉則有變異有敗壞此非滅壞法然亦不離滅壞法以是剎那滅壞法之法性故經云若無滅者則無敗壞八超趣轉易相謂此非隨業諸趣異熟經云若無敗壞即無來去生死九超業煩惱行相謂此非業煩惱亦非與彼一體而是本淨煩惱乃淨相上之客塵耳經云無行行即業煩惱之有為相也尋常說心均不外此三世等言說分別之九相必超過此九相乃能知心之實相也三者種姓相謂即無為界相界者種姓以出生為義謂此有能出生無為或無學之姓故學之究竟即是無學顯示此相分兩段說初於現法中超過五事後法中超過六事以顯示此相後由四位九相以顯示此相初於現法中超過五事者一超過所作經云無戒戒即是學謂此心本淨學祇為顯現淨種姓之增上緣而非因緣故種姓非由學生二超過非所作經云無不戒謂種姓雖本有設無學之增上亦不顯現三超所作加行經云無威儀威儀即為學之加行四超所作非加行經云無行謂種姓亦無違於學之不如理行五超非所作加行經云亦無不威儀謂種姓由學增上顯現不為障學之違行亦不為違行加行種姓超過此五事寂然無為知此則不墮於荀子性惡之論以為聖性可積而成又於後法中超過六事者一超過能發起後有之行謂心淨種姓相非發起後有行之心心所法二超過彼行謂非但超過心心所亦復超過業法行動成習謂之業三超過彼果生經云無報以無業故即無報也四超過依彼衰盛經云無報則無苦樂也五超過彼所依一切無記動搖中修學期願受用謂此聖性無業超過修學無作超過期願亦無身口意業超過受用也六超過彼所依自體差別經云此性平等無上中下即一切眾生皆有佛性義皆有即平等如是佛種姓於現後法中超過十一種相求則得之即心性本淨之心也後由四位九相以顯示者謂從凡夫至究竟位此心淨相無時不在初不淨位以一相顯如虛空相謂此位中心種姓相平等如虛空不以流轉諸趣而有差別如虛空不隨色塵而轉變也經文脫略應有聖性平等如虛空故一句次清淨位謂已趣清淨而未真淨故以二相顯一平等一味淨味相同故經云亦無差別一切諸法悉平等故二身心遠離即遠離煩惱而身心寂靜也經云此性遠離捨身口故又清淨之言謂舉動中節非一無所為之謂此二相為趣淨乃順解脫分之隨順道必至通達位乃在道中也三通達位直趣涅槃究竟以三相顯一由一切煩惱自性離繫離垢故經云此性無為順涅槃故二超我見薩迦耶見三超彼為根本之惡見趣謂一切不平等皆依我見而生起故所以於我見及由我見所生之諸惡見皆應超過經云此性無我離我作故此性平等離虛實故即謂此心平等超過我見實見為實虛見為虛也四究竟位謂安樂成滿經云此性真出要三字為諦實之舊譯第一義故謂種姓相至究竟位為最勝聖智之所見故為諦實心至於此即究竟安樂成滿也復以三相別顯即超過三種變壞故初謂老死等變壞經云此性無盡經文無下不字衍文至究竟不起故謂此性無由使之生亦不可使之滅也次謂顛倒處變壞經云常如法故此性樂無為悉同等故此性清潔至竟無垢此性非我求我不可得故是為涅槃四德真實常樂我淨三清淨退失變壞經云此性潔至竟淨故此心畢竟清淨非先染後淨亦非忽淨忽不淨也以此四位九相觀於自心是為究竟之談見能知此為出世智見不及此則世間智也此出世智人人共有能探得其究竟者始有成滿所作之功用如是而知此心此智乃瑜伽宗之根本義也第四門知菩薩教授中聲聞所學是即增上三學菩薩戒亦屬於七種律儀在家二出家五此說菩薩入出家眾謂共聲聞所學而更殊勝以示菩薩中之聲聞學此有三類一者增上戒學加行謂調伏貪喜欲憂瞋惡煩惱故一切煩惱以此二為根本也二者增上心學加行謂於現法起厭離不足之心而生勝進之欣求欣上厭下乃得勝進三者增上慧學加行謂能契證補特伽羅無我性或法無我性故經文於此等義但以喻顯今初顯調伏貪憂有四相應知此貪欲薩迦耶見及瞋恚煩惱皆由自心不如理作意而起若不反求於內捨心逐境如犬逐塊雖住阿練若身離色等而心樂著終不得除遣此其一又不知離色等方便任意冥行如拔髮苦行等此其二又遂入人間復為色等之所得便此其三或於山澤命終因持戒福生於天上又為天上色等境界得便身壞命終墮四惡趣此其四如是名為如犬逐塊也反之但觀內身即不如犬若受人撾罵默受不報知無受者即於貪憂而得調伏即正除遣已除遣二相此段經文從正反兩面分說貪憂如犬逐擲為貪別說不如犬遂擲為瞋別說此二本屬心所應是增上心學之所調伏今於戒中言之者以戒學過失皆由貪憂而來亦名調伏之也又此貪憂為欲界繫生此界中自然而有且隨一不除遣餘一亦不除遣隨一除遣餘一亦除遣經文正反分舉貪憂而說者正隱顯此相關之意也於此貪憂若不除遣形貌如儀而於增上戒學尚屬毀犯所以菩薩藏中修學律儀重在調伏貪憂使其不能引發一切毀犯是此增上戒學之加行全在反求諸己耳次顯定學加行經喻如善御者若馬放逸即能制之修行人亦當如是能制心散蓋心緣境一有馳散錯誤即為正智之障也三顯慧學加行此以二相知謂由補特伽羅無我及法無我故惡見如絞人於咽喉處著力由此二法以制伏之則如解縛結也如是修增上慧就人無我加行言須斷薩迦耶見愛纏根本就法無我言須真正通達法之離言自性若於分別有色無色有見無見等名言計為自性則此法無我性反於法無我智作大障礙蓋多一層分別即多一層繫縛也以是經云一切諸見有計我者人法必斷慧命應隨所縛悉為解之如是比丘隨心所縛當即除遣是為慧學加行復次三學正修行中有八種違逆學法及八種隨順學法應知眾生可分二類一見行類經中所云學世典者二愛行類經中所云執持衣缽而不精進者此二類人於戒等有八種不順之障一者唐捐躭著唐捐即過失無義相謂於學習世典及執持資具兩種過失無義利事念念不捨致為三學修習之障也二者由躭著故縛謂多習世典為世見縛執持資具為貪愛縛三者由世見縛故親近白衣而生染著由貪愛縛故於學道師友反加憎嫉四者由障礙故垢謂由世見故於貪憂二結隨一取著復由貪愛故時詣知友而從乞食亦為出家之垢也五者由垢故災雹謂由染世法故誹謗正法由執資具故寧犯戒而食信施此即出家學道之雹雨也六者由雹故瘡皰謂由二結故一則顯露他短一則隱覆已過為自瘡皰七者由瘡皰故熱惱謂由我執增盛故熱惱現行一則於已藏濁而持袈裟故一則於有戒行者亦欲使承順於己八者由熱惱故諸煩惱病難可療治一則於己憍慢一則誹謗大乘學人如是八種愛見二行增上之障發端極微積厚難治出家學道於隱微處不可不洞燭其弊也反此即是八種隨順學法應知第五門知不善學沙門出家眾中復有善學不善學之分此唯於菩薩教授中得明辨之沙門有四善學唯一種不善學則三種一者色像沙門謂名不符實於沙門法式全不顧及經云剃除鬚髮被著法服手持應器缽盂所謂形相同分也但於三業軌則活命正行經身口意行受用知足經不貪加行精進經精進持戒不犯經戒正見無惡經不作惡及意樂經調禦守護句等全不相應即不同分也二者詐威儀沙門謂趣向資具故於三學行相同分而行意樂不同分觀其成就禮節遊步正智食知止足行四聖種衣食臥具病緣醫藥不貪資具而其意樂不期淨心是為增上戒學形相同分又外似不樂眾聚道俗之會而不習止息是為增上定學形相同分又外似少言少睡樂求寂靜而有見想於空起如坑想於行空者起如怨想是為增上慧學形相同分如是雖修三學但為資具而詐現耳三者名譽沙門謂回向聲譽為令他知故奉持禁戒精進學問或住山澤修習止觀一切皆欲他知故意樂不同分亦非善學沙門也第六門知善學沙門此有四相以見一切行皆為證究竟解脫而趨向究竟一者加行圓滿謂於現法中由厭患加行厭患者有所不為而後乃大有為也經云諸有沙門不為身命而修加行況復貪愛財物著於名譽又於前生中由相續成熟加行於空無相無願之法欣樂修習經云樂聽空無相無願之法云云合上二者為加行成滿二者意樂圓滿謂若修行真如法則能與法無我相順勝解而成勝意樂故定不為涅槃及得涅槃空慧之名而修梵行即所得之涅槃及所由得之空智況為三界及見我人壽命是皆歸趣真實不執言說經云依法求道離結解脫也知此法此道不違佛說意趣即能行道離結是即四依中之依義不依語也三者通達圓滿既於佛說求道離結意趣有所勝解即於諸法真如實際以不緣他智而得通達以自性本無雜染故也經云如法者云云不見如來法身之名況有色身佛寶畢竟清淨不見法之無欲況有文飾法寶本自無著不想無為況有聖眾僧寶此勝義三寶非言語所行故於世俗自性不可得並非真實亦無之也此乃總說一切法真如實性別說三寶等世俗可得真實不可得也四者趣究竟圓滿知此勝義三寶可得歸敬之念油然而生如水就下蓋此乃順心之本性猶云見賢思齊也經云不習斷法不學修法乃至知一切法究竟清淨自然不生亦不隨轉於法不斷亦不取斷滅於法性無損而能調禦能治雜染而不壞諸法性則能運用無窮是即真實沙門之究竟義亦為出家菩薩之真相次以喻明前三不善學沙門復由三相知彼名不如義一者意樂衰損加行具足經總喻以貧人不得有富名稱無德沙門是為極貧此有三相復別舉三喻謂但習學多法而不除結雖為法水所漂而終渴死不至涅槃又但說法能療他病不治己疾又唯習俗智即生愛著或行不如法終至惡趣是皆由身心不一致之故也二者意樂具足加行衰損經喻以摩尼寶珠墮不淨中無所復直謂是沙門著資具也三者意樂加行兩俱衰損經喻以死人著花鬘沙門被袈裟而不持戒亦復如是反是善學沙門意樂加行兩俱具足經喻如長者子澡浴自淨而潔衣香鬘內外一致多聞持戒被著袈裟亦復如是也第七門知住世俗律儀者此即假名律儀以四相顯經云有四不持戒似如持戒相一者謂由成就六支戒已仍為薩迦耶見纏現行故又不知毀犯出離方便故所云六支戒者一安住具戒經云成就威儀二善護戒儀經云護持禁戒三軌則圓滿經云威儀禮節身口意行四所行圓滿經云持比丘淨戒成就五對罪怖畏經云至微小事常畏懼之六受學學處經云正命清淨也二者謂雖遠離上二過失然未得世間清淨律儀無定力故於薩迦耶見難以制伏經云誦律通利密住律儀而未斷身見也三者謂雖善護定制伏身見而於法無我性有所怖畏經云聞說諸法不起不滅而懷恐怖也四者謂於邪法無我勝解未證謂證起增上慢經云能行十二頭陀淨功德行而起我我所見損壞律儀也第八門知住勝義律儀者謂真實律儀乃成就出世間一切煩惱不相應而能對治三界之無漏屍羅亦離前住四律儀中諸戲論過失戲論謂無義語即不應分別之分別前四律儀有諸戲論法而無漏屍羅即離彼彼戲論相之所顯也初戲論相謂所分則之我我所執相除遣即無我亦無我所由我見為依而生種種計著離此即無作不作如是乃至若失念行若彼不行離此即無行不行是前第一住律儀中所捨次由身見未伏而有我見俱起即見品隨行有名色五聚可得若離此分別則無色乃至於色等中有情執若所施設贊善執及能假設心語假設贊善執悉皆除遣則不施設有眾生無眾生乃至無心不心此即第二住律儀中所捨也又若於世間法上求下捨上求世間為著世下捨世間為出離於此而離為無世非世經文缺乃至是自戒而輕他戒於此出離即無戒不戒是第三住律儀中所拾之分別若計我尸羅清淨若由自性差別分別故分別尸羅悉皆寂靜此即第四住律儀所捨也是即經云無漏聖戒而無所墮出於三界雜一切倚也寶積正宗八門大義如是
