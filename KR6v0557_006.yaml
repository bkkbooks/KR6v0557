body:
  text: 法句經講要此經分三番講述一總辨經體二解析品次三抉擇要義一總辨經體辨經體者明經之性質自小乘各家迨大乘龍樹無著以次僉謂此經為佛說無有異議且以為一般經典之稱佛說類皆佛滅以後弟子輩追述之作今此法句則佛在世時已具定型相與傳誦矣今細玩其文樸質親切真所謂布帛菽粟之言論其幽深雖不逮大乘諸經然即樸質親切之中義蘊豐富其為當年佛說之實錄可無疑也惟此經綜集成篇區分章段則固佛滅後事且其纂輯頗有異說或謂初結集時出之屬於雜藏收三藏不攝之說此則推為迦葉阿難時所出也或謂法救上座實集之今考法救以前實已有輯本法救不過補訂之而已初輯之本佚在三藏四含之外攝於雜藏補訂而後則以配合十二分教非復雜含之舊此種流傳前後變化之跡徵之事實亦不誣也吳譯法句經舊序云法句經別有數部有九百偈或七百偈及五百偈是則法句原有廣中略三本之分從現存之梵殘巴漢藏各本考之廣中略各本俱在巴利原本四百二十三頌二十六篇即當於略本吳譯法句經晉譯法句譬喻經七百五十二頌三十九篇即當於中本秦譯出曜論解法句者內含經文北宋譯法集要頌經與西藏譯本九百餘頌至一千五百頌三十三篇即當於廣本各本中自以巴本為最古與吳譯內二十六品脗合惟吳譯首尾增多十三品而已至秦宋兩譯章名大同吳晉次第則出入甚多可知為完全改作者巴本不出輯者名氏吳譯以去皆題法救撰以知法句經前後確有兩種即初輯本與增訂本也增訂之中又疊有改易不止一次經之性質即因以改變如略中本俱名法句而廣本以後則稱鄔柁南聚法句云者法為佛說究竟道理不可移易之目句乃名身句身詮義周圓之式如今所謂完全命題所以一句一義四句一頌法義周圓無缺法義悉宗四諦鄔柁南聚云者十二分教之第五種義為自說聚即品類分章之義由此立名不同乃知法句有特殊因緣而說者則變成一種泛說句義鄔柁南但經之重要意義並不因此消失也今講折中廣略而取吳譯吳譯文字雅馴不失理味惟品第不無譯人臆改之處如婆沙智論地論俱云法救所輯法句始無常品終梵志品今本於梵志品後溢出四品顯非原本之舊至晉譯品目與此相同者不過蕭規曹隨步前譯之定式不可信為印土所傳即如是也二解析品次此經所傳詳略各本品次不一今試析之以見編纂與改訂之用意而學說源流變遷同異之故亦可瞭然初談略本品次今就南傳最古之巴利本勘同吳譯自雙要品第九至梵志品第三十五止中除利養品第三十三品外餘二十六品篇名品次若合符節可斷其同出一源為最初之型式且尋其編纂之意又可知為上座部系學說無疑考上座初與大眾對立次復於自部內分為化地犢子兩派略本法句蓋即上座化地一系之書也佛說三藏理論紛繁各部系欲表示各自學說每每取用佛說另加組織以見其意所以編次取捨各有不同此經南傳本有覺音注惜偏說因緣不詳理致且於品次關連之故亦未解說今實無所取材但可由上座部系學說上考之判此二十六品大分二組初七品標立教之本原次十九品明入道之由致一初標立教之本原者教由心立心即本淨塵染之心也以本淨故可以向上以塵染故可以趣惡經中最初雙要品首出二頌即明善惡之繫於一心頌文云心為法本心尊心使中心念惡即言即行罪苦自追車轢於轍初頌心為法本心尊心使中心念善即言即行福樂自追如影隨形次頌何以知淨本塵客耶謂惡由放逸所致非心性之本然故次之以放逸品如欲迴心向善貴在攝護其心故次之以心意品護攝之要在於學法學不外戒定慧三故次之以華香闇愚明哲三品以別顯三學學之極致塵染既去本淨圓成故終之以羅漢品此依塵染立言則為心淨心脫此派學說推論佛之立教本懷即在此心之去染成淨也次明入道之由致者即學者遵教之行此行綱要可取證於顯揚論以聞歸學覺四字統之蓋無著本依化地部出家後著顯揚明為學之工夫次第仍與法句冥合自是化地一家之說原來爾爾故得相資發明也十九品中初四品說聞之事聞貴得要不騖繁博故先之以述千品於此亦知輯法句之意乃存佛說之樞要也由聞而知區別善惡故次之以惡行品說明人之不能向善非關性惡但由無聞耳其真實聞者日常言行一善之發莫不出自惻隱故次之以刀杖品慈仁之端雖為心善之本而擴充慈仁有賴精進故次之以老耄品意顯應與生命相競勤事於聞也頌曰法能除苦宜以力學人之無聞老若特牛但長肌肉無有福慧次四品說歸之事入道修學必有所待不有先聖何來後覺以此相續而成人文盛事固非一朝一夕所可至也由此相待而述歸義然歸者非捨棄自我奴役於人故先之以愛身品以示自立自達方能立人達人也由是正知愛身端其所為則不趣於世俗故次之以世俗品既知世皆有死三界無安則能捨俗向佛故次之以述佛品示所歸止三歸但述其一者知歸佛則知歸法與僧也歸依則得安寧故次之以安寧品蓋成佛則知我生已安清淨無為以樂為食未成佛時既得正歸此心亦趣安寧處也次九品言學之事為學之道無他求去心垢而已心垢不外三毒而悉由於好惡不得其正故先舉好喜忿怒塵垢三品以知煩惱害心如鐵生垢反食其身必須去之淨盡又為學當持正法故次之以奉持品端其志趣有此守道之心乃有真切之行故次之以行道品是道何道也頌曰八直最上道四諦為法跡不淫行之尊明示之矣學力久積自有所立故次之以廣衍品所以明細行之不可忽小惡久積終成地獄故次之以地獄品積善如調象象力雖大能調而後致用故次之以象喻品生死之本在於貪欲貪欲易熾莫過於淫必須斷此乃堪出纏故終之以愛欲品利養品由此品開出示本宗特重於去欲也末後二品詳覺之事覺為菩提聲聞小果佛乘大果統以覺稱此乃遵教行道之最後歸趣故以沙門品梵志品終焉三乘極至於佛亦稱大沙門大梵志二品中文義曉然可按也如是品次依聞歸學覺四字以會之經旨朗然若揭而其輯錄出於上座化地部系亦毫無可疑矣次談中本品次以吳晉二譯為準據吳譯序文及長房等錄其先尚有舊譯七百偈本一種中本今已遺佚至於吳譯則以略本為主對勘舊譯中本加以補訂其品次參差處究為中本之舊抑遷就略本而有改訂今則不可考矣今勘巴利文略本可知吳譯中本前增八品後益五品共十三品別具次序之意前八之首為無常品此乃補訂略本立教本源之處略本依心立教此則依法立教蓋佛說之法取準於三法印所謂諸行無常諸法無我涅槃寂靜無常品初頌云所行非常謂興衰法夫生輒死此滅為樂即已揭櫫三法印之教矣有無常即有苦無我末句指涅槃此品此義勘巴利文略本盡無有也又道行品行道與立教相應之處亦有數頌如生死非常苦生死非常空二頌又次云知眾生行空眾行苦眾行非身三頌據餘本三頌前尚有眾行無常一頌皆中本所有略本所無者可知略本所重原不在是後來乃為中本重視是即於立教所補訂之義也立教本源既殊入道所由亦異自餘各品即改訂入道所由者也入道必賴師資授受故先有教學品以示入道之綱領其重心則在思而不放逸一頌思即是念謂心之所繫或心之所住心有所住為思蓋入道之要無他念得其住而已念有善惡之別入道之念則非此善惡念而屬淨念頌云遠離罪福務成梵行即淨念終身自攝是名善學是也善念向福惡念向罪淨念則向涅槃特別開之此與略本雙要品心為法本一頌以善惡對舉之義固有殊矣後文泥洹品三因之說亦與此相呼應頌云從因生善從因墮惡由因泥洹所緣亦然涅槃之因即此淨念也是即中本特示入道之要義下此數品均依此發教學始於聞故次之以多聞品聞為清淨法本故於聞須淨信而由信守戒故次之以篤信品與戒慎品守戒則須淨觀故次之以惟念品此品特提十念乃工夫之具體處佛法言三學戒學則有學處定慧學則有業處定慧業之全有四十處今此特提十念而又不依常軌以念三寶居初而以念息為先均其獨出之義也此宗傳中土而有禪數派由念而生定慧有定慧始能自利利他行四攝事故依次而有慈仁品猶四攝之布施言語品猶四攝之愛語如是篇首八品第一立教之本次七入道所由皆與略本旨趣不同者也餘有未盡之意則並著於篇末所加五品之中利養泥洹生死道利吉祥五品以學之究竟在菩提特加補充此於學說關係甚鉅試舉一二點明之一以無三世法為涅槃泥洹品頌云始無如不始不如無是為無得亦無有思此譯甚晦勘藏譯本意謂前有今無前無當有前當皆無今亦不起乃言生死是三世有法涅槃出離生死與之相反也後更有四頌暢申其義云諸苦法已盡行滅湛然安比丘吾已知無復入諸地謂初以地為方便住於地今至涅槃則不住於地也無有虛空入無諸入用入無相不想入無今世後世亦無日月想無往無所懸我已無往返不去而不來不沒不復生是際為泥洹如是像無像苦樂為已解此即顯言離有為法地水火風空識六大亦即通途所謂世間法乃為涅槃與前文互為呼應也二以識盡為涅槃知涅槃即須知涅槃所對故次之以生死品頌云神以身為名如火隨形字著燭為燭火隨炭草糞薪心法起則起法滅而則滅興衰如雨雹轉轉不自識識神走五道無一處不更捨身復受身如輪轉著地此於六大中特提出識大以為生死之主餘大有間無知識則相續有知識藉地等諸大搏以為身地等興衰不定識則相續轉變往來五道以是形成生死流轉涅槃既與流轉相反故須捨識而後為功前泥洹品有頌云一切捨為得際除身想滅痛行識已盡為苦竟乃以識盡為涅槃也既得涅槃則可以示教度生為天人依止故終之以道利品明佛之所以示教末附吉祥品則顯眾生之所歸依佛學體用於焉具備此皆補充略本言菩提之所未詳者也藉此品次分析以知中本編輯特點之所在復可刊定其學說系統出自化地末宗無疑蓋上座化地部後期裂為一切有與法藏二系某後末宗復有異說如異部宗輪論所說化地本末宗義可以參考論謂化地本末宗所同者道支皆是念住所攝以四念住通貫一切道六識皆與尋伺舊譯覺觀相應分別論者說八正道為道化地初期同其說故道行品云八直最上道云云稍後乃主張道支為念住所攝其不同者末宗以為尋伺非但六識相應且三界遍有又尋伺互通其教學入道之方於十念中特提念息即為對治尋伺之故也復次本宗執過未無末宗則主三世有近於有部而以細意識貫之細意識即攝論所謂窮生死蘊所計蘊有三種一為一念起滅二為一期畢三為窮生死至生死最後邊際乃斷亦即吳譯本之識神以三世為實有故泥洹品謂涅槃無三世識所謂盡窮生死蘊而後為涅槃也復次本宗未詳至末宗始昭晰者又有二義其一天中無梵行泥洹品於善因外別出有泥洹因謂善可為生天之因而不能得涅槃意即天中無梵行也其二佛離有漏六大泥洹品頌云無復入諸地云云準瑜伽真實品說即不依於地而修靜慮等也此以離地大為入手工夫準晚出之大集經解釋五部名義云不作地想水火風想虛空識想有漏六大故名彌沙塞化地此說較晚出應是指化地末宗而言由此中本為化地末宗改訂之書可的然無疑矣但改訂之者究誰氏耶吳譯經序不詳後世則皆歸之法救案法救為世友之舅父與僧護同時世友僧護皆於佛說依己意而有所撰集世友有集經僧護有修行道地經規模有同地論又依史家所傳當時有改易舊說之風如法藏部即以改編佛典而得名彼謂佛二乘同解脫而不同道故於三藏外另集菩薩藏且毗婆沙中亦時言法救釋經迴轉文句由此觀之法救生于化地學系演變之時士習學風既以更易舊說為尚則其改編法句亦可信也後談廣本品次現存廣本有秦譯宋譯藏譯三種皆為足本此外瑜伽師地論本地分思所成地引有法句廣本散釋之文二十八頌雖非完璧而重要偈文全在亦可藉此推見全本之品次即可謂為另一唐譯廣本也各本以傳者學系各別所釋品次遂不盡同秦本釋者為譬喻師即經部前師唐人目為日出論者故其書名出曜論宋藏二本為有部師唐本則化地末師也其間孰為原始之本已難確定又同題法救所集其先後亦難明但與中略本相較異同之故亦有可言者焉今且以宋譯品次為準而以唐譯會釋之因宋譯有攝頌刊定品次可為依據也秦本有頌不全頌曰無常及欲貪放逸與愛樂戒善行語言業信為第十沙門及正道利養怨憶念清淨水兼華馬慧為第十如來與多聞己身廣善友圓寂觀罪障相應樂第十護心及宓蒭梵志品在末依品次而說具足三十三舊傳法救所集之法句始自無常終於梵志此本正同惟中間次第如何則難考定廣本現存注釋有說一切有部慧鎧大疏藏譯凡一萬二千餘頌依三百頌為一卷則約得四十二卷此疏每品開端皆有小序說明前後相生之意但成書既晚語多膚泛無足取資大意在講修行而以能所對治鉤鎖相生如謂一切善行無過於修無常觀故以無常品為首無常對治在欲故次以欲品皆泛泛之談也改從譬喻家言秦本考之卻有線索可尋彼文有云聞此佛說法句受益者皆能悟會無常之要罪福之原興衰之變滅度之行今即依之以釋品次可謂各品依此四義而自成四分無常品首標宗要即為初分其次明罪福之原為欲貪以下九品配宋本說又次明興衰之變則為沙門後十品最後明滅度之行則如來品後十三品也初分標舉無常宗旨其意甚明解釋從略二分明罪福之原者罪福之業不出流轉其原究何在耶曰在於沙門品所謂捨五斷五乃度河淵之五心縛此五解者多途見婆須彌集論卷十今此法句既出於化地末宗自以末宗之計為準據異部宗輪論末宗釋五心縛頌云五法定能縛諸苦從此生謂無明貪愛五見及諸業二分九品即據此說組成唐譯第三頌云眾生尋思所鑽搖猛利貪欲隨觀妙倍增染愛而流轉便能自為堅固縛欲貪品頌尋思即見以有惡尋思乃起五種見故貪欲即貪染愛即愛眾生由此便成自縛此於五縛中已舉其三矣又此九品次第於貪欲後始出放逸與略本不同略本雙要後出放逸卷終出愛欲品可以見其主張著重貪欲放逸猶其從屬也唐譯第五頌又云若見他惡業能審諦思惟自身終不為由彼業能縛業品頌於貪愛見之後始出業縛次第與宗輪論全合此本為化地末宗所傳更可得一明證至於無明之能縛心無待深論故頌文未特別提出如是以五心縛說明罪福之原實為廣本之一特色又足以補中本之未詳也三分明興衰之變者此謂五蘊生滅五蘊就身而言生滅則由念住而觀三十七菩提分以四念住居首四念住中又以念身為先者此也化地部以念住攝道支又於十念中特重念息謂由念息可以體驗生滅至於修念次第則由戒而定定而後念念而後慧故此分以憶念品為主沙門正道利養怨四品為念前戒定之事清淨水華馬慧五品為念後慧之事也是等諸義可參看修行道地經得之四分明滅度之行者圓寂品實為中心以其為歸宿之處也證圓寂涅槃之行重在止觀念息止惡尋思乃止之事正尋思興起正見為觀之事故於圓寂品後特出觀品此亦廣本之特色處也瑜伽所引以涅槃置中前為聞戒後為止觀亦可見廣本品次與中本不同處復次以廣本與略本較差異之點益覺顯然如略本正宗上座化地系以心為立教之本故心為法本二頌列於一經之首覺音釋之亦引心性本淨客塵所染而言其視心之重要可知也廣本則以二頌入於末後護心品第卅一品心淨之義遂渾然無跡矣自餘差異可以類推廣本既出影響當時佛家思想者甚鉅譬喻經量有部莫不競相引用婆沙之作者至尊法救為大德而不名其推崇之重可知也綜合上述觀之自上座化地以次極至說一切有部東西各派學說無一不與法句相涉且皆視法句與三藏並重時或過之我國道安法師序十四卷鞞婆沙亦嘗言之蓋有聞於當時譯師所述也又學者每以三藏難能遍讀不若法句之簡約易持因而重視之特甚即以傳來漢土之佛學言自漢魏至南北朝亦無有不被法句之影響者此一段學術史案當於附說四十二章經中另詳之三決擇要義此中要義摘舉三門一者涅槃二者聞戒三者止觀原夫法句之撰乃供教學所用學有目的涅槃是也學有方便聞戒止觀是也一經之要三門盡攝之矣初談涅槃義此義散見各品蓋法句組織或取義或依文類分不定若依義求則羅漢述佛安寧等品皆涉涅槃之說若依文求則泥洹一品斯其樞要矣今講涅槃即就此品撮敘要義有所不足乃以瑜伽論中釋文補之泥洹品共三十六章略本無此品名僅於他品中存其四頌而已初三頌及第二十四受忍心如地頌廣本自受辱頌下亦付缺如故知此三十六章之結構實為中本所獨有今特據此闡述焉涅槃正翻寂滅旁譯引申有六十六種異名中以安寧一名最稱允洽中阿含云諸法以解脫為真實以涅槃為究竟安寧者實諸法之究竟處也品初六頌即廣贊斯義蓋人生願欲無不以太平安寧為歸宿如麋鹿避獵自然走曠飛鳥避羅自然趣空人之求安趣向涅槃亦心性之自然也故云法歸分別真人歸滅此云分別乃現觀實證其義外而宇宙內而一身莫非有為即莫非遷流變化而無一安寧者此即是苦再從行為之善惡言趣善者少趣惡者多即善趣微樂亦非真樂諦知此等是苦即不得不求歸宿於涅槃之究竟樂處矣涅槃超於罪福在善惡外別有其淨因絕非由行能得之也頌云從因生善從因墮惡從因泥洹也次言涅槃三相一無為相二無著相三無惱相言無為者有十一頌自始無如不至為開為法果謂涅槃非煩惱之所為此有異於冥頑不靈一無所為蓋煩惱無量總以愛欲為本不染愛欲苦即淨盡說為苦際此即涅槃異名頌云心難見習可覩者謂此苦際境即淨心諦實不動不變遷而難見惟善觀察而後現觀即淨習分別實證之也若通達愛欲為流轉之本愛欲由見聞覺知而來於見聞等不增不染則愛欲不生總歸寂靜是即離煩惱之為涅槃矣又頌文比丘有世生以下明無為為本之義此義出於中阿含經頌中以生有作行四者皆有為事亦緣起事與無生無有無作無行皆無為事亦還滅事平等並舉而特別指出無為是涅槃之相所以見有為乃因無為而說亦即緣起正為涅槃而談也佛如是說亦有事實可徵諸法皆以涅槃為自性學人之趣涅槃固自然之勢也由是無為相乃有為法之自然歸宿佛但如實說之耳言無著者有六頌起從食因緣有至此道寂無上著指戲論分別無義益之事凡愚言行無一與涅槃相順如稚子之弄沙城其為戲論不待言即在外道異學知求安寧處者亦莫不陡事執著或於世俗現境中求或於定境中求執現境者為地水火風所礙執定境者為空無邊處乃至非非想處及日月光明等定境所礙寄相於此等處以求安樂不知其亦屬無常而終歸戲論也真正涅槃應蠲除此頌云斷有之射箭遘愚無所猗是為第一快此道寂無上是也有即生死箭喻惑業之因因力發動如箭射之不能中止隨順因力往來諸趣遂無止息矣如欲安甯必斷此因頌云寂無上者寂即寂此戲而論也言無惱者有十三頌起受辱心如地迄天人莫不禮惱謂苦痛繫屬於身身由五取蘊成取謂愛欲因既不淨果成苦痛欲求出離者當須離欲如頌云畢故不造新厭胎無淫行種燋不復生意盡如火滅如是轉捨五蘊身而得五分法身謂戒定慧解脫解脫知見具足前四成己後一利他護大安隱行淨度世又涅槃無惱惱歸於身然非不用此身乃以此身貿易法身所謂大安寧身也法句以此三相說涅槃皆不從斷滅上立論可知小乘之解佛說亦有其深微切實處蓋由各部執展轉立破而得定論故非泛泛也復次涅槃三相為證得者身心所體現已證未證均此五蘊身心其間有無差別比中本法句並無明文今謂當於瑜伽釋中所引頌中求之此本涅槃品頌文唐秦宋譯皆具瑜伽論思所成地於教思擇略有二門即思擇契經與伽陀思擇伽陀處錄法句各品要文二十八頌所錄涅槃品頌曰等不等而生牟尼捨有行內樂定差別如俱捨卵生此即顯示已證未證之身心關係於證得之身心分二種解說一者不捨餘依即不捨最後殘餘之身所謂有餘依涅槃二者捨餘依即證得涅槃者並捨最後餘身而為無餘依涅槃瑜伽釋謂佛示現住有餘依時所證得之色身與前修得之色身即三十二相八十種好性質相等所證得之名身是勝無漏則與修得之名身不等至無餘依位時最後餘身亦屬有行有為法以壽行轉故仍未滅壞己證得者於彼餘身不定任運方捨亦可以定力而捨以其得內寂靜樂及沙門樂故此所捨之最後證得色身亦與前得之色身正等所捨名身則與前得之名身不相等喻如孵卵生雞未破殼前所具色身原質與破殼後並無不同惟未出殼時心識矇昧既出殼後心識靈明前後有異耳頌文俱舍殼梵本俱舍下原有破字意云破殼也此中意謂已證未證身相等而心不相等也至於留此身心至滿壽量而後捨者重在證得而顯涅槃三相若不留滿壽量以定心力隨時棄捨則重在捨壽而顯涅槃三相凡此皆略中本未究竟之義而廣本所獨具者也其說亦與小乘部執相關蓋化地本宗意許色心一期生死俱有轉變而有部不許以執三世實有法無轉變也至法藏部則說羅漢身概括色身皆無漏即主證得前後名色身皆不等化地雖說身轉而未確定羅漢身是無漏大眾部又說色轉變而心不轉變今勘瑜伽之釋與以上各部執皆不同色身屬有漏與前相等名身由有漏轉變無漏與前不等此與有部言不變者異與法藏大眾言變者亦異當係化地末宗之說也瑜伽釋文次下更有三頌十八二十二十一闡發斯義而以出離煩惱得自在解脫為言如文可知瑜伽引二十八頌初至十七多說聞戒事十九至二十一說涅槃事二十二至二十八多說止觀事次聞戒義聞戒本屬二事以其內戒外聞相待不可偏缺故合言之菩薩修三十二相業有謂先修耳目者可知為學以聞熏為最切聞非但耳聞也亦具有見在法句於此義尤加重視蓋所立之宗在經文之說心淨客染此經見巴本增一阿含文云心性本淨客塵所染凡愚無聞故不如實知見亦無修心又云心性本淨離客塵染聖智有聞故能如實知亦有修心漢譯增一阿含無此經或係部執所傳有異但舍利弗毗曇引此文合此二經而性淨客染之義備前經謂由無聞故本性淨心乃為塵染而不知修後經謂由有聞故乃知修心離染為淨比而觀之可知淨不淨之關鍵在於離染不離染而染之離不離又在於聞不聞也有聞而後知修即有聞而後有學也以此法句言學並重聞戒聞義見於教學多聞闇愚明哲諸品戒義見於戒慎慈仁放逸諸品至聞戒無缺義則見於教學品頌云戒聞俱善二者孰賢方戒稱聞宜諦學行又云學而多聞持戒不失兩世見譽所願者得學而寡聞持戒不完兩世受痛喪其本願廣本更有頌云多聞無戒不稱多聞少聞具戒可稱有聞吳譯本缺此二頌由此當知教學正應聞戒足也以下分說聞戒之義初聞義舉多聞品以見其概此品共十九頌初七明聞之實次十二讚聞之勝明聞之實中首三頌明聞之成三學即以聞貫通戒定慧也三學圓具即自致得泥洹四五兩頌出聞之體所聞不外佛說法教授律教誡但應辨其正似而後可以解疑守正祛邪至不死處涅槃又辨正似則能於性淨心上離客塵染興功德性如是方謂奉持法藏得聞之實也此義參照瑜伽益見完備瑜伽引頌云多聞能知法多聞能遠惡多聞捨無義多聞得涅槃即吳譯第四頌異譯吳云聞為知法律解疑亦見正從聞捨非法行到不死處此出聞有四勝以示佛說之真俗二義即阿含所謂淺深二義也如施戒生天等論順俗施設皆為淺義四諦三學涅槃等論開示出世乃是深義於此二義中由聞俗義無倒故即得遠離惡趣引發樂因由聞真義無倒故非惟不起惡因更復超越善因求得涅槃正因而獲漏盡此中應注意者若聞者之根已熟資糧已滿便能獲致淨相之心所謂義識義者境也即諸淨相心能恒住此義謂之心清淨聞之有關於淨心意在於此由是遂能現觀諸諦以至捨諸苦本煩惱無義而證得涅槃其根未熟者依人天教亦於勝義得有增上漸證涅槃瑜伽釋文最要須細詳之復次聞法一依在佛見佛不真則得法不正是義為中略二本所不見而於唐本瑜伽釋中得之瑜伽引文第十至十四頌即廣明是義文云若以色量我以音聲求我等此謂佛有二身一色身即三十二相八十隨好之身二法身即一切功德法所聚集身長阿含云佛涅槃後以法為燈明即法身義是故見佛不可執取色身因色身相好魔亦能幻作故以是前四頌言無論肉眼天眼見佛相好或聞妙聲若執著此即如來此當尊信則後時見有似佛威儀者亦必信以為佛無所抉擇隨逐於他於真三寶反生毀謗其弊孰甚此皆由於不知佛之為佛不在音聲形色也此有以定果心眼能了知世尊內分法身而不能見外分色身者或有內無所知但由外見者或有於此內外遍障者若諸賢聖出離惑障智慧無著於佛法身內自證解於佛相好外正觀知而不為他言音所引攝者是則世之雄矣秦本惡行品云智者易雕飾乃名世之雄此說涉及制多圖像等色身非是勝義亦有部執關係法藏部嘗執供養窣堵波獲大福德今是化地末宗批評以為非第一義也後戒義舉戒慎品以見其概此品共十六頌初七釋戒之勝次九明戒之實初中分別世俗勝義二種戒第二頌云護戒福致三報一名二利三生天即世俗戒第三頌云護戒得真實見明了法處即勝義戒守戒在得真見有其見而後得涅槃也次明戒之實者又分廣狹狹則但指別解脫律儀即受學學處廣則兼指根律儀守護根門命清淨禁為非法生活依資具衣服湯藥資生之具悉有限制此中即就廣義說之頌曰比丘立戒守攝諸根食知自節悟意令淨所謂立戒即依住別解脫戒住此而後有餘根律儀等三但此尚非戒之本質第九頌云以戒降心守意正定內學止觀無忘正智第十五頌云持戒清淨心不自恣正智已解不覩邪部所謂無忘不自恣皆指不放逸此乃本質之說也凡戒皆以不放逸而得本經特有放逸一品詳不放逸之可貴瑜伽釋戒標舉放逸品首頌亦有深意存焉彼引頌云無逸不死蹟放逸為死蹟無逸者不死縱逸者常死即吳譯本初頌此中不死指涅槃死指流轉跡則塗徑也云何不逸放耶謂於四所依立四種護所謂命力心行四者總攝人生之全應善護持以盡其用命為生機務使暢達勿令戕賊力為體質求其強健勿令羸弱此二皆心行之所依心則應使清淨無有雜染行則遠離邪僻直向涅槃然則戒之所以為戒不放逸而已矣又瑜伽釋第四頌云住法具尸羅有慚言諦實能保愛自身亦令他所愛此言圓滿戒學須備四義一住法謂依如來所證所說正法正律淨信修行二尸羅謂於五篇七聚學處無缺於每聚學處首尾有犯為缺如衣之缺也無穿犯中間學處為穿無斑於諸學處相續違犯為斑如衣之污點斑駁也無雜散犯不連續者為雜遍能受學三有慚謂於犯戒因緣能發露求淨四諦實謂依法對治於智者前如實自陳而得出離也次有三頌說身口意業亦有要義可資參考三止觀義佛學通軌三學次第相生以增上戒學為依遞生增上心慧學故聞戒之次應談定慧今不云定慧而云止觀者蓋有二義一示通貫二明守約若以定慧言但見次第難顯通貫本經所宗在心為法本又經言心淨則土淨由心染淨眾生國土隨之染淨云何能得心淨而不染耶是則不待外求唯在調心而已所謂止觀即調心之道也止者安心義梵名奢摩他義淨譯為寂處奢摩為寂他即是處合此二義為止此非常途所言令念不起或起不令續已也又必有其處使靜寂得所如置物然恰當其處而後妥貼質言之乃調心得安耳觀者析理之謂梵名毗缽舍那義淨譯為眾觀毗字接頭有種種眾相之意乃明察心相細微條理之義由是置心妥處復明條理此心自無不調矣心調而後定慧隨之是即不如遇常以止觀分屬定慧之拘礙而見止觀之不相離定慧中皆兼而有之乃至一切菩提分行亦無不皆以止觀一貫行之此即標名止觀既以避定慧次第之誤解而又顯其道貫之意也復次守約之道亦於止觀見之本經沙門品云無禪不智無智不禪道從禪智得至泥洹又戒慎品云以戒降心守意正定內學止觀無忘正智皆是禪定智慧之相資止觀之互濟故道安法師獲覩前偈即於禪法深悟其要今止觀併舉皆是作意思惟警策其心而令思惟而有差別者作意思惟緣能緣心謂之止即以心緣心也作意思惟緣所緣相謂之觀即以心緣心相也心起初無定處後生之心把握前心使之繫屬於色或受不失止然後生心分析此所緣相觀是則止觀之別也成實論中有種種喻分別其義可資參考舉其一例有喻刈除亂草止如把握觀則如割截也止觀如是分別猶未究竟更進乃有止觀雙運之道仍為作意思惟但作意思惟心一境性心一境性即心境共相為析理之自然歸宿佛法以種種相歸於一相謂之共相般若共相即是無相瑜伽共相即是唯識本經共相即是無常此皆止觀雙運境地法句說守約處即在此等處故徒講定慧猶不能顯必至止觀雙運而後得之也本經發明止觀要義有通說有別說通說為心意沙門梵志三品別說為惟念品先解通說心意品有十二章詳言心相躁動有待調伏首三頌釋見瑜伽如云難調伏輕躁淪墜於諸欲善調伏其心心調引安樂此瑜伽第二十五頌即心意品第二頌此謂心樂攀緣如猿之捨枝取枝難以調伏雖強納之善中而不能一向定安住非在貪等即在沈掉不寂之所於是隨欲淪墜生死而不能返若依止觀之道令心恆修善法心一境性即能如實知五欲而生厭患遠離諸染獲得解脫如是苦因既盡安住現法當來眾苦亦得永盡是故此頌即說明心應調伏之根據與不隨順所得之勝利也由是次言云何調心瑜伽釋第二十六頌云於心相善知能餐遠離味靜慮常委念受無染喜樂即心意品第三頌心之大用見於能調調心之先須識其相此心即自己之心所謂調者亦使其平衡猶如止水而已至於工夫則賴於有學與見跡有學者謂篤志斯學見跡者謂慧見諦理心契此理則歸平衡不契則成散漫又云心相不外掉舉下劣不定三種對治即有三方便謂止舉捨心掉時使之止心下劣時令之舉心高下不定時住平等捨由此止觀方便得四種功德一餐遠離味心住一境遠離習氣則能受用身心輕安是即止也二靜慮謂由淨定心相即止相續修習則於所緣境如實知其質而盡其量明辨審察而思擇之是即觀也三常委謂由止觀為依故貫徹一切菩提分法能常修習遍一切時無有間斷常遍一切處無有遺漏委此即一貫之道也四念知謂由無懈無掉心故能得最勝正念正知心善解脫永斷五蓋隨眠脫五蓋故乃於現法得安樂住此樂住即佛道究竟亦猶儒者所稱孔顏樂處且屬現前受用而非懸想當來此所以有異於外道苦行也又次詳調伏之關鍵瑜伽釋第二十八頌云心遠行獨行無身寐於窟能調伏難伏我說婆羅門即心意品第四頌上雖泛說調伏次第未說把握之樞紐所云樞紐無他當下莫放過而已當下即是與否猶在其次心有種種異名或名為意或名為識無始以來隨諸眾生自體及因所謂業惑次第相續雖無作者而有流轉但無前際可尋故名遠行心如瀑流不斷一念放過便入過去故須當下省識此就過去相言也現在之心單純而轉無餘相伴名為獨行瑜伽學系謂後心續前心依緣不同有種種行相而體無異與譬喻師說相通蓋同出於化地末系也又此心現在自體現前或為貪性瞋性痴性或餘煩惱隨煩惱性後念性有轉易不定相續不同五色根誕生之後同異勝劣既受成形即不可易也心剎那起滅一時此類心生餘時此類心滅一時彼類心生餘時彼類心滅是故當前染污之體畢竟不實名為無身即無體如是心法一面轉變不息一面染無實體即屬轉染成淨由凡躋聖之機此就現在心相言之也若於當下放過隨眠復結則於未來居四識住謂色受想行一心師言受想行乃就一心轉變行相不同而說復成心縛無有出期名為寐於窟窟即流轉寐謂難出此就未來心相言之也智者由上各相於心三世如實了知即於當下深生警惕厭患離染得心解脫斷滅我執度越流轉安住涅槃名婆羅門即淨行者此頌意說心於過去染污未來不定轉移關鍵即操之當下一念放逸則染不放逸則淨然染非心之自性剎那轉變淨乃自性握此當下一念之淨久久相續遂得淨純常途之言性淨多屬道理知見此乃實踐上由工夫而得者也如是通說調心之相以三頌盡之可謂言近旨遠瑜伽特為抉出註釋非無故矣次解別說即惟念品本經以念為止觀特殊方便念即十隨念依通常次第為佛法僧戒施天死身息寂但此中特提念息於首視為最勝方便蓋有四義一者息常隨身易為依止二者息離染淨不易生厭如念身作不淨觀易生厭世想三者隨順法想易得空觀息出入靡常勢不堅住故可觀空四者內法獨有不共外道外道有歸依及戒天死等念唯不念息有此諸勝故特重視之也此品共十二頌前九統說念息後三則說念餘又前九中初四正說念息後五別說覺寤瑜伽屬念息內念息者繫念於息以為所緣也梵語安那般那解者各異一謂安那為入般那為出一謂安那為出般那為入今考前者為舊說後者為新說因觀生死之象不同而成異說前者謂胎生時息先入而後出至於最後息出不入為死後說恰與前反緣此所見不同念息入手之先後遂異按諸學系北傳主入出息南傳出入息此經為北傳而主張同於南傳者以出化地未宗對舊說有所釐正也化地舊說與有部同主入出息頌云出息入息念謂念出入息也具滿諦思惟者謂圓滿修習也思惟即修習云何圓滿謂具備數隨止觀轉淨六相從初數息以至完淨有十六次第殊勝配以四念住從粗至細各具四種次第一身次第謂短長遍身止身行二受次第謂喜樂心行止心行三心次第謂心令心喜心攝持心解脫四法次第謂觀無常斷離滅故頌云從初竟通利也此詳見大毗沙論二十六卷我國禪法肇自安世高所譯安般守意經安般即息守意即念至隋朝天台有六妙門專著大闡念息法門然安高之書難讀天台之作寡據十六次第猶不了了其說難盡信矣今欲研究止觀唯有直採婆沙其次當讀解脫道論也由此圓滿修習所得之結果則如頌云是則照世間如雲解月現起止學思惟坐臥不廢忘後二句原意謂身心合一修無間息也次下說念息之效有三比丘立是念以下二頌說第一效謂念息通四念住於說十六次第中見之並貫攝一切菩提分法最後得涅槃界已有是諸念以下二頌說第二效謂念息可得有餘涅槃比丘悟意行以下三頌說第三效謂念息可得無餘涅槃有餘無餘涅槃之得不但由於念息更須覺寤瑜伽謂初夜後夜正勤行道乃至中夜睡眠仍繫心於光明想如是精進乃成覺寤瑜伽得盡諸漏故小乘證果最極七生除北道部外北方法藏部執定須七生餘部亦有言三生證道者其勇猛精劬實堪取法不得以小乘而輕視之也最後三頌說餘九念以施攝天故無念天開寂為空無願無相故無念寂是即本經別說止觀之義也考上座化地部原以十遍處為勝方便因遍處以地為首故有化地之號其後餘部如大眾末宗等斥為顛倒執著於非地亦作地想故為顛倒故化地末系改說道支皆念住攝及一切地與尋伺相應兩義以提倡十隨念本經於十念中復特出念息方便則益勝於前矣今談止觀法門於此念息方便極應注意願學者循此綱要自窮義蘊可也
