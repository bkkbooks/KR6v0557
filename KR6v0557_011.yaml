body:
  text: 辨中邊論講要辨中邊論為瑜伽學系根本之籍由論可見此系後起學說開展之所據要義多從此論發生又可上推此系思想本源之出於般若其與龍樹學前後貫通之處亦獲瞭然蓋般若之要雖在闡明空性然非僅就空字一面說也經文終結處特立如化品即點明另有化義在但未詳加闡發耳本論承受此種思想故詳談化義也又龍樹學宗般若而著五論首標中論以中道立宗本論為彌勒五論之首亦以中道立宗而於龍樹論所未詳盡者廣為發揮由是而言無著與龍樹學說前後一貫非謂所說一致也本論流傳中土有陳真諦唐玄奘二譯各備本釋彌勒頌世親釋番藏則於此本釋外復有安慧釋疏民十七年尼泊爾發現安慧疏之梵本寫本今已校印出版雖多殘缺然於牒論本釋之處仍可取證憑此資料文段字句不同之處頗得參校酌定大抵陳本猶存原式而義有不足唐本則文式意義多有改變今取唐本論頌為主參考餘本以發明大義詳談則有待於異日也頌曰唯相障真實及修諸對治即此修分位得果無上乘頌中揭舉七義以明道果以示本論範圍佛學之學不越道果道有二義謂所行與所以行者即就所緣能緣以明道果則行之位次段落也本論所言大乘道果乃就瑜伽學宗旨言之七義中前四為道相障真實為所行之道修諸對治則所以行之之道也次二為果即修分位與得果也所餘不共無上乘為抉擇殊勝義乃於通論外特提出以明是學所宗者也此中相言即所行境界以相分別諸法意顯其法之為何等即於諸法中以相說其意義謂此法有應知應斷應證之義障為應斷真實為應知應證云何斷障知真實故次言對治實踐由對治故而有次第分位示行有效果功不唐捐然此道果非依二乘說故於最後特示大乘不共義以為論極頌首冠以唯字即唯是七義概攝大乘道果本未更無餘義唐譯本論據七義分說七品但梵藏本止有五品合對治分位得果為一一相品是相即所應知之一切法凡吾心之所及者無不賅攝故其範圍甚廣般若經約之為百零八法更合為染淨或有為無為二法本論乃歸之一心以所應知之一切法無不與心相關連也般若平列等觀諸法瑜伽繫於一心此其所以異也是心有心法與心法性二義心法指現成之心為一切有情所現偏於染言心法性亦即此心而為有情所應成者偏於淨言如是二義相依不離即於有情現成心法上見心法性反之亦依心法性而說心法以此現成應成攝一切法而復歸之一心是即瑜伽學之特殊義提示一心二面以為行道履踐之境也論本以虛妄分別名心法空性名心法性相品所談即此二義先以九相顯示心法初合有無相說頌曰虛妄分別有於此二都無此中唯有空於彼亦有此故說一切法非空非不空有無及有故是則契中道此中虛妄分別言虛妄者即虛妄顯現分別者即此顯現之法體心色等法皆所顯現心有知而為分別法體色無知而為所顯現故此心之分別即是虛妄不實不實有二義一者欺誑不實陽焰似水渴鹿奔馳實無現似惑亂有情遂成欺誑二者遣除不實為入道賢聖所遣除故然此虛妄不實之法依其本身立說應備有無兩相所謂有者此虛妄法於能取眼等及所取色等之示現非同龜毛兔角之無故為有龜毛兔角只是想而無示現之相無者即此能所取不如衆生所執之為實法故此有無二義謂無衆生所執之能所取事而有似能所取顯現之分別相亦如陽焰似水似相不無渴鹿執實馳走唐勞而已如此虛妄分別似現為有實相為無云何於一法上有此相違二相耶論云此中唯有空故謂即於此虛妄分別法見得清淨即為空性虛妄法上必須空此執實之相始得究竟清淨即究竟否則衆生本即賢聖賢聖所為寧非多事是知空此二取之為究竟為清淨初非虛語虛妄之法本性固爾故言此中唯有空也又此虛妄分別之存在亦必依此空性而談故論云於彼亦有此也知其理則有無彼此原自不礙然衆生但見二取實相唯賢聖乃得其空性能畢竟清淨也如是一切法相歸攝一心具有無二相此非一向有亦非一向無此一向言就心法性質說非以量說故論云故說一切法非空有非不空無說者謂般若等經所說般若於畢竟空中雖空化泯然而於學行次第中固空化宛爾此不空如化之義寶積經中亦隨處可見有無及有故者有即非空謂有虛妄分別顯現似相故無即非不空謂無衆生所執二取故及有者示心法與心法性之不離由心法之無二取則心法性即自顯現復由心法性清淨無二取而心法亦自顯現也由是就依心有性邊言即無二取故非不空就依性有心邊言即有似現故說非空此即大乘所緣之境所行之中道中乃不偏著之義偏著則差之毫釐謬以千里也非謂折中大乘觀行始終不離此道無所偏著也此二頌明瑜伽學以一心有無二相釋般若等經所說一切法非空非不空義瑜伽學所緣所解所行所證所用無不循此一心即以此一心而為中道與彌勒以前龍樹所說詳略不同義固一貫也第三自相前以有無相總說虛妄分別未得其詳故復由自相分別說之以明法體頌曰識生變似義有情我及了此境實非有境無故識無虛妄分別性由此義得成非實有全無許滅解脫故虛妄分別於分別時心境俱起境為心所緣而有四類差別義者泛說一切境範圍最廣是中一分為心所執受即是有情有知覺痛癢之自體即通常所云根身也由自推他而知其他鳥獸蟲魚諸有情俱以根身為自體不但一己然也於此根身再加分別即執有自己之我在最後於一切境有種種色聲香味觸法之區別即是了別此四類境為心顯現如光照物物籍光顯非光外有物故莊嚴經論舊譯乃譯現為光也虛妄分別即能現此四類境之心是心本一因顯現程度而有粗細顯隱之差可分三類最微者雖顯現義與有情而不自覺此即所謂阿賴耶顯現較粗者為我此即所謂染污末那顯現最粗顯者為了別即眼等六識也頌言變似即是顯現謂隨心所執而顯示故似即顯現譯者取意而加變字既有能現心與所現境猶未知此境實與不實為顯斯義頌云此境實非有境無故識無世親釋此不實義列舉二因謂無行相故及非真現故似義似根即無行相行相者識緣餘法之相通常以有情即根為實根能取塵故有行相實則非根取塵死人之根即無見聞故既無行相境即不實義為器世間山河草木其無行相更可知矣似我似了即非其現所謂我與了別俱是一切法上增益名相並無實體所現不實能現亦無無即不實之義故云境無故識無也是心顯現而不實為虛妄不實而顯現為分別如是虛妄分別有而不實如幻如化故曰非實有全無頌立許滅言謂此有無於勝義中判我自宗許此虛妄分別非是全無有而不實衆生有縛虛妄分別有有脫此中唯有空要須由此虛妄分別滅然後得解脫也論文許滅故之故字為第五囀聲原是第三囀聲由字譯文改之也若謂有情本自無縛無脫不須修學便為戲論故我宗安立虛妄分別如幻如化為解脫因也第四攝相於上已見虛妄分別有而不實此言攝者即經所說三性皆此一虛妄分別心所攝也頌曰唯所執依他及圓成實性境故分別故及二空故說虛妄分別於分別中以為有種種實在之境四類境等即是三性中之遍計執性又此心分別由四緣生起四緣生心二緣生色是即三性中之依他起性於此妄分別之依他上能所執空即二取空故為圓成自性舊譯圓成為成就性謂其自性本寂非餘法使然即本性成就清淨之謂如是由一心而見三性由三性而知佛法踐行之所據即所謂入無相方便也第五入無相方便相頌曰依識有所得境無所得生依境無所得識無所得生由識有得性亦成無所得故知二有得無得性平等此云無相即由二空所顯之圓成自性通達悟入自非一蹴可幾必有方便次第此之方便乃順心之自性淺深次第而立即依三性先通達計執實相次入依他實相最後則圓成實相也依識有所得境無所得生是即第一層方便謂知所執境皆識所顯境依識有境便不實是為由遍計而入依他如於繩作蛇解此時知實是繩而非蛇也如是於唯識無境具真知解依境無所得識無所得生是即第二層方便謂實境既不可得實在之識亦無所得是為由依他進入圓成如知繩之非蛇今更知繩乃麻結實無繩性如是所執境無而能取識亦不可得即為無相由此有得無得二性平等謂之平等方便般若經中常以無所得為方便瑜伽由有所得而入無所得與彼正同皆為悟入實相方便所以論云二性平等也若以無所得作一往之談則佛法便失運用靈活之效矣所謂平等方便無他順性趣寂之次第而已第六差別及第七異門相頌曰三界心心所是虛妄分別唯了境名心亦別名心所虛妄分別以界趣分則有三界六趣以行相分則有八識五十一心所皆一心之差別相也又緣境之青黃等總相為心緣境美惡等差別相為心所心所屬心故頌言亦皆一心之異名也於此泯除分別即為一體也第八生起相已知三界心心所皆是虛妄分別之一心然此心現在如何生起未來如何相續耶頌曰一則名緣識第二名受者此中能受用分別推心所此頌明現在之生起是心千變萬化於轉變中一分為緣因也識一分為受者受用緣識為賴耶即種子習氣受者即餘七識是為心王八法由此心王心所隨行其勢用增盛者有受想思受用即受心所有苦樂捨之境遂生取捨合離之用樂境則取合苦境則捨離分別即想心所分別構畫而有種種名言生起推即思心所之推行遂有善惡煩惱別境等相繼而起也然此心所功能以受為主衆生心思不外能取所取取即是受也第九雜染相頌曰覆障及安立將導攝圓滿三分別受用引起並連縛現前苦果故唯此惱世間三二七雜染由虛妄分別此心現在生起一剎那染相不顯故於未來生起說雜染相染謂自他無益與苦相連由十二支故此心未來相續不斷於後事有能引所引能生所生之功能故十二支者一覆障故原文每句下有故字譯文省無明於境不如實知致有染為苦也二安立故行即是思由思故而有種種善惡習氣安立於藏識也三將導故由習氣故識與相感引諸有情至於生處四攝故謂諸有情攝取名色五蘊以為自體也五圓滿故由五蘊而有六處圓滿身相也以上為構成內部圓滿外則六三分別故根塵識三和合觸即生變化分別即形容其變化也七受用故即示受有苦樂捨之種種變化也凡此皆就虛妄分別習氣轉變位言有此種子不定能生故有待於第八引起故謂為愛之潤澤發生也九連縛故是即結生之取也十現前故即有謂由取故從識至受一切現行十一十二苦果故生老死現前即為苦果成熟也是即虛妄分別之未來相續不斷義也又此十二支或約為三謂煩惱無明愛取業行有生餘支或約為二謂即因煩惱業果餘支或約為七即顛倒七因顛倒無明牽引行將導識攝受名色六處受用觸受引起愛取有厭怖生老死如是種種皆虛妄分別之所生長即以心心所為依而有現未之生起相續也以此九相顯示虛妄分別瞭如指掌為瑜伽學根本之義世親最後所作三十唯識頌即從此推演可對勘明之次言所知空性此品所揭所知乃就勝義言勝即智慧義為境界智慧所知之境名勝義非泛泛之所知也上說虛妄分別為心法相今此空性即就心法性相而說相雖有殊其為境義則一也心法性以空性為名者空乃對執立名執有所蔽不得實義去蔽遣執實義呈現即為空相也此所言執就總相談故空執亦就總說大分五段頌曰諸相及異門義差別成立應知二空性略說唯由此此五段義一相二安立謂建立空性此義分四謂異門異門義差別分位及所依差別相成立如是五段略即二空性所謂生空空衆生執法空空法執是也空相云何頌曰無二有無故非有亦非無非異亦非一是說為空相空亦訓無為遮遣之詞就其所遮遣言謂空二取能取眼等六根所取色等六塵無凡愚所執能所內外等執也無二為空乃空之一面亦普通之說瑜伽言空不但為無亦有有義謂二性則無二無之性則有合此二面而說非有亦非無始盡空義此瑜伽系解空之特見而中觀家斥為自語相違者是蓋不明瑜伽學者之說空由所依而顯就所依言即應有空性如室中積物有物無空有空無物兩不並立今所說空亦復如是執在非空執無空顯故此空性即由所依顯也所依者何即虛妄分別是以論初立之為有謂其非空非不空有無及有故也又此空性與虛妄分別亦復非異非一非異者謂妄分別為法空性為法性法上所見之空理法具空理故判為空猶之法具無常苦等理得判法為無常苦等故不應是異也若謂法性於法外別有者是必另有餘法為共法性則犯展轉無窮過失然亦非一法為自相各各別故法性為共相一切法上一味相故若是一者法應適於一切法性應各各差別則二者俱壞又妄分別為染因十二有支染法由妄分別生起空性為淨因種種功德緣空性而生起染淨亦不可混也復次虛妄分別歸之於一心即衆生心於此心上以無二有無之義乃得窺見心之淨性亦即心之法性通常談所知相僅及虛妄分別猶覺不足佛法拘拘言一心者為得心之淨義必須進至空性即淨而後圓滿所以談唯識者亦不可局限於虛妄分別必須理解至唯識性方為究竟此處不言唯識性而曰空性者瑜伽承繼般若而來故仍沿用空性之名耳下文出其異門頌曰略說空異門謂真如實際無相勝義性法界等應知由無變無倒相滅聖智境及諸聖法因異門義如次此言空性異門及異門義言真如者謂無變義常如其性而無有變也實際者謂無倒義法與法性各如其性而不顛倒空性亦真實之邊際故名實際無相者謂無一切差別相而以大總相一味相為相亦謂之無相相也勝義性者即諸聖智所行境界法界者謂此空性為聖法無漏法清淨法還滅法之因心若緣此空性則淨法起故名法界常人昧於空理以為空即空無一物不知其有餘義餘名不僅限於無也空差別者頌曰此雜染清淨由有垢無垢如水界金空淨故許為淨空雖一味相而依分位有染淨差別空不顯現或顯而不全於此假名為染非空性有染由分別執著垢染故執垢既除假名為淨此中先染後淨全依分位之別非轉變無常也喻如水界本無染淨塵垢名染塵去為淨水性如故金界空界亦復如是空性有此染淨分位之辨者示人本淨不足恃必須有捨染取掙之功耳上言空性差別依時間先後立說今此從事類明之空性雖一由事類所見不同故有種種假說此說亦出般若般若一二分中說空有二十及十八種三五分中則列舉十六種本論即據十六種說也頌曰能食及所食此依身所住能見此如理所求二淨空為常益有情為不捨生死為善無窮盡故觀此為空為種姓清淨為得諸相好為淨諸佛法故菩薩觀空補特伽羅法空性俱非有此無性有性故別立二空此十六空不立空名但釋其義總分三類一者空境二者空之所為三者空之自性初談空境而有六種周遍一切總對世出世間所執而言世間凡夫沈溺一我攝取他法以益自體而為受用喻如飲食而有能食之根及所食之塵然而析此根塵都無實義般若經中依此能食之根無有說為內空所食之塵無有說為外空如是內外能所之依為身亦復不實名內外空此身所住器世間其量廣大而亦不實名為大空此就凡夫有我執受用者說也外有出世有學雖無受用我執然有能所之見如謂有能見上四空之空智及所見之如理勝義境相是亦為執亦復應空去空智執而曰空空去所觀勝義境相執即勝義空也次言空之所為此乃大乘要義學佛之人於此內外世出世法解之為空並修習空觀者誠有所為也所為云何論說八種一二者為求二淨故觀空二即道滅二法如次為淨因淨果有為法無為法也菩薩為求此因果二淨不使著意墮執觀之為空謂有為空及無為空是即用空之義也三者為常益有情故觀空於諸有情不生執著觀畢竟無有為畢竟空四者為不捨生死故觀空即於生死觀無前後際常益有情是為無際空五者為善無窮盡故觀空謂所修善法由積集故至於究竟圓滿而不散捨觀之為空為無散空六者為種姓清淨故觀空種姓自體本有為善積之本如世言立志有志而後有行種姓日淨則善法日積依此觀空為本性空七者為得諸相好故觀空修學者以佛為歸於佛相好功德皆得圓滿以此觀空是為相空八者為淨諸佛法故觀空欲滿佛之實際種種功德不應執展轉增勝至於無極名一切法空如是八空為大乘之不共殊勝義而為用空成佛之所應明也最後二空為空之自性即生法二空所謂無性空無性自性空也於生法執無而成其空即無性空此去增益執所計生法無故然有無性自性之空性在於此而空即無性自性空此去損減執無所計生法性之性有故如是增減除遣本性顯現即契乎空之自性矣此十六空攝空義盡安慧於此段論有詳解大同中譯十八空論可資參考十八空論乃會通般若二分之作最後四種即本論後二所攝十五不可得空十六無法空合為無性空十七有法空十八無法有法空合為無性自性空成立空性差別者頌曰此若無雜染一切應自脫此若無清淨功德應無果非染非不染非淨非不淨心性本淨故由客塵所染此乃以染淨差別明示定有染淨之理也若謂空性無染一切有情應本解脫無有流轉理實不爾若謂空性本染對治修習唐勞無果事亦不然故知衆生實有染淨必由對治修習然後清淨理實如是徵之教證亦復如是所言教者即大小乘所共認之心性本淨客塵所染教也依於凡聖之心實有染淨分位差別故此教亦從非染非不染非淨非不淨四面立說不言空性而言心性本淨依衆生心說於此空性假名為心即於心法上所見之空性故說心性本淨也此句應讀如心性本淨性本淨即本性淨自性淨之義與孟子所云之本性同但為當然而非已然且須於見時證時方知其本然也如是本性清淨之心故曰非染然事屬當然應淨現實未淨故曰非不染又本性淨心已為客塵亦名煩惑雜染相雜不離非染著義故曰非淨但此煩惑實為偶然而可去者故曰非不淨此即佛所說教可知染淨分位成立無疑後人復有以世間修善法與出世修善法區別空性非染等四義者謂世間修定以地九地分別離當地垢曰非染未離上地垢曰非不染故以世修言染而不染空性雙簡故云非染非不染也出世修善以品類別未斷細惑故非淨已斷粗惑故非不淨空性亦雙簡之此後人引申之義也又世親釋番本後多數句云為斷戲論恐懼懈怠猶豫故說空性五段義為斷戲論說空性自相即第一段為斷恐懼故說空性業相即第二三段恐衆生聞空而懼說真如等異門為斷懈怠故說空性染淨相即第四段恐衆生聞性本淨懈怠不加修治為斷猶豫故說空性種類行相即第五段綜合虛妄分別及空性二相為所知相瑜伽學系踐行宗要略具於此今更以三語明此行踐之義以作結論一曰反之於心衆生心行外逐於物如犬逐塊不解物之實相煩惑隨起妄執隨生是謂塵染若欲離惑得物實相勢必反之於心而後可本論於論端出示虛妄分別即所以為衆生指歸也近世西洋相對論將時間納入事物以得物之實相時間之意義不離此心亦反心而物之實相乃明者也二曰契之以性此性有理法性法爾本然等義衆生踐行如何始愜當合理而不顛倒此必契之以性也評判物之好惡而有取捨愜心則取否則捨之如虛妄分別契之以性則不愜故可滅也有如通常於苦空無常無我四義有倒非倒之判實由契之以性而見耳三曰驗之在事既有必契之性以感觸當於種種事上歷觀法空以盡其用也如是三層義理實集瑜伽學之宗要反之於心契之以性得虛妄分別之實與取捨之感覺是聞思事驗之以事得空性之淨乃修習事若由虛妄分別而知有三性復由三性而知圓成空性則三事之功畢矣此品要義為後此諸論所據者也二障品初品辨相歸結於染淨虛妄分別偏於染所知空性偏於淨而染於淨之關係為障有染法而淨相不顯此一障也有染法而能見淨智不起又一障也前障所見後障能見今辨障法先明其障次及遣治此仍屬境界邊事也初總說五種次別敘五種末結說二種共有十二初總說中乃合聲聞菩薩之共不共言本論是大乘學瑜伽談大非與小對實涵蓋小乘而言故其範疇更寬內容更富是之謂大也初總說者頌曰具分與一分增盛與平等於生死取捨說障二種姓一者具分障謂具有全分周遍之意菩薩種姓志在成佛故無所不知無所不學而為此一切法之障者即煩惱所知障也二者一分障聲聞急務在解脫生死而於一切智智毫無希求故其為障止取煩惱一分耳三者增盛障學道之人氣質偏倚有貪行人瞋行人癡行人隨一偏勝障之勢力亦隨一增盛也四者平等障即等分行人於貪瞋癡行平等無倚之障也五者取捨障謂於生死涅槃有取捨心而為障菩薩行人若於生死一向樂取則同無種姓一向厭捨則同小乘人皆足為障也如是凡法能為聲聞種姓菩薩種姓障者無論其人之氣質偏倚中和都不免此五種障法次別說五障者初二就障因言後三就障果言就障因言有共不共初言共障頌曰九種煩惱相謂愛等九結初二障厭捨餘七障真見謂能障身見彼事滅道寶利養恭敬等遠離遍知故言共二乘障者即煩惱障此有根本與隨煩惱之別俱是不善心所煩惱即障故名煩惱障是為菩薩行因障而共小乘者此九法亦稱九結與苦結合故名為結謂愛恚慢無明見取疑嫉慳是也前七中見開為三取開為二合為十種根本煩惱後二即隨煩惱如是九結是煩惱相即以煩惱為自性之障也從所障言愛障出離出離之機在厭厭者不安不足之謂愛則隨處貪著而不能厭也恚障棄捨出離須捨有恚則稍不稱意嫉恨不捨也此初二障如次障取淨障捨染餘七則總障真見真見者能見真實之謂即是遍知三慢障身見遍知若於身見徹底了知而後能斷有慢則不能知也四無明障身見所依事遍知身見依五取蘊實為無常苦空無我由無明故遂顛倒執我我所也五見障滅遍知滅須循知作證有見則怖畏誹謗也六取障道遍知見取戒取非正道行故能障正道也七疑障寶遍知若於三寶猶豫不信不依即不得入道之門也八嫉障利養恭敬遍知務求勝人嬌僞自飾以自陷溺所謂聲譽過情也九慳障遠離遍知貪得無厭不能寡欲以是為出離障也如是九結能障菩薩二乘故名共障第二言大乘不共之障此有三十種不限煩惱而有不善別境邪行心所在內能障十種善法頌曰無加行非處不如理不生不起正思惟資糧未圓滿闕種姓善友心極疲厭性及闕於正行鄙惡者同居倒粗重三餘般若未成熟及本性粗重懈怠放逸性著有著資財及心性下劣不信無勝解如言而思義輕法重名利於有情無悲匱聞及少聞不修治妙定所障善法云何頌曰善菩提攝受有慧無亂障回向不怖慳自在名善等如是善等十各有前三障前五頌為三十障事障善等十法如次攝之各有三障菩薩之行始自種植善根終歸菩提故第六頌善與菩提為標舉以下八種為釋成攝受等七種釋成善根自在釋成菩提自在即菩提以有智斷力之因也無加行非處加行不如理行不得方便也為善根之障不生善法不起正思惟資糧未圓滿為菩提之障闕種姓闕善友心疲厭性為攝受之障攝受即發心發心而後有菩提意樂而後能攝受一切善法一切有情也然內須種無闕心力勇猛外則須善友提攜也闕正行與鄙者居與惡者居為有慧障慧謂簡擇菩薩所以不共於小乘者即有此簡擇善惡之慧也倒粗重煩惱業報三障中隨一有餘性般若未成熟為無亂障無亂未見道也本性粗重懈怠性放逸性為無障障障滅名無障即是修道本性粗重為俱生煩惱之習氣前顛倒粗重乃分別煩惱之習氣應行不行為懈怠不應行而行為放逸也著有著資財心下劣性為回向之障回向者擴充心量之謂不信無勝解如言思義為不怖之障輕法重名利於有情無悲為不慳之障不怖則成己聞深理難行而不怖畏即為未來信解之依也不慳則成物不慳即捨則無行而不能行成己成物正菩薩行之妙用也匱聞少聞不修治妙定為自在之障如是無加行等三十事礙善等十法為菩薩行不共之因障也次言果障亦有共不共義所云共者即菩提分不共者則十度十地頌曰於覺分度地有別障應知先言共障菩提有三十七種合為念處正斷神足根力覺支道支七類於此七類各別有障頌曰於事不善巧懈怠定減二不植羸劣性見粗重過失事謂身受心法心於身等正念而住謂之念處於事善巧正解為念處果不善巧即其障也正斷之果為勤懈怠即屬其障神足之果得欲等四定信等八行於二隨減一種均為之障根謂善根不植即為果障力謂善根增盛羸劣即其障也覺分之果為如實見即是見道煩惱邪見乃為果障道支之果為斷習即是修道粗重即其果障凡此皆大小乘共之果障也次不共障中先說障十度果障頌曰障富貴善趣不捨諸有情於失德減增令趣入解脫障施等諸善無盡亦無間所作善決定受用法成熟富貴為施果慳吝等即其障也善趣為戒果殺等惡業即其障不捨有情是忍果忿恨等即其障過失日減功德日增是精進果若知惡不捨聞善不改懈怠乃其障能令趣入正法是靜慮果散亂即為其障能令解脫是般若果惡慧愚癡即其障上為六度下四度由慧開出方便度者謂有方法若以施等回向無上菩提菩提無盡回向於彼亦無有盡是故方便無逾回向願度者謂精進無間事業雖有間歇而心願則無斷也力度者謂所作善決定成就如理作意鍥而不捨即得決定也智度者謂能施設第六慧度乃平等無分別智此第十智度即超出無分別之施設自在善巧更為難能凡反方便等即為四度之障也已言十度次明十地果障頌曰遍行與最勝勝流及無攝相續無差別無雜染清淨種種法無別及不增不減並無分別等四自在依義於斯十法界有不染無明障十地功德故說為十障地謂極喜等十地乃隨十度增盛而設如次於初地施度增盛以至十地智度增盛也十地所擴即所證之法界為驗之在事以淨其性法界即是空性不謂空性而言法界者空性為淨法之因又為清淨智所緣名之法界意更昭著也所證法界十義不同故所起之十行各勝而其功德亦各自究竟如是十地所證所得皆是果障此十地是為果障此障名不染無明無明有二一者染污無明與餘煩惱同起招生死果為生死本即十二有支之初支也二者不染污無明不與煩惱同起為所知障障十地所證之法界也二乘非無此法但不礙其解脫以彼不求一切智故總一不染無明就其所障之十法界言遂亦說為十種也十法界者非法界有十乃法界有十義之謂也初地所證為遍行義平等行遍一切一味發心菩薩一入見道即證此法界則能平等布施故初地中施度增盛不染無明不斷即能為障餘地準知第二地證法界最勝義由得法界平等於一切行遍修出離即能得法界最勝果垢無不盡而窮極戒之用也戒即離垢之義三地證法界勝流義謂所證法界是佛清淨法界等流為求法故投身火窟亦所不辭故忍度增盛四地證法界無攝義謂不與戲論相涉即是精神專一於志不棼五地證法界相續無差別義謂由此得十意樂平等淨心即是定境六地證法界無雜染清淨義謂無染淨故本淨客染而於緣起法善巧故慧增勝七地證法界種種法無別義謂不取種種法相唯方便善巧為能八地證法界不增不減義謂於此證得無生法忍於垢淨法中得四自在一無分別二淨土三智四業初二為八地願力所增盛九地證法界智自在依義即力度增盛十地證法界業自在依義智度增盛如是十法界唯不染無明能為障也別障已談茲總結前說攝為二障頌曰已說諸煩惱及諸所知障許此二淨故一切障解脫前說諸障總為煩惱及所知二障攝此二障滅盡即歸解脫然煩惱與所知障均是心所心所必與心相應而起二不離故此心即為虛妄分別若彼純淨便得解脫所以論有許滅得解脫之義也蓋虛妄分別與障相應即有染不淨離染障除則與障相應之虛妄分別滅也又虛妄分別範圍頗寬其中亦有空性故而為正行所依邪行不淨為正行障虛妄分別因以增盛必籍正行乃能止息是故學佛旨在如理作意端其正行則一切障淨自然功德熾盛佛道成滿辨障之義於此觀止三真實品真實之義與諦相當乃虛妄之反面也此品由空性相應以觀所知諸法而見其真實之義前言實際相品空性異門乃依空性相應而觀之為不倒倒為虛妄是染是障不倒即去障離染之謂然必心緣真實始能令障不生故今特出此品以為履踐之道也尋常人以為無障無妄即是真實所以視禪家常言不用求真但須息見見即妄即障本宗不然要心緣真實而妄始不起此處工夫即與尋常迥異以經觀之佛法根本理應如是金剛經言佛飯食訖亦正念而住即示此心當繫於正理也正念之得於本品詳明品類差別列舉十種此佛深密意之所依示人依此旁通餘論耳頌曰真實唯有十謂根本與相無顛倒因果及粗細真實極成淨所行攝受並差別十善巧真實皆為除我見頌言唯者係就本論所舉者言十有本末本即三自性餘之真實皆依之顯現安立非由之發生而成了義餘九亦有次第前四相無顛倒因果粗細偏於出離就煩惱障而言遣除煩惱即得出離解脫也後五極成淨所行攝受差別善巧偏於安立就所知障而說煩惱但障不解脫而已所知能障一切法不得盡其量欲使諸法盡量則非安立種種真實不為功末對我見而言十種善巧如是十真實中先言一根本真實所謂三自性頌曰許於三自性唯一常非有一有而不真一有無真實此中三性於虛妄分別上安立前言反心契理即在此上顯也真實是以空性相應說之是心若與空性相應則知心實無遍計自性此無非本有今無乃畢竟無如石女兒故計執之云真實以常無為真實也心之依他性以有亂識為空性所依故有而不實心之圓成性則有無俱實無即徹底無無二取故有亦徹底有有二無故如是執無而性有法爾不變故有無真實也此心之遍計性乃凡愚於心上所顯現法所起之增益諸執故有人法能取所取能詮所詮等計若心緣真實則得其本無之實性也依他則為因緣生法由習氣故而有亂識顯現似人法能所等境以為迷惑生起之因由彼為染淨縛解所依故是有由彼亂識應斷應滅故非真真則不應滅也圓成性乃畢竟遠離執著者也所謂心性本淨之本淨處雖有煩惑相雜而不相應也是三真實實即是一一空性故三義一貫為真實之本即佛說之諦二相真實頌曰於法數取趣及所取能取有非有性中增益損減見知此故不轉是名真實相若言出離首須離增上慢此慢執無為有習非成是為一切顛倒之本以無為有者亦必以有為無習非成是者亦必以是為非如是顛倒迷亂則法之真相蔽矣此慢有三一人法二能所取三有無人法為假名若執以為實有則增假名亦無則減於此人法離增上慢相得其實相即三性中遍計真實也又能所取為依他性之亂識於彼離增減見知其有而非真即三性中依他真實也又有無者如實知有與非有離增減執即三性中圓成真實也相真實者謂知相真實則增上慢不起於遍計知為假名相依他知為亂識相圓成知為無性自性相於此不著即不生起人法等執是為相真實也常言實性實相即指此相乃出離之首此慢遣去然後對治之功可談也三無倒真實以有迷倒則障出離世間迷倒即常樂我淨治此四倒為無常苦空無我四無倒凡此仍依三根本真實說也頌曰無性與生滅垢淨三無常所取及事相和合苦三種空亦有三種謂無異自性無相及異相自相三無我如次四三種依根本真實無常等各有三種無常三者一無性無常謂始終無有是遍計性二生滅無常謂因緣無常待緣起盡是依他性三垢淨無常謂空性本淨而有分位差別亦為無常是圓成性苦三者一所取苦謂本自不苦執取生苦是遍計性二事相苦謂即此苦事是依他性三和合苦謂自雖非苦與苦事相依是圓成性空三者一無性空謂常無性故是遍計性二異性空謂非其體性故於此性上無彼異法由異法無謂之異空是依他性三自性空謂空之當體是圓成性無我三者無我與空同事而異安立泛說為空有體可指即無我也一無相無我謂相本無說為無我是遍計性二異相無我謂依他性異計我相是依他性三自相無我謂即此自相所顯無我是圓成性四因果真實即四聖諦與小乘相共之出離方便也頌曰苦三相已說集亦有三種謂習氣等起及相未離繫自性二不生垢寂二三滅遍知及永斷證得三道諦苦集滅道均依三自性說其行相苦三已說今言集三一者習氣集為苦因由遍計執而生習氣故二者等起由依他性相依而起如惑業有支三者相未離染謂空性本淨未離染時空性不見為相即屬圓成滅三者一自性滅謂遍計性原無不生二不生滅謂依他性習滅能所取不生三垢寂二滅垢有二種謂煩惱垢貪恚煩惱等及所知垢不染無明此二垢滅俱依圓成性立垢滅即擇滅寂滅即真如也道三者一為遍知道於遍計止有遍知二為永斷於依他性具能知能斷有故須知不實故須斷三為證得於圓成性能知能證圓成須證者以是心之當然性雖本淨而有客塵今離垢成淨故謂之證又依遍知言遍計圓成屬知遍知依他性屬斷遍知又依證言遍計依他俱是知證圓成實性唯是得證也五粗細真實頌曰應知世俗諦差別有三種謂假行顯了如次依本三勝義諦亦三謂義得正行依本一無變無倒二圓實粗細真實為大乘出離不共方便大乘出離道依於言教不離世俗名言為粗真實即世俗諦此有三種謂假行顯了依根本真實如次顯示假謂施設但有名言而無別體即遍計性行謂行於名言以名言為境有種種分別故是依他性顯了謂籍名言而顯義是圓成性圓成本與名言無關然籍真如實際等名言而顯其義也又細真實即勝義諦此亦有三謂義得正行義勝義者乃勝智境勝智為無分別智義即是境即為真如得勝義者益中之勝義為利益之意乃擇滅涅槃得即擇滅以智慧揀擇而得滅故正行勝義者以勝法為義境殊勝故即是聖道如是三種勝義真實於根本實中圓成性攝有疑真如擇滅是無為法固是圓成道係因緣所生有起滅始終前後分齊相待而成此有為法何亦攝屬圓成性耶此有二義一者無變謂真如擇滅依離垢假說為滅以此總攝無為果義二者不倒謂彼聖道於佛勝境不顛倒故以此總攝有為道因大乘不共出離方便先由言教而後有離言之證故於二諦不偏廢也上言出離偏就煩惱障說次後五種則為安立依淨所知障說若於所知微有障蔽安立即不如實安立真實先由極成如是先言第六極成真實頌曰世極成依一理極成依三極成者謂所安立不違世間此有二種一者世間極成謂由隨順世俗串習所生之智慧分別所謂不壞假名如說此是地非火色非聲等與世共許此為根本實中之遍計性由名言而成故安立者乃賢聖於凡夫所取之方便若聖與聖便不須此對凡安立故須世極成也二者道理極成此偏於證成道理而說乃依現比教或聲三量而知即道理義本此三量而證成也此道理真實通於三性七所行真實頌曰淨所行有二依一圓成實淨謂智慧智慧所行即實有所見是勝義境界非前說二種凡見也此有二種一為煩惱障淨所起聖見二為所知障淨所起聖見如是二種由證見真如擇滅而然故為根本實中之圓成性由此所證見之真如擇滅為安立之本而以世間道理二種極成為其方便又所安立為三量而能安立則二障淨也八攝真實頌曰名遍計所執相分別依他真如及正智圓成實所攝安立範圍盡攝諸所知法一切所知不外名相分別真如正智五事也以染淨別前三為染後二為淨名為遍計以是無故名言本身屬依他與彼相繫則為遍計相及分別由習氣起為依他性相為所分別分別為能分別俱待計執能執之習氣起故為依他真如正智為圓成性如是染淨能所五事概一切法即所安立之範圍也上言能安立下言所安立九差別真實頌曰流轉與安立邪行依初二實相唯識淨正行依後一真如本無分別而有差別者就所依義說此有七種一者流轉真如謂總說有漏法為流轉性其性始終不變即如二者安立真如謂分說有漏法有漏之果為苦此苦則就其所依止之異熟心身上見出其性不變即如三者邪行真如不如理行為苦集因就其不變之性亦名為如此三真如依本實中初二而說四者實相真如謂一切法二無我性也五者唯識真如謂一切法不離心之所了而存即唯識性為如六者清淨真如謂一切法有離垢性即滅諦為如七者正行真如謂有為法可得清淨謂之正行即道諦為如如是四種真如由實相唯識而有正行由有正行而得清淨悉依圓成性立也又圓成有二謂有為無為實相清淨為無為唯識正行為有為此皆依真如所依不同差別安立有此安立而後衆生方有入處此就世間不共而言其次就世間相共而說十善巧真實頌曰於蘊等我見執一因受者作者自在轉增上義及常雜染清淨依觀縛解者性十善巧者謂蘊界處緣起處非處根世諦乘有為無為也為對治十種我見安立十種善巧善巧者謂於十義熟習則所執一因乃至縛解等我即得除滅如是十法各通三種根本真實如蘊等所執義為遍計性緣起義為依他性法性義即蘊遠離種種執著者為圓成性如蘊界等亦然下分別說十善巧對十我見初蘊善巧對破執我是一見頌曰非一及總略分段義名蘊蘊之實義有三一者非一蓋蘊以同類相合為聚如色有過現未內外粗細等色攝為一聚名為色蘊是故蘊性非一二者總略如言色不論過未遠近總說為色經言如是一切略為一聚故三者分段謂各各色類各有界域以此三義安立蘊義便知絶無單純是一之我在也二界善巧對破執我是因見頌曰能所取彼取種子義名界界者因義謂根境識之種子將來能生故以界義觀諸法則知為因者但習氣而已則破執我是因之執三處善巧對破執我是受者見頌曰能受所了境用門義名處處者門義受用出生處故受用之事由根境和合而有以處義觀受用即破我是受者性四緣起善巧對破執我是作者執頌曰緣起義於因果用無增減因果用三無增減是緣起義以緣起者此有故彼有此生故彼生乃相待而起於中因果用義實無增減就生死言無明因緣因行果由無明觀行即因無增減由行望無明即果無增減無明為緣而行用生即用無增減此中實無作者即遣作者實性五處非處善巧對破執我是自在轉性義頌曰於非愛愛淨俱生及勝主得行不自在是處非處義此因能生此果名處此因不能生彼果名非處果必待因不得自在是故於非愛果定知由惡業生故由妙行故生於善趣愛果由斷五蓋修七覺支決定能作苦邊際故清淨果一世界中決定無二如來二輪王俱生故又勝主及無上菩提非女人分故殺害諸事非見諦者所行故如是七種繫屬於他果不自在攝因果事盡觀此即破自在之我執也六根善巧對破執我是增上見頌曰根於取住續用二淨增上根為增上義就人事言有二十二根上處非處就一切因果言於取住續用二淨六事有增上義內六根於取境有增上義命根於住一期相續男女根於相續家族樂等五根於能受用善惡業果信等五根於世淨未知等三根於出世淨等俱有增上義由根義觀察增上即破增上我執也七世善巧對破執我是常見頌曰因果已未用是世義應知時之實義於因果上見因能取果果受因成因果取受之用已盡假名過去因果取受之用未現假名未來因之取用已盡果之受用未了假名現在是為時之三世安立知此則明實無常住不變之我而遣常執也八諦善巧破執我是染淨所依性頌曰受及受資糧彼所因諸行二寂滅對治是諦義應知應知四聖諦受及受具資糧為苦諦佛說一切受苦謂樂受壞苦苦受即苦不苦不樂受行苦彼所因諸行為集諦是受及受具因故如是苦集二種究竟寂滅無餘及有餘為滅諦正行為邪行對治故是道諦以諦義觀一切法唯有染淨因果諸法並無有我為染淨所依性也九乘善巧對破執我是觀行者見頌曰由功德過失及無分別智依他自出離是乘義應知諸行道者此處名乘乘有三種一者由聞佛說涅槃功德及生死過失而生出離之智依此智得出離者是聲聞乘二者不由他聞而自起智慧出離者是獨覺乘三者亦有同佛勝義於涅槃功德生死過失無分別故由是無分別智不依於他自然自起自起者非不依教乃由教自證自得即為大乘如是安立三乘知乘實義即破執我是觀行者執十有為無為善巧對破執我是縛解者性見頌曰有為無為義謂若假若因若相若寂滅若彼所觀義有為無為為所觀行假因相三為有為種種名言謂假名言習氣謂因名言之依謂相即一切心法之見相分如是有為生滅不常可敗壞故無為有二謂寂滅及義真如寂有能所所寂為擇滅能寂是道如何能寂則須憑依所觀之義義即真如也謂以真如為義為依始有擇滅於此安立無為有為為縛無為為解由此以觀縛解實無縛者解者則破執我是縛解者性執如是十種善巧乃對十種我執安立知此安立實義乃盡總之真實雖有多種其極致則唯一空性而已如三性真實法界一義盡之二諦一勝義諦盡之四諦一滅諦盡之由是法界一真而已此即辨真實義所應知者也四修對治品以下三品梵藏本合為一品均談修事即修對治行也前言染垢障此行與之相反能對治障故名此行為對治修者習義反覆時習成熟有力而為修也前三品談所行之道此後即言所以行之道修有次第故有分位為修分位品隨其分位各有成就即彼修果為得果品果有分有全表行之成就不必全而後為果也此三義一貫故梵藏本合為一品言之對治行先就三乘所共者而談此可概攝於菩提分以一切對治皆不外此蓋菩提為所趨之的分者因義品類義謂此品類正行皆可作菩提之因故總名菩提分法此有三十七事略為七類以明次第生起之義即三乘之共道也初為念住頌曰以粗重愛因我事無迷故為入四聖諦修念住應知念住主體為慧以慧曠觀諸事而得身受心法之實義前云真實乃於此身受心法上見之所謂驗之在事也慧由念力念即記憶又心思專一為念安住身受心法即能了解四諦謂之諦真實此為三乘所共皆由見諦而出離故四念住由粗入細由顯之微今先觀身以身相粗重而非輕適最難調攝為苦之因觀此能入苦聖諦次觀受身與物合種種受起謂苦樂捨苦則求離樂則欲合捨雖時離時合而味定之徒亦復求其不離凡此皆為渴愛之因是即為集觀此能人集聖諦三觀心心為身之主凡愚執為我體故有我思故我在之言觀此實相有心無我我執即滅由此能入滅諦四觀法法為心之一切染淨境界於此有應行淨不應行染觀之無惑即入道聖諦也如是觀此四念住即為入諦之理是即初步修也第二為正斷頌曰已遍知障治一切種差別為遠離修集勤修四正斷正斷以精進為主以勤能斷所治法故此亦有四於所不取者是不善法已有應斷未生應防於諸善法生已增長未生引發此皆由一勤而能之功夫得成片段皆勤之力所以儒者孳孳為善亦以勤為入德之門也前觀念住苦集為障應當遠離滅道能治應當修集故此四正斷即修行之第二步也第三神足頌曰依住堪能性為一切事成滅除五過失勤修八斷行懈怠忘聖言及惛沉掉舉不作行作行是五失應知為斷除懈怠修欲勤信安即所依能依及所因能果為除餘四失修念智思捨記言覺沉掉伏行滅等流神足者神謂功用之妙即應用無方足為安立處於此功用而知安立之處為神足是有待於定而後能也此亦有四謂欲勤心觀依前斷防精進而心有安住之用心住則定定則能堪任成就一切事物事即神妙之功用也是謂神足然心有五過失不得安住須修八斷行以治之云何五失一者懈怠障修善行而增不善二者失念於諸聖言忘失不記三者沉掉即心散漫起伏不定四者不作加行謂於對治沉掉使心安住不作加行於沉者不以舉治掉者不以止治五者作行於沉掉對治之後功行不息矯枉過正仍令心起伏不平也八斷行者為除懈怠修欲勤信安蓋精進能治懈怠然勤依欲起無欲不勤是故欲為所依勤為能依又須於真實義諦先有信解而後願欲方生故信解為欲動之因勤之果則身心輕安也為除餘四失修念智思捨修念行即除失念於諸聖言明記不忘修智行即能正知沉掉之失修思行即能於覺沉掉時隨起伏除加行修捨行則可免除過失分行即不應行而行沉掉既息心即住捨平等而流也由此知定心之起由八斷行而除五失得四神足即能顯欲勤心觀四中以勤為主之用也是為第三行上來三類為初學者用功之事判其分位則順解脫分勝解行地此段之行以解為主次後即順抉擇分為四加行地四加行與正抉擇鄰近故謂順抉擇分行將見道勵行自勉也第四為五根頌曰已種順解脫復修五增上謂欲行不忘不散亂思擇已圓滿順解脫分復修信勤念定慧五種以為發生抉擇之根使之能生抉擇正智頌中欲即是信善法欲增上即信之因信即此欲之果也行為加行即增上精進使善法自成片段也不忘即念不散亂為定思擇為證前四修善猶如萌芽到此乃有根用進而破障出生即有力用故第五說五力頌曰即損障名力因果立次第順抉擇二二在五根五力根力增上而能損障即謂之力此信等五有因果次第生起義謂由信故勤由勤故心住正念由念故得定由定故生慧又順抉擇之四加行為暖頂忍世第一法前二暖頂為根後二忍及世第一法為力蓋信等五法有下中上三品五法下品為暖中品為頂上品復三下中為忍上上即世第一法若依五法三品以觀根力則下中為根上品為力第六覺支頌曰覺支略有五謂所依自性出離並利益及三無染支由因緣所依自性義差別故輕安定捨說為無染支覺支為見道乃正抉擇分也此覺即現等覺謂於實境親切領會故稱見道見道中菩提分為覺支此非一事所成廣有七種略為五支一者謂念是覺所依二者擇法是覺自性三者精進為覺出離四者喜為覺果利五者安定捨為覺對治是無染性無染之因為輕安所依為定自性是捨是行捨非受捨心無所著故第七道支頌曰分別及誨示令他信有三對治障亦三故道支成八表見戒遠離令他深信受對治本隨惑及自在障故見道後斷除習氣則為修道事此有八事略為四種一者分別即是正見於見道所見復加區別也於智中為後得智二者誨示即正思惟謂自得已尋思而以正語示人也故亦為正語一分三者令他信即是正語正業正命由正語故知有勝慧由正業故知守淨戒由正命故知能遠離四者治障即正勤正念正定由正勤故治根本煩惱由正念故治隨惑沉掉由正定故治自在障即能引發殊勝功用從初學以至究竟不越此三十七事雖有七類實僅十法耳然而此修於分位差別亦有三種故次談修治差別頌曰有倒順無倒無倒有倒隨無倒無倒隨是修治差別此修差別總略為三一者有倒順無倒見道前有漏異生隨順無漏勝教謂之初步發趣行地二者無倒有倒隨見修道中雖於事親切無障而伏惑未盡仍有倒隨謂之至得行地為有學位三者無倒無倒隨伏惑盡淨等流無倒名成就行地為無學位三乘共義如是觀止然即此亦有不共義在故次說菩薩二乘修治差別頌曰菩薩所修習由所緣作意證得殊勝故與二乘差別菩薩二乘雖同修一法而其意樂境界自有差別一者所緣差別小乘所緣狹陋唯以自相續身受心法為境而修對治菩薩則統攝自他身受心法為所緣也二者作意差別二乘思惟行相唯以無常為限菩薩則以無得無分別智思惟而修對治無得無分別即能平等自己無一毫執著意思也如稱稱物得當即平等也三者證得差別即所至境界小乘造詣離繫而已大乘則於生死涅槃兩無所住故能拔濟無量衆生成就廣大佛法此普賢宏願泛舟中流不住兩岸也是即三乘之共不共處五修分位品對治修有漸次故有分位此有十八前九為泛說後九依菩薩行而談也頌曰所說修對治分位有十八謂因入行果作無作殊勝上無上解行入出離記說灌頂及證得勝利成所作泛說九位者初為三乘住種姓之因位發心之後乃進入加行為入位加行為行位由加行得至果證為果位有學障未盡故為有作位無學究竟淨故為無作位已成就種種功德為殊勝位超越二乘入菩薩地為有上位究竟成佛而無勝上為無上位也次菩薩行地九位者地前為解行位由信解而起行故初地為入位乃正見道也從二地至七地為出離位漸次出離一切障故第八地為正受記位楞伽謂八地菩薩猶為三昧酒醉故佛為之種種加被受記而後不退第九地為辨說位即得四無礙解辨說自在故第十地為灌頂位受太子位必成佛故得佛法身為證得位得受用身為勝利位能自他利故得化身為成所作位成辦本願度盡有情故如是多位總略為三頌曰應知法界中略有三分位不淨淨不淨清淨隨所應此與前修對治品三差別相應金剛經云一切賢聖皆以無為法而有差別無為者即彼所證法界之淨不淨等三位也十八位中因入行解行四位為不淨位果作殊勝有上入至灌頂九位為淨不淨位不淨位中法界中障全未斷故淨不淨位中障漸斷而未竟故無作無上證得勝利成所作五位為淨位法界中障已永斷故復因學之分別不同而建立種種補特伽羅頌曰依前諸位中所有差別相隨所應建立諸補特伽羅依前所有差別諸相諸果諸地乃至小乘二十七賢聖皆依修之分位而言金剛經言佛是真如者亦就所證真如分位上安立之假名耳六得果品修治於分位中而有成就即為得果茲以得果性質言計有五類攝諸果盡頌曰器說為異熟力是彼增上愛樂增長淨如次即五果五果者一異熟果謂業力所感每分位中所感之器內而色身外而山河大地均謂之器為異熟果以業有善惡果為無記因果性異故名異熟二增上果謂所感之器不同於已所作有增上力如環境殊勝則所作易辦此就外境言也三等流果謂先世修習善法之力今世仍於善法深生愛樂即與前相等流類故名等流此就內習言也四士用果謂由前習氣加以人工使其成熟也五離繫果謂行能除障令法界清淨也各分位中悉有此五果須五果圓備始能成就離繫果也此果亦可另作十種分別頌曰復略說餘果後後初數習究竟順障滅離勝上無上十果中初四泛指後六重申後後果者謂前前果引後後果也如由種姓而發心而加行等展轉引生故後後法為前前果也最初果者轉依之始由世間最初證得出世之果也數習果者謂初果後數數修習如彼如彼修習斷障如是如是證法界淨此修方為真修究竟果者謂無學果位順果者謂後後果順前前法此重申後後果也障滅果者謂諸能斷道滅障見諦此重申初果也離果者謂離煩惱繫重申數習究竟果也勝果者謂學無學位所得神通諸勝功德上果者菩薩得果勝二乘故猶未成佛故亦名有上果無上果者謂如來地此三義重申數習究竟果也總之修行位果皆依法界之淨不淨立是三乘所共小乘僅一分煩惱障盡大乘則二障盡淨也此不共果由於不共行故次品但說大乘不共行果七無上乘品無上乘即大乘不言大乘而言無上乘者以殊勝於聲聞緣覺故大乘之為無上凡有三義頌曰總由三無上說為無上乘謂正行所緣及修證無上無上三義即正行無上所緣境無上所修證果亦復無上正行無上有六種相頌曰正行有六種謂最勝作意隨法離二邊差別無差別正行六相一者最勝二者作意三者隨法四者離二邊五者差別六者無差別以此六行行十度則能至彼岸二乘亦有施戒等事以不至彼岸故非大乘初言最勝相頌曰最勝有十二謂廣大長時依處及無盡無間無難性自在攝發起得等流究竟由斯說十度名波羅蜜多最勝有十二一者廣大相謂志趣高遠不拘世樂故能所行必度二者長時相謂此殊勝三無數劫長時積成三者依處相所依範圍普及一切有情利樂四者無盡相於所行事悉以回向無上菩提因無盡果德亦復無盡五者無間相六者無難相是二即隨喜相有隨喜心他人有善若己有之自他平等即得無間於諸善事自作不得他作亦可即無難成七者自在相謂依虛空藏等定力擴充散心而行施等自然自在圓滿八者攝相由無分別智所攝受即能如實正知無私意增損其間也九者發起相於如實相正解無迷即能至勝解行地之忍位是於實義深信堅固即為發起十者得相謂得世出世果即是見道十一者等流相由初地至八地也十二究竟相謂由菩薩成佛之因果圓滿菩薩要以此十二勝相具足圓滿能至彼岸小乘人等何敢望其項背耶次言十度頌曰十波羅蜜多謂施戒安忍精進定般若方便願力智饒益不害受增德能入脫無盡常起定受用成熟他十度依所作業而分施能饒益此非但財施必由法施無畏施令其知實有所恃而無恐也戒則不害即於他無礙也忍能堪受非但身能忍受勞苦心亦能忍甚深義理也精進則能增德禪定則能悟入謂專心便可入道自有此力亦能回轉他人般若則能真正解脫方便回向無盡佛果願則常修無間心願不息由力故得決定入位由智故則受用成熟一切有情同至彼岸故二作意正行頌曰菩薩以三慧恆思惟大乘如所施設法名作意正行作意即思惟乃意識事此宗之言修習始終不離思惟然正思必依教法以為准則教法猶中土所言經義經常也謂常為典則也即前施戒等十施設法菩薩恆以聞思修三慧思惟大乘即十度教法此中作意之思範圍最廣遍於三慧故頌以作意名簡其別於思慧也聞於文句義意形式內容得其正解即聞所成慧思則更進於諸義事以理趣瑜伽六四有六理趣或理門通達解了而於立言大義不迷即思所成慧修更勝進而為習行行亦生慧故即修所成慧如此之行名作意正行乃菩薩行之骨幹也次言如何具備三慧及三慧相資之行頌曰此增長善界入義及事成此助伴應知即十種法行謂書寫供養施他聽披讀受持正開演諷誦及思修行十法行者獲福聚無量勝故無盡故由攝他不息由此三慧思惟大乘如其次第聞慧令善根界種子增長思慧悟入即會契謂學者與說者之心會契實義即理趣修慧成滿事業是即作意正行也依是有相資法行即身語意三業所顯此有十種身業有四謂書寫供養施他及聽受昔時求法極難欲得法教必事書寫並宜尊重供養重法流布施他流通若遇講說還當諦聽此身業所顯有助於作意正行者次口業亦四謂披讀受持開演諷誦於所得教法宜時披讀念誦心口受持信為已有而不忘失對他則詳為開演令其解知或為諷誦稱道使之易入皆口業事末後意業有二謂思惟省察修習實證此皆作意正行之助伴也行此十法獲福慧果無量無邊亦復最勝蓋此福慧相關由福助慧由慧成福以資作意正行成大乘勝果也三隨法正行頌曰隨法行二種謂諸無散亂無顛倒轉變諸菩薩應知隨法行者謂與法行相隨順即止觀為體之行也此有二種謂無散亂轉變行及無顛倒轉變行此行非一故謂轉變前者偏於止後則偏於觀散亂使心異緣無亂則使心專一此有六種頌曰出定於境流味沉掉矯示我執心下劣諸智者應知六種散亂一者出定為自性散亂止之極曰定定以意為主若意定則耳目五識隨意內斂不起反之縱意隨耳目等心出逐物為自性散亂二者於境流為外散亂意自捨定而緣餘境流散非一三者味沉掉為內散亂心味著定或沉或掉雖所緣未捨亦復成病四者矯示即相散亂矯相示人令知己為定者有失定意五者我執為粗重散亂謂我能修定我在習定我慢習氣也六者心下劣為作意散亂此就大乘行者言或時起下劣心趨入小乘也此六散亂於止有礙諸有智者應當捨離次不倒行頌曰知見於文義作意及不動二相染淨客無怖高無倒離十顛倒名無顛倒顛倒者即心不正緣而於觀有礙也觀者從諸佛語及所顯義有正知解有正簡擇即能不倒然離倒有賴知見知謂正智見即觀意有正知見則不顛倒初觀文無倒頌曰知但由相應串習或翻此有義及非有是於文無倒文即語教若知文之構成不離名句名由串習衆皆串習此名為目此事句由相應連名成句次第綴屬訓名符乎串習即訓詁解句不違相應即章句得其正解即於文無倒也如是名實相符有義可知有理可說謂之有義文反之如外道所執聲義實常由天所生非人所造則為非義即是顛倒諸佛語教亦循名句建立以為導引捨染取淨方便若於文無倒即能正知教義也次觀義無倒頌曰似二性顯現如現實非有知離有非有是於義無倒義即境界常人惑於顯現內執實有能取外執實有所取實則此境俱是亂識似彼二取顯現有而不實知此則離有非有執即於義無倒也三作意無倒頌曰於作意無倒知彼言熏習言作意彼依現似二因故此進推亂識顯現之源義之顯現由言熏習言謂意言即意於境執為能取所取之分別也不言習氣而言作意者作意為心所一種警心為性生心動念之始也有作意而後有意言分別而後有意言熏習故此云作意蓋從因因立名也此言作意為彼二取分別之所依顯現似二取相如是知者是於作意無倒又此言熏習實即阿賴耶之一切種蓋習為賴耶上功能差別為一切境之所依也四不動無倒頌曰於不動無倒謂知義非有非無如幻等有無不動故由前於義於作意果相因相無倒故則於境界之本相相契不動即不動無倒也境之本相如幻等故幻雖不實而為有因之法如以木石幻象馬等有因不實而非空故如是合有因與不實果為幻之本相而知合熏習因相與顯現果相為境界之本相也有因而顯現故此境非無顯現而非實故此境非有於此有無不動即是本相不動無倒也五自相無倒和六共相無倒頌曰於自相無倒知一切唯名離一切分別依勝義自相以離真法界無別有一法故通達此者於共相無倒此中自共相即別通相自相與餘法異為別相與餘法同為通相一切境之自相無有實義唯名而已色聲等法皆依名言構畫而得非境真實自相如實知名與彼境不相關則知有離言自性存在但此自相非世俗義而為勝義是聖智所得境故又通相者為一切法所共有即空相無我相是常人於一切法有能所分別之實執空此實執空無我相即是法界真字為譯人加離此法界亦別無空相等如是知諸法通別相是於二相無倒七於染淨無倒頌曰知顛倒作意未滅及已滅於法界雜染清淨無顛倒法界自性本淨法爾無我常有隱顯之異者有染淨故應知所謂染者由顛倒作意即顛倒分別相續不斷熏習阿賴耶識而能為障蔽故若斷此顛倒分別即還復其淨故此染淨無他乃此分別之未滅已滅而已八於客無倒頌曰知法界本性清淨如虛空故染淨非主是於客無倒法界既由分別有無而染淨可知法界本性淨如虛空染淨乃法界偶然所起之相是客非主也九無怖無倒十無高無倒頌曰有情法無故染淨性俱無知此無怖高是於二無倒復次法界本無有情與法皆由顛倒分別而有既本無有情與法何有有情與法之染淨然有情法有染淨之義者蓋對於法界之觀行而有若隱蔽法界是染顯現法界是淨知本來無此淨染自於染時無怖淨時無慢也總之此十無倒行為真實觀行乃菩薩之正法依寶積經十種金剛句而來也四離二邊正行頌曰異性與一性外道及聲聞增益損減邊有情法各二所治及能治常住與斷滅所取能取邊染淨二三種分別二邊性應知復有七謂有非有邊所能寂怖畏所能取正邪有用並無用不起及時等是分別二邊離二邊行即中道行由前之無散無倒隨法行自然而成其中道行也顛倒散亂於所行境心有所偏失即是邊不散不倒得境之實即是中中對邊言而非折中之謂故孟子說執中亦無異執邊也此義依寶積經而發揮光大寶積為大乘最早之通教所談即為中道之代表本論録取十五種中道行分二段說前八後七前但直敘後為喻解前八中初為離一異邊行此中一異就我執言以精神靈魂命根為我謂與色等體質是一是異即為邊見所以者何眼耳口鼻尚非實在況有與此眼等同異之我乎知此即離一異邊得中道行也二離常無常邊行此就色等法言或以為常是諸外道執世實有生貪著故或謂無常是諸聲聞執世不實生厭離故今觀色等法有起滅即非常而又相續非無常如幻如化非常無常即離二邊也三離有情增減邊行有執有情實有或非有者執實有者謂除假施設外實有有情佛亦說我經有如是我聞故然此假施設我不無若於施設外別執實有有情則為增益見並此假設亦無則為損減見故得有情之實則離增減邊也四離法增減邊行此法指心法說但有了別事物之用假名為心而無了別實體心在於此執實則增並假亦無則減須善觀察而離二邊也五離能所治邊行所治謂不善法染法能治謂善法淨法此如幻人戲莊嚴經論以幻除幻如有其事而無其實若所治實則難除遣能治無功若能治實所治本不生能治為無用若能所俱實即無治用所以能所相待如幻而有瑜伽論喻如夢墮河奮身而覺夢非實有奮亦不真但不奮不覺也於此而言實有能治所治則不如實而為邊見也六離斷常邊行前是泛說人法執此則專就菩薩人法執言執常者謂勝義實有金剛經謂以色身見如來者是也執斷者謂勝義無即為惡取空人也得勝義非有非無之實是即中道行也七離能所取邊行此就緣起說染淨緣起依十二有支安立以無明緣行等為染緣起無明滅行滅等為淨緣起每支中亦有能所取所取為有支能取即智若執實有能所取即為邊見知為如幻如化則中道行也八離墮染淨二邊行頌中二三種者二謂染淨二邊三謂染有三種謂染淨合惑煩惱業作業生由煩惱業所得之果三種雜染而生惑有三種一諸見二貪瞋癡三後有願業謂所作善惡業生有三種一後有生二生已心心所念念起三後有相續合有七種對治此者如次為空無相無願不作無生無起無自性諸智也詳世親釋若執染淨實亦為邊見須離也復有七種即有非有等皆依對治而說一離有非有邊行有者謂執實有我等為空智所治非有者執無無我性實則一切法本性自空非由空此實我而後空也執有實我可治即墮有邊不認有無我性即墮非有邊寶積於此說授藥喻謂用藥治病病去藥存反為大病也二離所能寂邊行若執實有所寂法及能寂空則生怖空之心而墮虛無也蓋法空之後空亦不存遂生一無所有想而大怖畏寶積於此有怖空逃走之喻空遍四方何能逃避此乃於空不得正解之病也由執實有所能寂故遂有所能怖邊見三離所能怖邊行所怖即色等法能怖即心寶積喻如畫師自畫魔鬼反為驚逃實則本無所怖色等實法全由自心構畫而成知此實義二邊即離四離所能取邊行此就觀行中觀唯識無境所生之無所取智及無境所生之無能取智而言然此二智於觀行中俱非實有執實即成邊見寶積於此說幻人相食喻謂如幻師變幻二人後幻人出食前幻人意示所能取智俱非實也五離邪正邊行觀行先後相待有邪正義如見道前之加行智與見道之正行相待則為邪行然此正邪不可執實加行雖非正行而與正行相順正行實由此加行所引發也經說兩木相鑽生火喻無木則無生火之用無火亦無燒木之能而均非實以況加行能引見道見道而捨加行於此正邪不應執實而生邊見也六離有用無用邊行由見道故能生正智以治無明有執正智有能治無明之分別否則與餘心無異不能對治無明此為有用執也執無用者謂正智無此分別二俱邊見非觀行之實經說初燈照暗喻謂燈明暗消燈不作分別而暗自去暗亦不待燈分別而後去知此有用無用之見即離也七離不起及時等邊行此亦就正智無明相待言有執正智畢竟不起者謂無明本有正智云何起初時不起則永不能起又執等時者謂正智應與明同時而有不然力不均等後起之法云何能去固有之無明耶寶積於此邊執說後燈照暗喻謂百年暗室燈照即明固無待百年之燈而後百年之暗始破是知正智生無明破本有無明亦不礙後起正智之生也總之此皆證會中事非理解可得理解墮於實在故處處拘礙而不通是為邊見證會中自有中道當非言語所及故經唯以喻說倣佛其一二而已須知菩薩行自有靈機活用處不可以常見揣度如舟行水中放乎中流自然不著邊際五差別正行六無差別正行頌曰差別無差別應知於十地十波羅蜜多增上等修集差別謂增上較餘法勝故以十度言一度增上較餘為勝所得境界即為十地此十地即差別行也如初地布施充量盡用即施獨勝如是乃至智度亦爾無差別行者為平等修修布施時餘九度隨力隨分平等而修也如此即知同一正行由一增上即差別行所餘隨力隨分並行不廢即無差別行菩薩行之無上於此可知矣上述六種正行義實一貫所謂正行是何即以最勝為其體也由何正行作意為之依也云何正行隨止觀之法也為何正行離二邊見而契會中道也於何如何正行在差別無差別之十地也如是六種即於一事上徹始徹終見之也復次所緣無上即境界無上也頌曰所緣謂安界所能立任持印內持通達增證運最勝正行之境乃正行之所緣即正行之依循處此所緣有二一為安立即佛之教法所謂語文一為法界即佛所證會真實之境即義所謂事實教為佛所施設如十度等行原非本有乃佛專為衆生福利而安立是菩薩所最不可缺之緣也然但有教法不得其實亦為唐勞故必循教以證實義界為教本是能安立教為所安立法界等流二者固未可偏廢也又以三慧觀之聞慧偏於語教為任持所緣謂於語教有堪任決定之解也思慧依教而通達法界為印持所緣謂由文見義即理趣乃思擇事如印印物也修慧離文證義為內持所緣謂自內各別不由他教離文而親切證會也如是三慧乃地前事後以十一地分判之五種所緣則就地上及佛地言也初地為通達所緣謂能除障見道此中所緣法界謂之通達地上固不廢安立以偏重實證法界故於安立略而不說初地以上為修道充實所證真實之量名增所緣非增大小之量乃增其實不實也七地則證於前六地所修六度至此始有運用無盡之方便名證得所緣八地為無功用行不須著力名任運所緣後三地為最勝所緣謂得自在故九地得四無礙解為智自在十地雨大法雨為業自在佛地微細習氣淨盡為清淨自在也如是種種所緣皆不離初二安立與法界也常言依義不依語於此可見語亦可依而非究竟謂其不能與法界之義相離也故知究竟之依為義但亦不可有義無語由語入義是為正行初學者尤當重視也大乘所緣始終不離法界及法界等流如是以所緣無上故名無上乘最後修證無上為大乘不共之位果與前位果相對總有十種頌曰修證謂無闕不毀動圓滿起堅固調柔不住無障息修證以位而觀其成就初為無闕謂內外善緣具足內而六處殊勝外而德友聞法決定種姓為法中人即種姓位二不毀於大乘深義能生信解通徹明信不疑非迷信也即信解位三不動謂不為下劣乘及世間事所動於大乘有堅決意趣則能發心為發心位四圓滿真正波羅蜜多為地上事但地前之行亦能隨順六度以進於圓滿為正行位五引起謂正行成熟自能發起聖道正位而入離生離生乃見道別名生謂種種流轉過失離諸過失為見道為離生位六堅固於諸善根積而有力謂之堅固以此即能成熟有情及諸佛法為修道位七調柔心有所著則不調柔無著則能純潔無雜心淨則土淨即淨土修證位八不住謂不偏住生死涅槃即能得八地不退受記位九無障謂一切餘習淨盡即佛地位十無息謂功能不息即佛之應化事由始至終有如此正行得如是位果超越小乘故為修證無上也此中以無住涅槃為勝為不退地修證前於此者趣向於此後於此者即無住之應化無息也如是菩薩行之位果實一無住行而已菩薩於生死涅槃兩無所住乃其自然本性如是耳末結釋論名頌曰此論辨中邊深密堅實義廣大一切義除諸不吉祥論中所舉七義皆談中道行違中曰邊此論即開示解釋此義也此中道行有深密堅實諸義瑜伽言行概攝於此而亦餘籍之所自出也
