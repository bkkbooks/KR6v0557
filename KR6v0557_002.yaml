body:
  text: 佛學院的要旨院學為先師歐陽竟無整理者注數十年苦心經營釋教一篇已有其組織表白竊謂先師以此繫道友道友之繫精神於院者應即在此今欲使此學易於認識略出二語以形容之曰由言教變遷之實求觀行踐證之真見內院簡史乃根據先師與李證剛先生函意言之蓋學所依據為言教變遷之實而其實際則求觀行踐證之真也依據即佛教不云佛教而云言教者佛教之體為名句文身也然則教外別傳非教耶此亦是教但不立文字耳以佛四十九年說法乃有四十九年不說一字若離佛教何期踐證耶此教自佛說以來非一成不變對機演解自有變遷但皆有其所以變遷者在欲知其實應分三段而談此可借金剛經中處處所見之語示之初段佛說如經云佛說般若波羅密與佛說莊嚴佛土等次段即非如經云即非般若波羅密與即非莊嚴佛土等三段是名如經云是名般若波羅密與是名莊嚴佛土等知此三段變遷之實乃知佛言教之全小乘言教止於佛說認佛所說悉為法句法即句也此句非具體而為抽象觀念幾經思惟鍛鍊所成印度異端之有句義亦仿佛似之故有三法印無常無我涅槃寂靜四諦苦集滅道五蘊等小乘毗曇阿毗達磨即表示法句之至極組織者此第一段言教也大乘言教起於此處即而非之如般若經九分處處空談是即小乘所執著之法句而非之也末分金剛經此第九分印土般若原為八分或九分奘譯乃集為十六分最後乃出一偈謂一切有為法如幻夢泡影則是名之義而甚簡略未及暢言也此第二段言教也再進如深密經言一切法有為無為句是佛說義是中有為非有為非無為無為亦非無為非有為是即非義言有為者是本師假施設句言無為者亦是本師假施設句非無其事即是名義又如楞伽經首舉百八句如生句常句等為佛說義次說生句即非生句常句即非常句等為即非義後文詳解生為心相續常為妄法等百八句即是名義二經皆佛說與即非甚略而是名甚詳此第三段言教也此即言教變遷有此三段明其真相始可參研小乘解法亦有二義第一五蘊五蘊無我為我空第二涅槃涅槃無五蘊為行空從流轉至於還滅亦有百八句之組織歸納為法句此即第一段第二段即非為大乘之開首所以般若即非一段占百分之九九是名一段占百分之一耳第三段深密楞伽涅槃等經反是是名占百分之九九乃以不壞假名而說實相也先師苦心經營之學依據在此空談無學觀證乃有學般若常言觀空不證中論亦備顯觀而不詳證義故觀與證未可混淆也觀云觀行證謂踐證觀行即見修見屬態度修是行事金剛經云應無所住而生其心不住於色而行布施可見觀行二事之不離於行以見其觀由觀以成其行也踐證者踐之謂住無著金剛論立十八住為觀行所踐履之處也證為歸宿如行人到家踐履之究竟在此也心經云究竟涅槃是以圓證為證而非分證之為證也觀行為材料踐證為組織不住於色而行布施乃在求佛地八具足觀行踐證亦不能分而言之也然此有真不真在真者必依言教之實而得之如般若之空觀心經之行深般若波羅密多時照見五蘊皆空常人不明此五蘊乃小乘最後結撰之觀念而以目之所遇身之所觸為色受焉常人所解猶之常識小乘毗曇所解猶之科學知識其相異可知矣則亦不得言教之實云何而成觀行之真耶又如瑜伽之唯識觀以離二取言二取亦非常人所解乃小乘執一切法是十二處即能所受用之法也唯識觀行即從此起若不明真實義如何得真觀行耶然此等猶是言說安排仍非活學言教之實觀證之真於學者身心密切相關之意味不可不於求字上明之也小乘一聞無常言教而毛骨悚然當下證果須菩提聞空離想而悲泣抆淚求之迫切可知此求即欲也通常說為發心願望果有此真實之言教亦即有真實觀行之欲所以華嚴十地無地不展轉發心而勝進此即欲求一刻不停觀行踐證一刻不捨之真實處也六百卷般若以須菩提欲求無上菩提而起金剛經亦以發心何住貫徹始終乃至儒家學說加先師所提古之欲明明德於天下者亦應著重欲字孔云欲仁仁至孟云義所欲而捨生取義非有勝欲在何取何捨何有於佛法世俗故言教實而觀行真不能一息之離欲也先師一生願欲不斷入蜀時有人勸其休息而大憤及最後尚有心經注解及答蒙君文通講學書有此一片求究竟之勝欲乃有先師一生之事業乃有此院學此可深長思之也今日所談院學僅及百一略見精神所繫者如何而已或有錯誤願諸位有以教之大師百期大祭紀念講演一九四三年六月二日
