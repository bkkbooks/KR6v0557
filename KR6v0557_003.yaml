body:
  text: 玄奘義淨大師所傳的五科佛學公元第五世紀以後的印度佛學由於陳那護法法稱德慧安慧慧護等大師輩出又有那爛陀寺那樣博大的教學規模它的分科便逐漸確定學習也有了程序七世紀末留學印度的義淨法師嘗記述當時的學法情形說致想因明虔誠俱舍尋理門論比量善成習本生貫清才秀發然後函丈傳授經三二年多在那爛陀寺或居跋臘比國同時在印求法的漢僧像玄照他是爰以翹敬之餘沉情俱舍既解對法清想律儀兩教斯明後之那爛陀寺留住三年就勝光法師學中百等論復就寶師子大德受瑜伽十七地又像智弘也是學律儀習對法既解俱舍復善因明於那爛陀寺則披覽大乘去信者道場乃專攻小教從這些上面可見那時候的印度佛學早已有因明對法俱舍戒律中觀和瑜伽五科學習次第也大體是以因明對法為始中觀瑜伽為終經過了這些學程才算卒業就當那爛陀寺的盛時我國玄奘義淨兩法師先後遊學到了印度他們都以極長的時期絶大的努力多方面的學窮精微回國以後又畢生盡瘁於翻譯宏揚現在通過他們的學歷記載和一些譯籍很明瞭地見得他們傳來的五科佛學不但師承可考而且義說有據就到現在來要對佛學分科研究還是應該取為準繩的先總的說奘師所傳的對法學小乘方面有俱舍大乘方面有集論不用講集論從奘師才傳來即是俱舍早已翻譯蔚為師宗但只限於正面文章沒有對照到順正理師的評破理解仍然不足所以俱舍的精義直到奘師方算是徹底瞭然因明和瑜伽自是奘門完譯且獨傳的學問淨師續譯了陳那護法的一些著述也起了補苴的作用戒律一科小乘部分淨師用力特別多大乘部分則奘師傳入唯一的瑜伽戒其前善戒地持的翻譯雖也曾供給了大乘戒一部分的依據可是既不完全又多錯誤大乘戒本和羯磨能具備規範仍是奘師的功勞至於中觀學奘師在戒賢法師處聽過中百論繼而又往各地參學最後還作了會宗論和會中觀瑜伽兩家之說假使他對中觀沒有深造決不能做到的另外為中觀本源的般若經全部經文由奘師輯譯齊備淨師又重翻了研究般若入門之作金剛經論頌釋都是有它獨到的價值的以上總說了奘淨兩師關於五科佛學的傳授現在再就各科略為分析來談一談第一因明科奘師遊學五印的時候參訪精通因明的大德很多見於傳記的就有僧稱調伏光戒賢南憍薩羅國婆羅門智賢和勝軍這幾家奘師從他們精研了陳那菩薩的理門論集量論等歸國時又搜集了因明一類梵本至三十六部之多他所翻譯的雖只有理門和入正理兩種但已足傳此學的精要並且另外散見餘籍和他的講說由門人筆記的也很豐富現在舉其特徵有這麼兩點其一是揭示了因明獨自的規範因明的來源在於以立破做中心的論議所以它和對法相互為用乃是原有的典型我們看奘師其先在北印跟著僧稱和調伏光學習因明時都是和對法俱舍等同學後來受教於戒賢法師也是聽了對法一遍再聽理門集量數遍這樣以因明和對法結合著研究有它傳統的意味正因為奘師認識到這裡所以他只譯了理門入論便不再翻集量集量離開了立破範圍用量為中心而組織自然另有它的新面目了其二是劃清了和內明區別的界線因明既自成一科就有些理論和其餘屬於內明的各門所說不能一致例如對於自相和共相的解釋在因明是一種根本道理有它特殊的定義這就是現量所得的為自相比量所得的為共相但在內明方面佛智知一切法的自相共相都是現量自共不必和現比相連屬如此分明成了兩種範疇可無庸勉強和會奘師的傳授很清楚地劃分了這一界線由上兩點可說明奘師因明學的家法謹嚴而在淨師也深通陳那之學卻另譯了集量等論這恰恰補充了奘師所未詳的另一方面只可惜譯文多數散佚很難參考了第二對法科這在小乘方面以俱舍為中心俱舍的結構是以理長為宗採取當時小乘各家特別是經部之說來對有部毗婆沙師理論作了徹底的批評由於衆賢論師的反駁引起諍論世親菩薩的弟子輩相繼注疏解救愈加發揮了隨順道理的精神這樣造成了風氣在小乘家固然要深通此論而大乘評判小義也必取徑於它乃獨立成為專科但是要徹底通達俱舍的學說應該窮究它的本末源流在它以前的根本典籍有發智六足論毗婆沙論以及有關經部的各論書在它以後的又有順正理顯宗以及德慧安慧世友稱友等解疏都是在所必讀實際能夠這樣原原本本來傳授俱舍學的只有奘師看他的傳記裡對於俱舍怎樣地反覆鑽研回來翻譯又如何備具群書就可窺見一斑他雖然未及譯一些印度俱舍師的著作然而西印諸師的口義已由他盡授於普光引用在論記裡所以奘師所傳俱舍學說的完備遠非真諦舊譯所能企及的至於大乘對法以集論為準據奘師於本論外兼譯了糅合注釋的雜集論一方面發明對法經和瑜伽論不同的特點另方面又指出大小對法相通的脈絡這樣建立確是極其圓滿的第三戒律科小乘戒可說為淨師專精之學他去印求法的目的即在於明律學戒回國以後也專力於戒學的宏揚以譯籍論就有二百餘卷之多其中還散失了一部分所傳學說因為印度實際情況的限制只是根本說一切有部一系此系律典原有地方派別中印摩偷羅和北印的迦濕彌羅各自傳承詳略亦不同中印傳本有八十部北印只十誦從源流上看中印才說得上是根本傳中印律學的大家有勝友他從律部大小各品的所說總結成律攝一書簡明扼要堪作遵依淨師就是據以立說的當時印度也流行著德光的律論在印求法的漢僧也有人隨著學習但是它屬於北印派別比較疏漏淨師便加以簡別不傳在這一去取之間也可見淨師的學有家法另外大乘戒律自應以瑜伽為正宗瑜伽論有明文大乘學處到彌勒菩薩才集録成篇受戒羯磨也從那時具備了典範奘師如實地傳了過來不用說是值得重視的第四中觀科奘淨兩師在這方面都有深造因為那時那爛陀的學風是中觀和瑜伽並重而兩師都是在那寺學成而歸的奘師於戒賢法師邊聽了瑜伽論三遍同時聽中論百論也是三遍可見其無所軒輊後來他更於南印度婆羅門相傳是龍樹菩薩弟子受學經百論和廣百論以窮餘蘊至於淨師依止那爛陀寺寶師子聽了瑜伽又依勝光聽了中百論他更親近了智月地婆羯羅密呾羅呾他揭多揭婆等大德也都兼通瑜伽中觀之學再看奘淨兩師的譯籍奘師特譯了護法菩薩的廣百論釋此書是奘師所特別注意的一種他在印度就學的初期於鷲嶺北聽到了講說便深有體會而隨聞隨譯這完全因為廣百論對於中觀學說有特殊的關係如要洞明中觀的祕奧就離不了它試看中論的各家注解從青目到月稱沒有不引用它的當奘師留印的時候注解廣百論的佳著要推護法菩薩之作它雖然只解了論的後半部即護法菩薩自判為論議百義的一部分但已圓滿抉擇了自性空的奧義更無缺缺特別是當時中觀瑜伽兩家對於二諦義的看法有了分歧在護法的釋論裡針對此點用二諦相順的道理著眼在後得智的世俗境界從那上面依世俗名言安立勝義以得一致作了溝通這很足以補救一部分中觀家言的偏失而為純正的中觀宗樹立了規範至於淨師特別就中觀所依的般若方面擷取菁華重譯了彌勒菩薩的金剛經論頌和無著菩薩的論釋又撰述了略明般若末後一頌讚述指出中觀瑜伽兩宗義有分綱理無和雜之處這很好地補充了奘師議論強調求同未及存異的不足就使中觀的宗義益闡發得顯明第五瑜伽科這科以瑜伽師地論為主體另有各種論書為輔翼所謂一本十支奘師差不多全數翻譯而且講述了那範圍的闊大義理的繁博可不待言就所傳的學說看奘師是要約瑜伽的宗旨於顯揚窮極瑜伽的變化於唯識這樣來顯示一宗的精神的顯揚標舉論體即引用了中論的諸佛說法依於二諦的一頌依舊以二諦立宗到了解釋瑜伽的自性也是融合般若而談這正是原始瑜伽貫通般若的面目奘師特別將此論提前翻譯詳細發揮揭出了這一要點至於唯識法門由觀行憑依發展為緣起原理經過護法菩薩的闡揚再走向更高一層的觀行道路護法之學完全是奘師獨傳之祕得了基師的縝密組織益見異彩現存成唯識論雖已雜糅了十家學說而從據密嚴經以立說的一線索依然能將護法解釋唯識的原文基本上鈎稽出來另外有了淨師補譯的成唯識寶生論觀所緣論釋護法一家唯識之學更可以完全得到瞭解淨師還譯出無著世親菩薩的六門教授習定論等有關止觀的要典使瑜伽踐行途徑分明一宗學說如此也可算是很完備的了依據以上約略的分析我們無妨說在那爛陀寺最盛的一個時代所有五科佛學的精華由於奘淨兩師的努力都已傳來了我國這五科佛學後來雖略有變遷而推究到它的基本正宗總不能出於兩師所傳我們要精研五科對於這點自然是應當豫以重視的
