body:
  text: 菩提資糧論頌講要是頌繼涅槃學二書之後而講所以示實踐之方也此學根本與歸宿為涅槃有根本斯有發生知歸宿斯明趨向而實踐指歸則在般若與瑜伽般若瑜伽之分乃以時有先後説有詳略方便立説其理趣實係一貫舊來一邊一分之言空有相待之論皆有未當今以講習方便先提般若蓋瑜伽義理豐富難得綱領般若簡截易獲樞機耳本頌為龍樹約經之作可謂直抉般若之髓現存龍樹著作譯本亦以此為最完備蓋龍樹諸論由羅什翻譯者皆不全智論釋二分般若前詳後略十住釋華嚴十地品只傳二住中論龍樹自家立説又只無畏論之一分而已獨此論傳譯在後極為完整論本凡一百六十五頌於數百卷般若義蘊賅攝無遺誠龍樹學之精英矣後世大智度論十住婆沙絶傳於印土唯此論與中論盛為其時學者所宗今從譯家達摩笈多法密或法藏所傳譯之籍觀之亦可知其大概笈多在印時無著世親之學正如日之中天故來華後即譯無著金剛七句義釋與世親攝論釋皆其時正宗學説且為印土後來思想之中堅者但同時後譯本論足徵本論在學術上與無著世親學並行不悖而同等重要也復次此論有自在比丘釋亦達摩笈多所譯自在之生平不詳據其注疏體例及論議考之似與世親同時因所採用之訓釋詞方法如釋資糧為能滿足菩提法故又以持為義以長養以因為義等是也在印為晚出又其釋謂二十小事隨惑之中攝不定法尋伺悔眠與世親三十頌之説正同奘譯成唯識論依後起之説改文別立四不定不足為據可徵其時代相近也茲論雖為般若要籍但譯出後千餘年來無人注意前在寧時編入第三輯藏要以戰事阻塞亦未得流通也是論一百六十五頌判為三分初分緣起四頌末分結論一頌此餘百六十頌皆本宗分也本宗復分三段初明資糧法體為第一段第五頌至三十四頌次明資糧修集分二以福慧分説者為第二段第卅五頌至七十八頌以地位勝劣分説者為第三段第七十九頌至一百六十四頌此三段劃分實賅攝全部般若之精義般若詳菩薩行即菩薩所以成佛之道故經首佛告舍利弗以汝發無上菩提心應學般若一語揭出宗旨至全經所説約而舉之不出三義曰周遍曰方便曰次第周遍者謂菩薩行周遍圓滿本論之資糧法體一段概之方便者謂無執著無執始能遍是為方便善巧本論之福慧分説一段概之次第者謂成就歷程行遠自邇登高自卑本論之勝劣分説一段概之三義囊括般若理無不備而本論一一發揮詳盡無餘次當略引申之一者周遍義菩薩行究竟趣於菩提二分般若菩薩行品釋菩提有多解其一云菩提為諸佛所遍等覺意謂三世諸佛所覺皆同也自在釋為一切智智亦屬允當實即所有佛法之總名耳既為一切智智自應周遍圓滿一切者一切所應知法為衆生施設者衆生無邊凡彼所知佛應遍知始克隨機而度是即凡夫聲聞緣覺菩薩如來之法盡攝於中矣又一切智智者實為一切種智種謂行相故有譯為一切相智者法不自顯待相相狀行相而顯於諸法相一切盡知名一切智智此相如何知耶謂由總別相般若總相謂一切無相畢竟空淨相而此一相為一切法之所以顯亦一切法之所依別相者諸法差別自相須善巧分別恰如其分而後顯也此一切智智乃諸佛境界為大心菩薩所應學者此境如何入耶謂由道相智入道猶路也人天聲聞緣覺所由莫不有其道菩薩須於此諸道能觀閲歷能過超越能觀始克遍知不漏能過始克超然不墮龍樹喻之如親屬繫獄故往視之而不同杻械所以菩薩行須周遍圓滿此般若經所説之遍義也本論緣起即顯此義初分頌云佛體無邊德覺資糧為根是故覺資糧亦無有邊際雖無邊際樞紐可尋繼正宗分示此樞紐云般若波羅蜜是覺初資糧既揭其綱繼以五度四無量充其用而菩薩之德備矣二者方便義大匠誨人必以規矩菩薩行之規矩為方便即運空也般若經云以無所得而為方便無所得者無二之謂二則相待如長之待短高之待下美之待惡種種分別執著以起此衆生所以長夜流轉者菩薩無待無得超然運空此菩薩行之超然生死也般若經中須菩提於此致疑謂若諸法既無自性何用上求下化發心難行成佛度生耶佛答以二義一謂衆生愚迷不知無自性故長夜沉淪菩薩為度彼故大有事在此先知覺後知之行也二謂正以法無自性始得發心難行成佛度生若法有定相即不可轉矣是以菩薩深知法無自性始能運空自在陶鑄堯舜發生極大勢用也此方便義本論第二段特提三解脫門詳發揮之三者次第義佛之境界廣大深微成佛之功從地至地次第圓滿固非一蹴可幾也經舉真如法性實際三名即示所證有漸次之意龍樹釋之謂入觀為如捨觀為法性安住為實際以筏為喻上筏為觀到岸即捨至家安住斯稱實際然般若之學著著到家念念究竟今此次第之説非分分積乃勢用日漸增強之謂耳如孩提之童具體而微必待次第長育斯為成人亦孟氏所謂充實為美之義菩薩發心成佛難行度生以無所得方便趣求佛境可謂因緣發端而繼此長劫長育充實即為般若漸次之義也本論明此有得力修因力勝者與未得力修因力劣者二種未得力者必須循戒行定行修相行等充實其力而於漸次之義可云詳盡矣綜此三義則知所謂菩薩行所謂成佛之道今先講本論亦以為談菩薩行之導首也甲序分今講本文甲分説論緣起而有四頌即明此論所談之性質範圍也頌曰今於諸佛所合掌而頂敬我當如教説佛菩提資糧菩提者三乘共果今此所説菩提以示別於聲聞緣覺故云佛菩提也二乘菩提謂之盡智第九智無生智而佛乘菩提則謂之如實智第十一智或一切種智且必有俱行法相應而起所謂佛之功德十力四無畏等一百四十種不共佛法皆菩提也資糧者資具之義成就菩提之資具是為菩提分法龍樹十住婆沙引此論文名助道法道即菩提分為助為資具義即菩提分之舊譯也此菩提分以區別於二乘故云佛菩提資糧也然則佛乘菩提範圍果如何耶頌言我當如教説教即大般若經經談菩提之因名事俱廣約之不外悲智而已如是由智而有六度菩薩之聖行三學行天行十地行因以成辦由悲而有四無量菩薩之梵行得以長養經中喻悲智如日智月悲照臨萬物成熟如是菩提資糧依教言之六度四無量即其範圍也然是中原委畢竟難窮若非依佛則難得其邊際也是故頌曰何能説無闕菩提諸資糧唯獨有諸佛別得無邊覺佛體無邊德覺資糧為根是故覺資糧亦無有邊際當説彼少分敬禮佛菩薩是諸菩薩等次佛應供養趣菩提道無量無邊泛泛言之難得窮盡且難適中唯佛得無邊覺遍諸覺道覺資糧説無有闕而於衆生施設適中蓋佛果功德無邊佛道資糧亦復無邊果無邊因亦無邊也今所説者止其少分但提綱挈領舉體相隨由智則能通貫由悲則能擴充雖現不得其邊而終能究其際也云説少分者為菩薩造論應有之態度亦如世親菩薩作二十唯識頌未推重佛遍知之意也乙本宗分第一段説資糧法體初則正取六度次則旁通餘義於此以見菩薩之周遍行也六度中復以般若為導首將導六度至佛彼岸頌曰既為菩薩母亦為諸佛母般若波羅蜜是覺初資糧施戒忍進定及此五之餘皆由智度故波羅蜜所攝此六波羅蜜總菩提資糧猶如虛空中盡攝於諸物前説菩薩行之必周遍圓滿者即由此六度將導四無量擴充所至而六度及餘一切歸攝智度者以其能為菩薩諸佛母也般若意譯為智慧二字易被忽視故譯人特以音譯存其義波羅蜜意云到彼岸彼岸者諸佛覺場諸佛智慧海也然般若能為諸佛菩薩母而稱大波羅蜜者蓋有二義一者勝餘五度能為領導餘五若離般若則不成為波羅蜜二者能攝一切如海納川凡一切波羅蜜皆依般若波羅蜜故到於佛之功德彼岸以勝獨稱大以攝獨稱度又菩薩善根因即行佛之功德果即得無一不從般若而出故謂其為菩薩諸佛母也般若經中佛母一品特闡斯義略謂佛以功德為體離於般若即無功德又般若能顯示諸法實相功德實相兩不相離離則俱乖蓋不得諸法實相隨處生著亦不成功德也譬如行施以著心故報止人天終不能達究竟彼岸也而菩薩行之不墮二乘者正依此般若之無自性自到彼岸是故功德實相相應為一即能出生諸佛也又般若必籍五度及餘相應起用方得見諸實事否則空無所用而彼善根若無般若即不能運至彼岸而為成佛功德故經云般若為母五度為父以見兩者不可或缺本論云此六波羅蜜即總攝盡一切菩提資糧有如虛空無物不攝也復次自在比丘於頌文母字另有一釋母字梵文為字根為此字形有二種因以引申二義初如言冥鉢囉膩波低此由字根第二種為自形之引申而有置義如母生子即知置於善處喻菩薩由有般若凡行皆位置適宜也次如言茫摩泥即由字根之第一種為他形之引申而有量義唯母於子能知酌量飲食衣物喻菩薩由有般若凡行皆能籌量適宜如是般若之為母義非但出生一義已也尚有顯示諸法實相之置義及成就功德之量義也此種引據聲明界論以字源釋字義方法世親俱舍論亦嘗採用吾謂二人時代相近者此亦一證次旁通異義初通德處次説無量通德處者謂有餘師説六度以外尚有菩提資糧即四德處頌曰復有餘師意諸覺資糧者實捨及寂智四處之所攝實捨寂智義見十住婆沙羅什譯為諦捨滅慧稱如來家家者佛所依住有謂佛以六度為家又説以四處為家故須適之自在釋此謂彼四處仍不外於六度諦即是戒實踐不虛故滅為忍定寂靜不動故捨即是施慧即是智精進遍於一切圓滿四德故於是四處六度無以異也説無量者有處説四無量亦為菩提資糧然六度以慧為主四無量以定為主故不通攝六度而與六度並重四無量為行六度之原動力大智度論於四無量約有三解一謂所緣不同初業菩薩以衆生為緣而行無量地上菩薩以法為緣而行無量諸佛如來則無緣而自然行無量此三類境四無量中隨一皆具本論綺互言之而不分類蓋原可側重或相通説也二謂四無量隨一為主皆能究竟統攝餘三三謂四無量中前三一類可使衆生離世間苦得究竟樂後一能令衆生常安也本論即依最後分類之説前三為類者頌曰大悲徹骨髓為諸衆生依如父於一子慈則遍一切若念佛功德及聞佛神變愛喜而受淨此名為大喜慈悲皆依觀待衆生現境而言菩薩見衆生為三毒所燒悲徹骨髓思拔共苦此悲則偏於消極拔苦邊言然有顛倒衆生以苦為樂不願捨離菩薩愍之與以勝樂使能捨劣取勝導至究竟安隱涅槃此慈則偏於積極與樂邊言龍樹於智論以慈為主本論亦云慈則遍一切故知其所重在積極一義也大喜之意餘處説為隨喜本論以念佛功德信受無惑為喜此中念佛乃八念之首定之一門示衆生以可欣之境常途以繼九想之後九想想不淨心易消退常至自殺念佛定門若以形色則為相好三十二相八十隨好若以德用則為神變及十力等諸功德法觀此則心奮發有為足以補九想之偏起沈厭之念智論喻此如人悶絶不辨生死鞭抽其身若見腫赤尚知可救如人念佛聞説佛德稍有欣喜則知佛性未泯可以成佛也以上三種自為一類進説捨無量類頌曰菩薩於衆生不應得棄捨當隨力所堪一切時攝受捨為菩薩行之根本謂能成就佛法而全大慈大悲之實踐也若菩薩於己有一毫不能捨處即於慈悲不得圓滿而於衆生必難攝受若於衆生都無棄捨即此捨行究竟清淨始能於一切衆生以平等心而攝受之平等乃為大捨所以圓滿菩薩行也故此論言捨非僅於衆生苦樂上用心而重在實踐也言捨為菩薩行之本者本論分三層言初以五乘方便平等攝受衆生次就學行言於世出世法捨離法執三謂未得不退不捨精進初五乘方便者衆生無量自有可愛可憎中庸三類菩薩一視同仁隨根勝劣方便教化然必以無上安樂之大乘法化為究竟也是故頌曰菩薩從初時應隨堪能力方便化衆生令入於大乘化恆沙衆生令得羅漢果化一入大乘此福德為上教以聲聞乘及獨覺乘者以彼少力故不堪大乘化聲聞獨覺乘及以大乘中不堪受化者應置於福處若人不堪受天及解脫化便以現世利如力應當攝大乘道果實為一切衆生成佛孔道佛之本懷原自欲一切衆生皆入無餘涅槃是以菩薩化衆於其初時應隨堪能方便令入大乘沾潤既久終不得入者不得已而思其次始有二乘之化人天之教循而至於一闡提著樂世欲者亦以現世利益攝之此而不能如提婆達多輩破僧害佛仍不棄捨如是則四攝方便運用無息矣此復云何頌曰菩薩於衆生無緣能教化當起大慈悲不應便棄捨施攝及説法復聽聞説法亦行利他事此為攝方便所作利衆生不倦不放逸起願為菩提利世即自利菩薩化衆依四無量行四攝法無一衆生而見棄捨此平等心即為捨之究竟功能捨己利世共業好轉自亦安樂此種利世自利之行自非儒者親親之義所可企及愛有差等即於衆生不能平等攝受捨猶未能究竟能於衆生平等攝受則於衆生所學一切遍學衆生所行所知亦應周遍閲歷周遍應知而菩薩行之為遍行者所據在此次於世出世間捨離法執者頌曰入甚深法界滅離於分別悉無有功用諸處自然捨利名讚樂等四處皆不著反上亦無礙此等名為捨出世法根本依據為甚深法界法界者即實相法住法性有佛無佛法性常爾自在釋為緣生性亦可適於心性知來藏清淨心等入此法界有其次第初以正分別入入已正分別亦須離棄離正分別則臻無功用境矣此以緣生為例愚夫顛倒執色等常佛欲令入緣生實相故以無常生滅為門而説諸法從緣生諸法從緣滅舍利弗目犍連即從馬勝比丘處聞此偈而悟道者其後小乘執此緣生究竟真實為破此執而説不生不滅如涅槃説常樂我淨為遣執故非實有常樂我淨也離此生滅常無常等執實相自顯自有恰當處故般若經中常誡菩薩離於四相謂不墮惡趣不墮貧賤無力不墮二乘及從頂墮頂墮者菩薩臨近無生法忍時而執實有不生不滅涅槃等法以此法愛如食不化而使退墮此即由於不能捨之過也又世間八法如惡雹雨如毛繩縛見智論害事惱人於此不應愛著是以諸佛經中言及菩薩德相每以已捨利養名聞一語譽之儒者亦有聲聞過情君子恥之之訓能不為八法所動一切不著即入於平等通常言捨多就不著言運用於實行而有體系之説者唯此論耳此義亦見於智論惟不若此論之有體系亦足見龍樹般若精華之所在三未得不退不廢精進者頌曰菩薩為菩提乃至未不退譬如然頭衣應作是勤行然彼諸菩薩為求菩提時精進不應息以荷重擔故此就捨義之積極方面言乃於染法不為之後淨法正有所為也精進不著故謂之捨菩薩原義即於無上菩提發起大心之謂菩訓菩提薩訓心是則菩薩為菩提乃是自家本分事大心者即是金剛經云一切衆生我皆令人無餘涅槃而滅度之之心菩薩本懷在發此心以希不退至不退位菩薩心性始得決定正面謂之入菩薩位反之亦名不墮二乘數也此不退位般若譯名阿鞞跋致實即得無生法忍之謂也然未至此位時二乘涅槃時相引誘經云佛恐菩薩為三昧酒醉極端勸勵而菩薩自於此時亦須大捨斷諸法愛不令懈怠之心一刻出現二乘何以障難菩薩令其速入涅槃是由菩薩初發心時常有放逸之念故也頌曰未生大悲忍雖得不退轉菩薩猶有死以起放逸故聲聞獨覺地若入便為死以斷於菩薩諸所解知根假使墮泥犁菩薩不生怖聲聞獨覺地便為大恐怖非墮泥犁中畢竟障菩提聲聞獨覺地則為畢竟障如人愛壽人怖畏於斬首聲聞獨覺地應作如是怖菩薩發心時即荷度重擔而有不退之意謂之得不退轉入地更增直至八地得無生忍而興大悲乃真不退也然未至八地前放逸之習隨時現行易墮二乘斷滅菩提是以頌云雖墮泥犁猶可得救一入二乘永無出期故菩薩發心應於二乘境地深生怖畏如愛壽人而畏斬首時時攝念令不放逸又菩薩境界無二所顯故於世間生死出世涅槃樂著之兩邊皆須棄捨而於所為之菩提念念精進以期圓滿是亦儒者捨生取義之旨而本論所云捨即精進之義也復次無生法忍者二乘菩薩同於緣起義而得悟入然二乘了解緣起實有生滅遂生法執菩薩了解緣起無生遠離執著信念不動是之謂忍也何謂無生忍耶頌曰不生亦不滅非不生不滅非俱不俱説空不空亦爾隨何所有法於中觀不動彼是無生忍斷諸分別故常人於隨所有法皆成戲論戲論分別者謂依二邊或四端説也於法計執是生是滅謂之二邊再進而分別一生二滅三亦生亦滅四非生非滅謂之四端如是斷常一異去來亦爾剋實言之戲論根源法執而已譬如言色以有色之生滅可指乃有實色究竟則成法有自性也是故二乘種種戲論分別皆不外法執也菩薩以離自性為法深密言無自性性也即於所有生滅觀其原無所謂生滅頌文所謂於中觀不動菩薩於此離自性法勝解不動是即無生法忍之義得忍次第初以比量勝解無生最後現量證會臨人實相即彼無生之解亦復無有龍樹喻此前者如遠見雲霧似有實物後者如置身其中雖有而不覺此屬八地境界菩薩一入此位即得授記決定成佛不虞退墮矣頌曰既獲此忍已即時得授記汝必當作佛便得不退轉已住不動諸菩薩得於法爾不退智彼智二乘不能轉是故獨得不退名入菩薩位決定不退故此授記住不動位成其法爾之性何退之有耶是故菩薩未得此不退位前不能放逸而墮二乘此不廢精進之捨義也復有方便得此不退即念佛三昧所謂般舟三昧也頌曰菩薩乃至得諸佛現前住牢固三摩提不應起放逸諸佛現前住牢固三摩提此為菩薩父大悲忍為母此般舟三昧即是菩薩以念佛故現在即得十方諸佛現在其前而住三昧故雖不得勝解趣證之無生法忍得此三昧亦不退也大集經賢護分詳之而此三昧持心不散喻之如父任持家人大悲與忍長養不退喻之如母養育子女又四無量始慈終捨顯示由慈啓發而究竟圓滿其事者則有賴於捨也有此四行策動其心六度之行方不空洞而菩薩行之所為周遍者即以四無量為實踐之門也第二段説資糧修集以福慧辨菩提資糧之準備所以示菩薩之方便行也此有三義一者修習福慧各有方便於六度中分別而修尋常以前三度為福蓋行施戒忍世間共許能得人天福報故後三度為慧由進而定由定生慧能得菩提或有判前五為福後一為慧者進定亦福以由進定生天而取樂故然此福慧各有方便不審方便唐勞而已二者慧以修福真實之福由慧導行菩薩不求人天福報專一無上菩提即為大福是須以慧方便而後能也三者慧以行慧此菩薩於慧之運用以無所得為方便修行般若即運空不證之義也具此三方便然後菩薩行方便之義始可談也依上所述分四段釋一修福方便二慧以修福三修慧方便四慧以行慧茲述修福方便福待積集而成積集由修修之謂習謂反復而行也此中言修先説入地次述地前即先示人以勝令起欣求而後知方便之必須依次進修也云何修福方便耶頌曰少少積聚福不能得菩提百須彌量福聚集乃能得雖作小福德此亦有方便於諸衆生所應悉起攀緣我有諸動作常為利衆生如是等心行誰能量其福不愛自親屬及與身命財不貪樂自在梵世及餘天亦不貪涅槃為於衆生故此唯念衆生其福誰能量無依護世間救護其苦惱起如是心行其福誰能量菩薩所求菩提為一切智智圓滿此智自非少少福聚而必百須彌量福乃得究竟佛德如是佛之化身相好亦復殊勝所感廣大能感之因理應無量也然聚集此福亦有方便即充心之量而已蓋圓淨法界為大菩提法界者生佛所共有一衆生未成佛則法界一分不淨是故菩薩念念為衆生也行一福德心量普及一切衆生如世理財涓滴歸公而無有私則財用恆足是即無量也無私者則能捨於自親屬生命財富亦不貪愛於他自在梵世餘天涅槃等樂亦不希求唯念衆生作其依護如是心行其福無量此修福之方便也次言慧為福之方便修頌曰智度習相應如搆牛乳頃一月復多月其福誰能量佛所讚深經自誦亦教他及為分別説是名福德聚令無量衆生發心為菩提福藏更增勝當得不動地隨轉佛所轉最勝之法輪寂滅諸惡刺是菩薩福藏般若之行三輪清淨菩薩之行如一念與此自性空之般若行相應福已難量況復久久纍積掩牛乳頃者喻短暫時月復一月喻久集也若力不及此而於佛之深經般若華嚴寶積等誦讀宣説自增福德令他發心亦名福聚能至不動地也是能隨佛所轉法輪令法等流常住世間如此修福始與菩提相應以一切行皆為衆生不自私也次重頌以上兩義而以悲智為福德積集之無上方便即為圓滿菩提之資糧頌曰為利樂衆生忍地獄大苦何況餘小苦菩提在右手起作不自為唯利樂衆生皆由大悲故菩提在右手智慧離戲論精進離懈怠捨施離慳惜菩提在右手無依無覺定圓滿無雜戒無所從生忍菩提在右手菩薩為菩提故修集福德以大悲為根本智慧為方便取無上菩提如在右手前二頌謂由大悲故利樂衆生忍於大苦不住涅槃而為衆生永作依護後二頌謂由智慧故以無所得為方便施戒忍等皆得清淨俱到彼岸復次菩薩地前初業修福者即明菩薩所以事佛之道是有三類一懺悔行二勸請行三隨喜回向行頌曰現在十方佛所有諸正覺我悉在彼前陳説我不善於彼十方界若佛得菩提而不演説法我請轉法輪現在十方界所有諸正覺若欲捨命行頂禮勸請住若諸衆生等從於身口意所生施戒福及以思惟修聖人及凡夫過現未來世所有積聚福我皆生隨喜若我所有福悉以為一搏回與諸衆生為令得正覺我如是悔過勸請隨喜福及回向菩提當知如請佛右膝輪著地一膊整上衣晝夜各三時合掌如是作一時所作福若有形色者恆沙數大千亦不能容受初懺悔行者謂諸菩薩敬事諸佛宜先淨意於佛之行力所不及懷漸恥心若已有過於諸佛前發露懺悔如是始漸與佛相應而此懺悔有過不再犯時時自省乃捨染趣淨之轉機也次於佛德景仰向往若佛不住世即勸請住佛不説法即禮請説佛般涅槃禮請長住如是勸請不離諸佛親為承事實進德之無上緣也三隨喜回向者菩薩以利樂救拔有情為本故積集福德而能善與人同見諸聖人所作功德自當隨喜即請衆生偶一為善無不歡喜讚嘆若自所作所謂樂取於人以為善也又隨喜究竟於自所作福德悉以回向一切衆生共得無上菩提安隱涅槃如是菩薩衆生善善交感福德增廣嚴佛國土是即隨喜回向之功用也蓋菩薩行以隨喜而廣大以回向而幽深般若行中慈氏般若特重於此後來唯識所談如護法等亦顯發此意以為觀行之主參看寶生論其有深意存焉復次菩薩由懺悔而清涼自家身心由勸請而知所仰止由隨喜回向而善與人同然於初業時應晝夜六時初中後各三合掌禮拜收拾散心端其儀容所有動作無非警醒自家身心晨昏不廢相續無間以此培本福德增長雖恆沙大千實為難容復次菩薩修聚福德宜知維護此有方便頌曰彼初發心已於諸小菩薩當起尊重愛猶如師父母菩薩雖有過猶尚不應説何況無實事唯應如實讚若人願作佛欲使不退轉示現及熾盛亦令生喜悅未解甚深經勿言非佛説若作如是言受最苦惡報無間等諸罪悉以為一搏比前二種罪分數不能及初業菩薩積極為善而於法僧尤應敬重不應以己無知隨意謗毀如是尊重法僧是亦消極護福令不漏失之方便行也已説修福次言修慧菩薩先修福於諸身心成辦堪忍與柔順皆所以為修慧之地蓋慧如無方之神必有堪忍因緣為之便利又必心極柔順有如百鍊之鋼應物成器始克顯其功用也是故菩薩由施戒忍進定磨鍊其心使成堪忍之器得柔順之性成辦一切利衆生事及諸佛法如是始能修慧此中方便亦有二種一慧方便二慧以行慧言慧方便者即以三解脫門作勝義修頌曰於三解脫門應當善修習初空次無相第三是無願無自性故空已空何所相諸相既寂滅智者何所願此三解脫門即三三昧為般若之最勝方便佛果涅槃是為解脫今此即為證入佛果之門也此門有三可分合説如分説者謂四諦十六行相分攝三解脫門空攝空無我無相攝滅盡妙離無願攝餘行相此大小乘所共者也若合説者即大乘不共觀法一空到底貫攝其餘一門輾轉淺深初若當理餘亦應理也修此次第初門即空無自性小乘僅空人我而有五蘊法我大乘則空法我而言無自性也此無自性即龍樹所説之法無定相謂無知所執之實有相也菩薩於此所執實性觀之為空依於空故無有差別則一切相無所安立若是實者餘法附麗無有窮盡如小乘之分別色法有有見無見有對無對種種行相可言一皆託於實色若是相空無則無希求願望無造作營為則永離流轉畢竟安隱也觀空以無願為最後無願則不為三有之因即是出離三有得與涅槃相應矣又三三昧皆在定中行般若以此為方便即慧依定起龍樹喻云如燈在室無風動搖則燈愈明如是智慧依三昧定其明亦爾此明以定為修慧之方便也次言慧以行慧者以慧為方便乃佛法中究竟方便非僅般若學之要實全部佛法之要也此方便即慧而微有別龍樹釋云慧之淳淨者乃為方便深入而非淺嘗之謂淳純一無雜之謂淨即此之慧是為方便從何而得淳淨耶曰般若由三三昧入自有其範圍蓋入慧之門為空空者諸法自性本無所得如人夢覺而知夢中所歷本無有也非先有所得以空空之謂無所得也進而慧之自身亦無所得亦不應著此乃真究竟無所得是之謂淳淨然後可為方便也以何方便而行慧即於人生涅槃流轉兩岸皆無所住所謂無所住而生其心者後之頌文即以不住兩邊明此方便先言不住涅槃後言不住流轉菩薩云何而能不著涅槃耶以有本願故本願者初發之心猶儒者志學之志持志不輟而後能究極從心所欲不逾矩之境菩薩本願上希於佛下利衆生自能不遺衆生而不著涅槃也頌曰於此修念時趣近涅槃道勿念非佛體於彼莫放逸我於涅槃中不應即作證當發如是心應成熟智度如射師放箭各各轉相射相持不令墮大菩薩亦爾解脫門空中善放於心箭巧便箭續持不令墮涅槃修念時者謂修三三昧時非佛體者指二乘涅槃菩薩非不須涅槃然由三三昧所得涅槃乃二乘涅槃非佛體大涅槃故修念時應不稍疏忽致違本願也成熟智度者智於因為般若於果為一切智智實一法也但須般若成熟始為一切智智猶華熟而為果也當發如是心者即時時莫忘本願也故菩薩修學般若普於一切皆所應學自於涅槃不應作證然三三昧所緣皆為涅槃境既學三三昧云何而不證涅槃耶是即般若所云觀空不證之義觀謂現觀悟入如友朋之親見對晤證謂證得非證會意得即證如心經無智無得之得此不證有二義一者無所證得輾轉深入見所證得者法自性空本無可證得故二者無取證得謂別有事在不樂流連菩薩輾轉不息次第升進一法萬法盡其所有如其所有一切遍證而非於少分即足也觀空如是觀無相無願不證亦爾難曰一法不著云何具足一切應曰是殆如奕滿盤著子似皆間散直待最後一著始見全盤皆活子子相關佛法亦爾非一法不著則萬法不得三祇修行不著不證者為最後一剎那相應而得一切智智也頌中以射喻此方便謂以箭射心緣空三三昧不令墮地涅槃必須箭箭相拄前後相續菩薩心箭不著一法觀空不證輾轉不已者意在周遍經歷迄於最後之一箭也續射之箭持使不墮即是方便以慧行慧至於正覺之方便也又次就利生言菩薩不證涅槃者為拔救衆生故佛法原有三種行事謂自利利他及自他兼利但為人之學根本精神實在利他故此畢竟不證涅槃也頌曰我不捨衆生為利衆生故先起如是意次後習相應有著衆生等久夜及現行顛倒與諸相皆以癡迷故著相顛倒者説法為斷除先發如是心次後習相應菩薩利衆生而不見衆生此亦最難事希有不可思雖入正定住習應解脫門未滿本願故不證於涅槃若未到定位巧便力攝故以未滿本願亦不證涅槃衆生執著諸相而有無明流轉生死菩薩欲使離倒趣涅槃道證得菩提是必於衆生所執偏學遍知然後始克應機説法除彼倒見也於此有疑衆生以有執故而成倒見菩薩謂有生可度有涅槃可入得非執耶自既成執云何教人離倒耶應曰菩薩由得法之實相故一切修行祇是隨順實相非特善觀於空不證涅槃並能令一切衆生皆入涅槃而不著衆生想法之實相即涅槃故自性涅槃衆生本具由顛倒著而不覺知菩薩順其實相而為説法斷障入滅由是衆生涅槃俱非菩薩造作一切分別俱入夢境夢覺自無夢中一切倒見也夢中無非寂靜然夢中百般艱辛不無如是菩薩順自實相度生亦何有於衆生想耶菩薩衆生俱是假名須菩提般若如是而已經言菩薩度衆生實無一衆生得滅度者如石女兒原無其人何能教執器仗驅之殺敵耶孟子以禹之治水喻智行所無事而無有執孟謂之鑿則智大矣於此實相略可相喻菩薩得智實相無所得而為方便是方便究竟所得亦究竟也菩薩本願滅度衆生未滿本願觀空不證信樂涅槃而不證此即菩薩為成就佛法對涅槃所取之態度下言不住流轉之方便菩薩對成熟衆生與上態度正反頌曰極厭於流轉而亦向流轉信樂於涅槃而亦背涅槃應當畏煩惱不應盡煩惱當為集衆善以遮遮煩惱菩薩煩惱性不斷是涅槃非燒諸煩惱生菩提種子記彼諸衆生此記有因緣唯是佛善巧方便到彼岸流轉之實惑業苦而已惑為本而其實即三毒也菩薩云何應畏煩惱不應盡割絶煩惱耶一者衆生與煩惱不能分割菩薩本願為度衆生雖知煩惱可畏而不能與衆生無緣但集諸善對治化為菩提耳若如小乘視煩惱同蛇蝎避之若浼而此蛇蝎猶存仍可為患菩薩以方便對治化為菩提則得永久安寧也二者菩薩所以能集善根者正賴有煩惱在此不盡之煩惱非菩薩自家煩惱而為對人所引之煩惱於彼不斷乃能積集善根是即以煩惱為菩提種所謂道不離煩惱而於煩惱中行道之義也智論於如實巧度語引文殊師利本事云勝意比丘教人善善惡惡極為分明喜根比丘於諸善惡一視同仁而云三毒即是菩提若分別之則是衆生與佛法無緣也是故真正大乘佛法即煩惱而求菩提謂得煩惱實相即能出生長養菩提非以煩惱為道乃於煩惱中行道孔子嘗言小人難養而以慈祥攝受非但絶之又云以直報怨是亦即於煩惱中行道之義精神與此略似若得煩惱實相則煩惱即空即能任意流轉不為所困於此有疑者謂菩薩不證涅槃而得菩提云何經中法華亦記聲聞而得正覺耶應知彼是佛之方便佛能達其實相故能以方便熟之是則此慧之方便非不達實相者所易言第三段明資糧修集以地位勝劣分説者般若行非一蹴可幾而為漸進故有次第地位所以修集資糧於福慧之後明菩薩之漸次行也此分兩段地上菩薩為得力修地前菩薩為未得力修菩薩見道即便入地煩惱障薄所有修為能隨自意樂生死變易亦隨欲顯現故稱此後之行為意樂行稱其身為意成身或變化身或意生身地前菩薩努力聞思確定知見以為修趣正鵠故以勝解為主而亦名為勝解行地獲此勝解必須內具知見外資善友如是雖處四顧茫茫波濤洶湧中亦不至如無舵之舟失所趣向故此地前勝解行尤為菩薩所應知者次釋次第義此以地位辨地者分位如世事之各有其分段層次又地有能載能生之義菩薩行取喻如地即顯地地皆具任持發生菩提資糧之功般若説地有二一為三乘所共十地從乾慧地乃至如來地是也一為大乘不共十地由極喜地至法雲地是也如是十地地地升進固有其次而每地之中復有被甲發趣超乘之次此如臨敵先之鎧甲莊嚴繼之長驅直入終於殺敵致果而復超然向上一著菩薩亦爾入地修行先被大心鎧甲以自嚴飾盡攝法界有情於懷展開心量以為行踐所依即堪能負重也繼而發趣實踐充心之極達其極矣而復超然不著更求勝進日新其德即能出生勝上也於成佛之念自有決江河莫禦之勢也此中趣入亦有其次一者先行其易漸及其難二者先由自作漸教他作三四之次則於他人與他作事隨喜贊嘆亦猶儒者己立立人己達達人之意如是四行每地如是最後超乘此如競走將至目的地再一加行而達終點之意龍樹釋此云如行路人得馬乘馬見象趣象得象乘象見龍趣龍得龍乘龍而為超乘精進不息之意也是即般若行次第義也先説得力者修頌曰諸論及工巧明術種種業利益世間故出生建立之隨可化衆生界趣亦生中如念即往彼願力故受生於種種惡事及諂幻衆生應用牢鎧鉀勿厭亦勿憚地上菩薩為衆生故於一切有益世間之學應學應知世間學可分三類謂諸論工巧明處也於此而能究竟通達便為一切修行之因論言菩薩應於五明處求也然地上菩薩以得根本智故乃能遍學五明得其應用故為得力者修非未得力者所可企及又十地行為天行菩薩行十王大業是猶儒者內聖外王之事故能隨願趣生界趣化導衆生不礙煩惱而能善用煩惱所以不憚惡事並能轉移諂曲誑幻世間惡不出此二字衆生同趣淨界也地上之行詳十地經本論甚略凡夫空論亦無裨益今即不詳次説未得力者修正為衆生説法蓋菩薩鎧鉀自嚴端在地前勝解行處被之故於地前特以六種行詳言之六行者戒定修相法教授供養實即三學修相以下即屬慧學佛學之學原不出此三耳是中戒行頌曰具足勝淨意不諂亦不幻發露諸罪惡覆藏衆善事清淨身口業亦清淨意業修諸戒學句勿念有缺減一切菩薩行以戒為本而戒特重修身者以是諸行之根本故佛未製戒前隨事糾正具有略戒所謂諸惡莫作衆善奉行自淨其意是諸佛教諸佛輾轉傳來奉此略戒為本實則已總攝一切菩薩行矣廣戒乃佛順弟子隨事別製者頌中不諂不幻二句即自淨其意發露罪惡句即諸惡莫作覆藏衆善而不自矜乃真衆善奉行也苟能如是自然三業清淨植立戒本而後可修諸學處勿令缺減此非託諸空言而須見諸行事之學也儒者非禮勿視聽言動以為復禮歸仁之功是禮即戒故戒行實菩薩勝解行之本也其可忽諸其次定行重在相續非僅靜坐不動之謂即行住坐臥視聽言動無一非定定以心為主故稱增上心學頌曰安住於正念攝緣獨靜思用念為獲己心得無障心若起分別時當覺善不善應捨諸不善多修諸善分緣境心若散應當專念知還於彼境中隨動即令住不應緩惡取而修於精進以不能持定是故應當修定謂專一心志云何專一曰安住正念而已吾人之心不能無念心態起伏一彈指頃已六十念苟正念相續能常時安住安謂從容自然即為大定而行住坐臥視聽言動莫非定也儒言止於至善知止而後能定能安能得又云持志而不動心持志二字最為切要蓋能把握此念何往而非定境也佛法以九住心談定參看六門教授習定論揭示根本本論亦同此依據四頌中闡説三層次第初頌言攝心謂於所緣境界逐漸縮小範圍並非無緣集中一處而後用念相護以念為工具此為習定工夫即後念與前念相貫於心住處不迷不亂而後心始能住正念心無障即為住正念佛於修戒之後言修心梵文定學本名心學此修身修心之次與儒者不盡相順也二頌言修心謂心雖由念護持安住正念然未得力者不能持續必有餘念間起今此修心即於念起時分別善否應攝心住善制伏不善也順法實相淨相寂相之謂善有著心向善亦説名不善於此多修今其安住是心即常善也佛答跋蹉比丘問善不善曰十善是善十不善是不善此種隨順實相分別之念即為正念自在比丘釋此謂於思惟時若起分別覺知是善應當數數多作不令散亂如室中燈不閉風道則能燃熾此所謂善即指正念定心若無有念即成死心無用矣後二頌言治心謂緣境心若馳散即當警覺令還住正念若疾疾惡取欲住正念亦屬妄念若太弛緩復不能攝譬如調琴緩急俱不得孟子所謂必有事焉勿忘勿助之義頗能領悟此中消息也上述三義為九住心根本亦即增上心學之根本也然此不能捨離精進佛言精進成熟一切六度中進定相連者蓋定得精進即不致間斷也頌曰若證聲聞乘及以獨覺乘唯為自利行不捨牢精進何況大丈夫自度亦度人而當不發起俱致千倍進修定之要在持心安住正念相續相等故定名等持等持者如持油鉢行經鬧市一滴不傾定之持心亦復如是不令高下無所偏側故定行所重在等心不旁及即能等也如是用心即為精進故此精進非勢能之增益乃善念之綿綿不斷亦即安住之因龍樹智論謂為定慧之根也六度前三雖賴精進成熟然實無定慧二者所須之深切二乘專求自利尚極精進於七返人天尚可縮短矧大乘丈夫負自他兼利重荷其可不千倍於彼之精進乎又此精進於諸定事當緣一境而於餘事懷捨離心不應貪著頌曰半時或別行一時行餘道修定不應爾應緣一境界於身莫有貪於命亦勿惜縱令護此身終是爛壞法利養恭敬名一向勿貪著當如然頭衣勤行成所願決即起勝行不可待明日明日太遠賒何緣保瞬命安住於正念如食愛子肉於所食噉中勿愛亦勿嫌修習定行以正念安住為事故於所緣當專一境不可分歧凡身命名聞飲食等事足以引動心念者皆應蠲險不可貪著而於所希勝境即起勝行不當推託以待來年蓋此身命剎那難保正宜以此幻身隨即安住實相以取如來堅身也又此所緣順善觀察免為魔礙頌曰出家為何義我所作竟未今思為作不如十法經説觀有為無常若無我我所所有諸魔業應覺而捨離根力與覺分神足正斷道及以四念處為修發精進心與利樂善作傳傳生處及諸惡濁根彼當善觀察我於善法中日日何增長復有何損減彼應極觀察見他得增長利養恭敬名微小慳嫉心皆所不應作不羡諸境界行癡盲啞聾時復獅子吼怖諸外道鹿行者修為如救頭然應作即作發勤精進而不令此剎那時間空過是故常思出家之義及所作成滿否也又復觀察有為無常蠲諸魔業而於三十七菩提分法精進修習於諸善惡亦常觀察增益損減而於他人利養離嫉惱心於諸外境心如盲啞而不敢著但於外道處應獅子吼令其怖退轉還是此定學何事不作儒言自反而縮雖千萬人吾往矣有大定斯有大勇一切菩提分法皆得成滿也其次慧行凡有多種初修相行謂佛身相好菩薩所求在於成佛佛之顯示為色身法身色身相好法身功德法教若菩薩行於諸自身具足相好即足為成佛之證儒者亦有服堯服誦堯言行堯行是亦堯也語具足相好布施第一通常布施所感勝果為轉輪聖王卅二相外似於佛不如佛之圓滿殊勝若以無所得慧行施成就一切而無所著所得果相即佛相好也頌曰奉迎及將送應敬所尊重於諸法事中隨順而佐助救脫被殺者自善增不減善修明巧業自學亦教他於諸勝善法牢固而受之修行四攝事施衣及飲食不違乞求者和合諸親戚眷屬不乖離施宅及財物父母及親友隨所應安置所應安置處無上自在主雖復是奴僕善説亦受取應生最尊重施藥愈諸病前行善業首細滑美妙言善為正意語前後無不供不壞他眷屬慈眼觀衆生亦不以嫌心皆如善親友是中修相因緣自在釋文及智論十一草九已有詳解具於彼論茲不復贅要之身相心相兩相稱應而已視其用心如何所感異熟稱心而現儒言誠中形外仁義禮智根於心其生色也淬面盎背三十二相以善安立相為始此處文義不順應從第三頌説起謂佛發心於勝善法牢固受之守正不撓故所感為第一足下善安立相其餘諸相次之勝善法者相應空性之教法百行之本空性不可動空性相應之法豈可動乎依法修行所感之身此身所設之教又豈可動乎三十二相以善安立為初亦佛法有根本復次法身德相云何具足耶謂法行及隨法行而已法者即佛教法如教而行即是法行頌曰應當如所言即隨如是作如言若即作他人則生信應當擁護法覺察放逸者及作金寶網羅覆於支提有欲求綵女莊嚴以施之亦與説佛德及施雜光瓔造作佛形像端坐勝蓮華及於六法中修習同喜樂可供無不供為命亦不謗佛之所説法及以説法人金寶散教師及教師支提若有忘所誦與念令不失未思所作已勿躁勿隨他外道天龍神於中皆莫信心應如金剛堪能通諸法心亦應如山諸事所不動喜樂出世語莫樂依世言自受諸功德亦應令他受法行者日常生活行為如佛所説皆應隨作自作教他導其敬法法所在處應廣修擁護供養應施淨施恭敬於法而不謗法於諸外道勿躁勿隨心如金剛通達法義亦似大山不為事擾懷出世心而不隨世所有功德回諸衆生如是所行如法而行不行非法此非脫離人生而全不問也次説隨法行即三十七菩提分法頌曰修五解脫入修十不淨想八大丈夫覺亦應修分別天耳與天眼神足與他心及與宿命住應修淨五通四神足為根欲進心思惟四無量住持謂慈悲喜捨四界如毒蛇六入如空村五衆如殺者應作如是觀三十七菩提分法者大小乘共行之道六度為大乘不共道約之則唯四念處而已謂以心觀身受心法四者所成之慧以念繫心專注一處由念而住故名念住處衆生知見於法顛倒不淨謂淨身法以苦為樂受法無常為常心法無我為我法法小乘見此四倒盛修無常苦空無我捨生死瀑流而入涅槃菩薩則於四法不住衆生二乘邊執歸趣法身涅槃而成常樂我淨四德論文初後二頌正説不淨苦無我中間二頌顯大乘所修念處不共二乘其要在於無著大乘觀法無自性以空性為境故無著也頌云五解脫入者謂依法修行十不淨想為身念處觀之不淨即不貪著八大人覺為受念處以少欲知足為法苦樂原由於多欲不足也孟亦云養心莫善於寡欲修心念處觀心無常致無礙用發為五通通者智證證法無礙而顯其智即心之用也五通由神足而長成四無量而擴大菩薩五通為化衆生故須四無量用之是心得其妙用能知衆生勝劣品類一一攝受成就之四界四大六入六處五衆五蘊內外法為法念處修法念處者謂觀四大如毒蛇有毒蛇喻經四大不調時生病苦如毒蛇在篋稍一不慎即被其毒智論十二有説可證觀眼等六處如空村無主是賊所居五蘊法聚如殺者離散破壞而無有我故法念處等以無我空等為觀也然小乘等視此無我空等則生厭離而入涅槃大乘視之更發勝心知此身之不可恃急欲換取金剛不壞身心以為衆生依護也其次教授行菩薩由法行而證入法之實相有待教授釋迦成佛亦於然燈佛所授記即得然燈佛之教授由此授記即證明其知見行為之正確如法而益增其精進也經講菩薩教授行莫詳於寶積原為單行後入大部即迦葉品全文以十六段明菩薩教授初六段以菩薩正行示菩薩所應行本論此處即據其義而結頌之頌曰重法及法師亦捨於法慳教師勿捲祕聽者勿散亂四種得慧法無慢無希望唯以悲愍心尊重恭敬意為衆而説法離四壞善根法於聞無厭足聞已皆誦持不誑尊福田亦令師歡喜不應觀他家心懷於敬養勿以難論故習誦於世典離四敗壞相勿以瞋恚心毀訾諸菩薩未受未聞法亦勿生毀謗斷除於憍慢常住四聖種勿嫌於他人亦無自高舉離四曲心若實不實犯不得發覺他勿求他錯失自錯當覺知佛及諸佛法不應分別疑法雖最難信於中應信之雖由實語死退失轉輪王及以諸天王唯應作實語打罵恐殺縛終不怨責他皆是我自罪業報故來現修四直心應極尊重愛供養於父母亦給侍和尚恭敬阿闍黎修四善順為信聲聞乘及以獨覺乘説以最深法此是菩薩錯為信深大乘衆生而演説聲聞獨覺乘此亦菩薩錯大人來求法慢緩不為説而反攝受惡委任無信者離四錯謬遠捨所説錯所説顯多德於彼當念知亦皆應習近等心平等説平等善安立亦令正相應諸衆生無別修四正道為法不為利為德不為名欲脫衆生苦不欲自身樂離四相似行密意求業果所作福事生亦為成熟衆捨離於自事修四真實親近善知識所謂法師佛勸勵出家者及以乞求輩近四善友依止世論者專求世財者信解獨覺乘及以聲聞乘此四惡知識菩薩應當知復有應求者所謂四大藏佛出聞諸度及於法師所見之心無礙樂住空間處得四大藏菩薩正行以得般若為主云何得此般若日新而不退失即菩薩行之中心問題也以得慧言必先以聞熏啓其蒙即有四法而為導首一謂智慧之來由於法教故應尊重法及法師二謂於所聞法不吝解説三謂於示教時當求契機而無隱祕四謂如説而行無異意樂故不散亂如是四行生慧之本而為菩薩所應行者然須除離四壞善根法以為增上一者無慢二不悕世利三以悲愍心説法四以尊敬心説法更進而離四敗壞相一聞無厭足精進誦持二不誑尊福田令師歡喜三不以敬養心觀他家四不以戲論心誦世典如是更進成辦直心離四諂曲謂於菩薩行不以瞋恚故毀訾於衆未受未聞亦不生謗除諸憍慢亦不嫌他自高常住四聖種飲食衣服臥具隨得知足樂修樂行而勿障入道之機也如離四曲即能修四直心頌有信受難信法者即此能與諸佛相契也常作實語橫逆之來反求諸身更進當修四和順法即於父母和尚教授尊重和順而無諂曲也再離四種説法錯謬謂於二乘人應次第導引不應頓説大乘反之於大乘衆亦勿説二乘法以阻壞其心有來求者應即陳説於諸法友應為攝受遠離錯謬修四正道即頭陀行也謂於衆以平等心説安立教化亦令衆生依之而行平等行正相應如是離四相似行即為利為名於自於他俱不脫苦修四真實行一者信空而求業果空謂法無決定性非無善惡因果之謂正以法無自性業始不虛若實有自性不可改轉何業果可言二者知無我而修慈悲衆生著我流轉菩薩了知無我悲愍衆生開示悟人無我三者樂涅槃而行生死菩薩了知生死無性無異涅槃運用生死而求菩提四者廣布施而不求報所謂不著色聲香味觸法而行布施此中頌文不全後三種見卷未法供養處行四真實則能親四善友謂法師佛出家衆有求於我者反之離四惡友謂依世論者求世財者及信解聲聞獨覺乘者最後應得四大藏法一者值佛出世浸法流中佛法存在亦謂佛出二者聞諸度六度十度等教為一切善法所從出故三於法師所心無障礙四者樂住空間處心常空間不為煩惱纏縛成辦此境惟不放逸能不放逸即能超脫於諸生死蕭然無纍如是心樂遠離脫然無住是菩薩所應行亦即菩薩之教授也佛若在世教不外此以菩薩教授在得般若此四大藏法實得智慧之寶庫故以為菩薩教授之歸結也菩薩行之正邪取捨決擇如上復以喻明使更易了菩薩樂住空間心懷遠離以等心捨心攝御一切即能善入實相而得般若之慧也此有頌曰地水火風空悉與其相似一切處平等利益諸衆生當善思惟義勤生陀羅尼勿於聽法者為作於障礙惱中能調伏小事捨無餘八種懈怠事皆亦應除斷莫作非分貪橫貪不稱意離者皆令合無問親非親菩薩正行以得般若便能等心處衆如地等出生增長安立一切而無分別也又復菩薩存於捨心相應實相之心善思惟義義謂境界亦即實相然實相證得重在親歷攝論喻如啞受義雖不能言歷歷在心也然不唯悟入實相而已復能貫通一切陀羅尼者一切慧之總持猶如王者總持國政日理萬機修定之極而有種種三昧修慧之極而有種種陀羅尼貫通一切之意有此貫適一切皆攝無所窒礙所以成一切智智也孔子有一貫之言一之謂定謂三摩地貫乃謂陀羅尼也苟菩薩心恆專注於此自不作聽法者障遠離大小煩惱乃至不貪非分和合離散有情云何陀羅尼能貫通一切智耶諸法實相者空寂而已以空為寂靜而已去其不寂之客塵煩惱謂之為空並非空無空洞之意握此空寂即能貫通一切諸法而為諸法之等味一味然此乃依空而行而非得空若謂一切不得唯空可得其過有如頌曰於空而得空智者莫依行若當得於空彼惡過身見法本性空依空而行即是慧行若以得空而行即成空見較之我見更為下劣寶積云寧起我見如須彌山不於空見起增上慢蓋墮空見斷滅佛種即不可救譬如服藥治病藥不能行反增其病所以龍樹於中論中反復提示為執空者戒如觀行品云大聖説空法為離諸見故若復執有空諸佛所不化如觀四諦品云不能正觀空鈍根則有害如不善咒術不善捉毒蛇前者言空不可著後者言應正觀空龍樹談空依大般若用空不取是即以無所得貫通一切得大總持陀羅尼法門智慧至此而極資糧至此亦臻圓滿也其次法供養行菩薩地前不離十法行所謂書寫供養布施聽聞披讀受持諷誦開演思惟修習如是十行攝於三業前四為身業次四為口業後二為意業意中之思惟者謂依理趣門審察其義不可如言生執應知以意逆志是即聞思修之思意中之修習者謂依理趣等捨存心數數修行於諸事理心常洞鑒如法成辦而無取著此等法行即廣義之法供養是真重法而為地前菩薩所常修者也頌曰掃塗與莊嚴及多種鼓樂香鬘等供具供養於支提作種種燈輪供養支提舍施蓋及革屣騎乘車輿等專應喜樂法樂知信佛得喜樂給侍僧亦樂聞正法前世中不生現在中不住後際中不到如是觀諸法好事於衆生不求彼好報當為獨忍苦不自偏受樂雖足天福樂心不舉不喜雖貧如餓鬼亦不下不憂若有已學者應極尊重之未學令入學不應生輕蔑戒具者恭敬破戒令入戒智具者親近愚者令住智此中支提原意謂可供養處即佛塔之類支提舍環繞支提僧住處也蓋佛佛塔僧為法之所寄常興供養常時親近即可見法支提處有法寶可見聞法僧職傳聞然於所聞法應入法空理趣觀知法法不相知法法不相到所謂前際不生現際不住後際不到由是審知法無自性即無所著心自平等便能廣施衆生而不求報順導衆生皆得成滿而復於流轉中心在涅槃而行生死復有多頌曰流轉苦多種生老死惡趣不怖此等畏當降魔惡智所有諸佛土搏聚諸功德為皆得彼故發願及精進恆於諸法中不取而行捨此為諸衆生受擔欲荷負正觀於諸法無我無我所亦勿捨大悲及以於大慈勝過諸供養以供佛世尊彼作何者是所謂法供養若持菩薩藏及得陀羅尼入深法源底是為法供養應當依於義莫唯愛雜味於深法道中善入莫放逸菩薩為諸衆生於生死長夜荷負重擔以平等行遠離行發勤精進觀法無我而興慈悲教化彼等亦知於法本來無我不應執著而生苦惱但以衆生不知而生慈悲導令出離此即先覺覺後之義也如是行法即法供養供佛功德法供養最法供養者謂持菩薩藏得陀羅尼入深法源底也云何入法源底謂不放逸故於何不放逸是即依義不依語也於佛所説善通其義勿著語文此乃真實之法供養義者實相味者文字於文字上有種種修飾謂之雜味不放逸者謂於深法實相中莫放逸也於文字所示實義不放逸審諦思惟觀察修習心常緣此如是般若行依義不依語復以陀羅尼貫通一切即龍樹學般若行之點睛處也丙結分總結説意頌曰如是此資糧恆沙等大劫出家及在家當得滿正覺菩薩依此資糧精進而行不計時功故曰恆沙等大劫又在家出家同至覺場平等平等蓋成佛之行在心樂遠離何有形式之拘礙此亦龍樹提示之旨故此表而出之
