body:
  text: 如何研讀佛學必修五科次第一院學今日為院學講習伊始本院過去非無講習但在院學建立後之正式講習則自今日始也所謂院學者乃內院自己組織之佛學依吾人看來必如此組織建立方得稱為佛學因其尚未昌明於世暫以院學名之固非一院私有之學也今當始業之初於斯學締構之艱難目前講習之重要及今在此共學者自身之責任略為闡述一院學建立之經過內學院發起創辦之初即有意取準印度那爛陀寺以組織此學之計劃蓋自無著世親後印度講習中心即在那寺盛極一時我國傳譯佛學之奘淨兩大師俱從該寺出且自奘淨二師移植佛學來中土後那寺即日就衰微可知那寺實為華梵傳通之樞紐內院成立所以取之為模範也民十四五年間院開法相大學部予講印度佛教史亦以那寺為終結即表印度佛學於此終結中土佛學從此開始之意嗣大學部以時局關係只得曇華一現但建立之意仍未間斷繼此遂有十年藏要之編纂此舉非徒整理言教亦以為建立院學之準備也自避寇入川蜀院告成廿八年春予重講佛學概論又提那寺之學以為標準先師聞說歡喜讚嘆於時決意斟酌那寺講學規模損益立科以為院學遷延至三十年先師始有釋教之作院學規模至此始定不意先師今春遽爾示寂未見實施半載以來幸得種種因緣乃本釋教之意擬定實施計劃爰有今日之開講綜觀前後歷經二十餘年此二十年間內院所作均在建立院學為時不可謂不久且就內容言其先則有貫通之難佛學支離散漫非有貫通則難識其精蘊此觀先師初講瑜伽次究般若後闡涅槃備歷艱苦讀諸序文可知也入蜀以後又歷料簡精純之難幾經斟酌方得結論回溯此學締構之不易講習之始不可不先有明白之認識也二講習意義講習乃示為學之方應知二義一者盡講習之用二者明所講所習之學學不講不明盡用乃所以明學也孔氏以德之不修學之不講為憂足見講學與修德並行非徒資談說而已是猶一般之意義也佛學更進於此而以三學四依為歸聞思修之謂三學法了義智之謂四依學須從聞入聞者謂無倒了解然學而不思則罔思謂究竟思擇簡擇思而不修亦難入道修謂隨順現觀也如是循聞思而至現觀法之寂相親切體驗無有間隔然後得其真斯盡其用矣然如何使聞無倒思擇而入現觀耶則應以四依為標準也於真實了義之法如實解了則聞無倒於實義思擇不作文字揣摩則思擇究竟於無分別智上體會則為隨順現觀無分別者非摒除分別乃不分別所不應分別也苟能循四依之標準即能盡三學之用講習之事方不唐勞也又所講習者為內院自己所組織之院學吾人自信必如是講習真正之佛學始得昌明故盼同學相互砥礪期對講習者得教學相資之功以無負昌明此真正佛學之鉅任也三期望效果此次講習所期望之效果有二一在學者知以道為己任二在養成剛健篤實之風佛學傳譯千餘年對中土思想之影響甚鉅然所影響以予觀之未得真正發揮之功用是殆由文字上之障礙與思想上之距離所致蓋印度思想高深玄遠中土學術側重實在以致對佛學認識不真遂有似是而非之論中土之學以孔孟為精萃二氏均闡明人學以堯舜為人倫之極則佛學則超於人群充其量為有情學而以佛為有情之準依凡此皆為勝進一層之遠見向來於佛學未加切實認識者謬謂與孔孟相違不知實是涵蓋孔孟之學而為人生之真正學問今此講習即欲發揮此義俾真正佛學與世人發生純正影響也是以來學之士必當有伊尹之志有先知先覺之自信有以此道覺此民之志願方克負荷此重任也然任重道遠尚須剛健篤實之風以端其趣剛健篤實四字出於易之大畜卦乾下艮上有天在山中之象彖傳云剛健篤實輝光日新其德象傳云天在山中大畜君子以多識前言往行以畜其德前言即教往行即戒二者融洽身心以進德不已自成剛健篤實而後可以任重也以此道為己任則師悲也剛健篤實則教戒也師悲教戒院訓所在應念之不忘也今舉此兩點期之來學亦願學者有以勗予也二三周要義綱要之作依於先師釋教一書釋教最後有各科文字謂由嫻習文字而進於觀行中列四科即毘曇般若瑜伽涅槃所有指示極為專深今此講習實為其階梯也四科僅及於教院訓四字戒猶未釋似應別有戒科故為增益印土大寺原有是科也講習各科經論不取大部但舉根本要籍即先立乎其大者之意非由淺入深之談茲以三周編制周各繫一中心思想而各自成一完備結構三周又復前後相接義為一貫略述於下初周思想乃佛學根本之根本即心性本淨客塵所染八字所詮佛學亦名心學即本此義而立前人誤以此八字但為小乘分別論者一家之特唱實則全部佛學之根本也阿含般若華嚴涅槃皆作是說各論亦同是故初周特標此為論極又心者即指一切眾生當下之心因被客塵所染居於染位故名眾生但其性質地則淨淨字梵文原為光明不著之義非與染相對之淨可以寂字形容之而於客塵不著如鏡之明日之光原與煩惱不相應也以此一義示眾生當下之心佛法全立基於此故吾人講習佛學須先識此心尤須識得此心非他而為自己者若於此當下自覺此心本淨則能發見賢思齊之用而自躋於聖賢之域矣然此心一現猶不足為憑依須繼續保任令之不失如此心存而後學存則佛學實從內發有異於外鑠也又性淨性寂義一名異以性淨之淨易濫染淨之淨故以性寂言之初周以此為根本各科義與此相涉者當隨之而明也次周談轉依依者即指此心現居染位由聞熏而當下自覺乃發為捨染趨淨之行如是一捨一趨名之為轉轉謂轉易由染位而至淨位也至於此位即能盡心之性無漏顯現是即將本淨之相日進日明而心自知之用日進日增如江河沛然必至轉依究竟而後已殆自然之勢也次周以此要義為中心各科義與此相涉者隨之而明也三周要義為一法界法界云者充心之量也三界乃生佛交網之世佛與眾生徧具此心此心相關名一法界即佛與佛佛與眾生眾生與眾生心相交感而呈顯者故經言一眾生成佛三千大千世界為之震動孔子亦云一日克己復禮天下歸仁所云法界即此心之究竟圓滿處所云一者諸佛與眾生依等皆以圓滿之心為依而相同皆以清淨之相為相其所以為心究竟者無以異等同之謂一非單一之義也學者識得此心即將此心擴充上應諸佛與一切智心相應傍應眾生不捨眾生是即大乘之根本精神佛心亦爾故三千大千世界眾生無量成佛亦無量而皆有關於我乃所謂緣起佛法至此始為究竟是故學人應以此一法界為依從而行證以期心行之轉依世界之圓淨斯乃此學之終鵠先師釋教意旨乃可明也綱要三周編製如是茲提五十部書用資講習以植是學之基餘則待學人之旁通擴充耳三初周典籍示要初周典籍五經七論皆明是周心性之要義周分五科一毘曇科毘曇即阿毘達磨乃佛說法之一分也此乃限定佛說範圍拘泥文字聲聞學為之主也此科本籍經為法句法句者佛無著述而由弟子輩傳誦之佛說也文成頌體取便記誦見雜阿含然此久佚不傳小乘各家乃各有其所宗之法句一一前後增益開為阿含後來所傳法句又由各家從阿含輯出者極不一致漢譯阿含亦僅一家所傳從法句經知佛說宗旨實為一心是義漢傳法句不明南傳本從雙要品開始漢譯之第九品初即闡說心淨客染凡夫未聞不能知修反之心淨離垢聖人聞而知修故心性本淨之旨極為明顯不似漢譯心為法本句之晦暗也又經之義理可參看大論思所成地所引法句古註論為阿毘曇心論毘曇有佛說弟子說者大迦延結集佛說為九分呈佛印可是為毘曇經佛弟子再加詮釋是為毘曇論法勝刪繁取要成此心論此為心要之心如木之貞實意謂此書為阿毘曇之心要也論以界品為首即示因義因推其本即指此心也有部組織毘曇置界品於後別具用意故不從之復次於毘曇中見聲聞學故以毘曇統攝小乘焉二般若科此科經取金剛般若般若為大乘學之根本典籍極繁有八部流支傳本九部玄奘傳本之傳然皆以金剛般若為終結金剛以一心為歸趣如云發無上心隨即有何住何行云何調伏之問蓋有此心然後能住能行能調伏不然般若之功將無所措矣是故金剛一經點般若全部之睛什譯大品於摩訶薩大心一章特立金剛品其要可知大心者我皆令入無餘涅槃而滅度之實無有一眾生得滅度者是即金剛心也論取菩提資糧論般若經義散漫龍樹此論為之經緯般若分般若與方便二門般若猶耳目方便猶百體百體從耳目則盡其用耳目附百體則施其聰明二者固不可或缺也論依二門由修集次第建立菩薩行軌範般若不落於空而方便亦不致謬信為般若要籍也今存自在比丘釋可以參考三瑜伽科般若談慧瑜伽言定是科經取寶積以其為瑜伽學之重要典據亦大乘學之中堅也寶積為一部之都稱今此特指其迦葉品瑜伽學明三乘道而歸趣於菩薩乘此經詮菩薩藏十六教授於菩薩行根本要義概攝無餘矣中有一相談中道義有十三種指出中道為法無我性謂法之離言自性更進而為心法之離言自性乃瑜伽學之最極義故大論抉擇分遂取此經全文而詳釋之也論取辯中邊論為彌勒分別中道之書也其要義有三一觀行之境為勝義勝義指出空性空性於虛妄分別客塵所染之心見之虛妄分別即心空性即是心性心與心性非一非異以心性為勝義此其特點也二觀行方便取於唯識此如以指指月意在得月忘指唯識是遮非表初遣境有次境無識亦不立是即有識所以明無境非成立有識也如是有無平等方便亦其特點三觀行次第先境後心是漸修而非頓悟立說依所緣緣之次第又其特點也以上三義皆瑜伽之根本談亦大乘之究竟義也後世中觀清辨之徒雖力破此又安能動其毫末哉四涅槃科此科以大涅槃經為依據大涅槃者佛涅槃也對二乘言故名大乃佛學究竟之目標也因有佛之大涅槃斯有三乘佛學之開創故可謂為原始要終之學印度那寺未另立科蓋以般若瑜伽賅攝因果原有涅槃在內故不別立然常人困於繁文茫然不知歸宿所以先師於二科外揭此一科示人以歸趣與根源之所在也參看先師內外學是科講習有一經一論經取勝鬘師子吼經經舉十四義皆與涅槃有關涅槃以攝受正法為根本勝鬘即踵此而開宗也涅槃經有三要義一佛身是常謂化身生滅而法身不壞二一切眾生皆有佛性皆能成佛三佛說有密意一期說法皆有要義不可拘泥解了即了義不了即密意也勝鬘言佛身常其因為攝受正法故謂正法常在即佛常在由此出生十四義既簡且要實為涅槃之精蘊也然此尚屬泛泛之義予於此經更得一勝義即出世正因是也佛學重在出世出世者非離棄世間之為出乃出類拔萃之為出超出特出之義此非由外力實其本性固爾以眾生本有如來藏心佛即從此出也然眾生處於流轉此如來藏心感受生死而不覺一旦自覺則勃然為出世之因矣勝鬘提示此出世正因予認為乃涅槃學原始要終之義其詳俟講此經時明之論取法界無差別論此言法界亦眾生心是心即菩提心此處菩提即涅槃名異而義同亦即平常心若將此心安於菩提上即菩提心也如言君子以仁存心心存乎仁則人心也如是心存菩提則佛心也成佛之心是心即勝鬘經所說如來藏論以十二門詳釋可謂勝鬘經之發揮也五戒律科般若重慧瑜伽主定是科主戒備三學而達究竟故此立科以為實踐之基經取清淨毘尼方廣經以見大小乘戒之根源一切戒經皆此流出所謂眾生界即法界而戒之源即心源戒以調伏煩惱為用然此非但制伏煩惱已也應使不生若觀煩惱無實唯心所現則煩惱不生而戒清淨矣是乃此書之殊勝義又對比大小乘戒亦甚詳盡小乘偏於身口大乘特重意樂如不與取為盜有而不捨亦為盜大乘無相平等之精神磊落光明之行可昭見之此經早為無著所推重攝論中所謂毘奈耶瞿沙方廣契經者此也亦名寂調伏音天子問經梵文瞿沙即寂調音也前人未之知耳論取瑜伽菩薩地中菩薩戒本羯磨以為實踐之依據是等條文學處為印土大乘學者共同遵守之通則於菩薩戒以心為主之意備著無遺小乘以淫盜殺妄為四波羅夷即他勝義犯即為人所共棄菩薩與此相似而在意樂上講如貪非僅指淫言名利恭敬自讚毀他皆屬之故謂之似波羅夷即由小乘戒首四條擴大言之也又菩薩行以六度為本此書攝一切行於六度而列六度之精要處於戒條故菩薩行不能離此戒科之論應以此為主以上五科典籍總略言之不離於心而尤以自覺有此心然後有此學所謂心存則學存也至如何保任此心使相續存在則待於嫻習止觀令散漫之心得以專一此有二書堪為準繩一者解脫道論中土自六代以來於止觀學雖有闡發惜於方法原委莫能詳焉天台暢談止觀著有摩訶止觀卻不知採用此書蓋不悉佛學真正止觀傳衍由上座而化地部由化地而瑜伽無著從化地部出家瑜伽實踐方法猶欠完全故取其根本之論以為補充此書錫蘭今斯里蘭卡猶以為實踐教本其好處即在其方法具體如將修止觀人分作十四類性行而觀其氣質之所偏孔子云觀過知仁也定三十八業處以為所學依止初以觀地遍處觀地之單純色為入門以地為化故名化地但由有相以入無相運用之妙未可拘也故談止觀實踐入門當以此論為根本也二者六門教授習定論此為瑜伽學者自大論修所成地中集出之要義謂止觀所依有三圓滿即師資授受俱備所緣心有所繫作意即常提起念頭猶云常惺惺必有事焉之意也而又提出寂因作意四字餘書未見止見此籍謂作意不離於寂即般若所云不離一切智智相應心也有此作意或學般若或學瑜伽涅槃皆可入道是以止觀以前論作基此論為導便能保任與涅槃相應之心相續不絕也四次周典籍示要次周講習乃各科之正宗所據典籍凡十九種初周發明有此自性本寂之心即作佛之因而為佛學之依據此周進言盡心之用即為轉依捨染取淨又此謂究竟轉依非共聲聞之觀行轉依也蓋是心轉依心用始能盡發而各科正宗皆不出此是為佛學之本色一毘曇科毘曇以佛說為主今依大小乘取經論各二初小乘毘曇經論各一一四含毘曇讀漢譯四部阿含乃湊合小乘各家所傳而成非一家之說如中土傳經之師承不同大概長中雜含屬上座部系增一則屬大眾部此從其編製與內容可以判斷也今用毘曇九分之意錄經中要義結為一書名毘曇讀以見後先學說相承之跡九分毘曇以四諦貫通類為九分義為四諦知佛說宗旨為知苦斷集證滅修道而以證滅為歸趣滅即涅槃以無餘依為極證則由有餘依入無餘依增一謂之盡有漏成無漏也是則原有依義且有轉依之義但小乘學者無人理會終不得其解此大小分歧之由也一以微苦微煩惱所依之身為依身滅為無餘依一以一切法所依之心為依轉依為無餘依是以涅槃學終非小道人所得知也二阿毘達摩俱舍論頌此書係從阿毘曇心論輾轉考訂而得之結論毘曇學有二宗一為上座本宗之經部二為上座末宗之有部俱舍取二宗之長一歸於理故印土講毘曇學者即以此為捷徑所以有聰明論之名後之學毘曇者無不宗之此論主分別說反對一切說故其分別三科謂蘊假而界處實蓋以界處為因為依故也是論作者欲明因依大本而不得究竟故一聞攝論即盡棄所學而從學焉非攝論之談因依義極為究竟歟所以今日仍以此義學俱舍講毘曇也復次大乘毘曇亦示經論各一經取大乘阿毘達磨經乃菩薩所說得佛印可者原本不傳今依輯佚法取他書引文編成全貌難覩一斑可得經說十類佛語首以無始時來界此界據小乘之界而說實則非小乘所知一切法等依為宗是依具染淨二分由此二分依義於是轉捨轉得之義成至此始刊定轉依之義而易舊說之解脫也小乘解脫乃由繫縛而解脫即離繫果義轉依解脫實為一義真解脫者即是轉依此即大乘之正宗義論取大乘阿毘達磨集論是論就義類以集經中諸思擇處而以等集依現觀所見之真徧集由所涉之廣正集依無倒方便三種方便集之乃依經說而見諸實用者初本事分倣小乘諸門分別但小乘愈分愈增法執此則愈分法無我義愈顯也次抉擇分亦依小乘四諦法門條疏諸法但得品中人以菩薩種姓為主諦品滅諦以無住涅槃為歸故此大乘毘曇通貫小乘而別有其不共之義在也二般若科此科四書二經二論初以維摩詰經為提綱次舉大品般若及大智度論為本宗末以中論為抉擇所謂般若本為智慧但此中概括一切菩薩行而言謂菩薩行皆以慧為導首也智慧有二一為根本二為方便前者如射之至力也後者如射之中巧也二中尤以方便為最要蓋真正般若行須有方便而後事能究竟也維摩詰經揭示方便般若之要於菩薩行品謂菩薩解脫法門對小乘解脫而言以不盡有為而不住無為一語盡之小乘反此為成熟佛法則不盡有為為成熟有情則不住無為此與不住生死不住涅槃同義乃方便般若之精髓也小乘不諳此法門者以不知心佛眾生三法實相平等而執為實有差別故不敢與佛較量自謂於無上菩提無分而安於小成維摩先破其迷再示正宗既提本宗綱領而又破小乘執著故取為一科之提綱也大品般若即奘譯之二分般若今不取奘譯者蓋自龍樹始宏般若什師得其真傳什奘兩譯之異詳不及言具談兩者分品立名不同處可見什傳龍樹學之特勝處什判此經為前後二分各安囑纍品以明各分意義完整即智論所謂前為般若行後為方便行奘譯於此不分也又於菩薩摩訶薩處立金剛品謂菩薩有此一切眾生我皆令入無餘涅槃而滅度之之心為金剛心示般若發心不住之精義而奘譯不立又於般若與大乘之關係處佛說大乘即般若般若即大乘什立會宗品意謂以此為正宗而奘譯又缺其次兩譯分品立名之異者如佛令須菩提說般若而須菩提說不見有說者聞者及所說法什立三假品法假受假名假全部般若精義顯露無遺奘譯善現品則了無精彩矣又最後一品什譯名如幻品謂假名般若如幻如化也假名乃般若之骨幹什譯自始至終一以假名貫之是乃龍樹般若學之正傳也龍樹宏般若針對小乘小乘執佛說百八句自五蘊以至一切智智為實龍樹即而非之謂無色乃至無一切智智蓋破其於假名之執也所謂不壞假名而說實相此般若之原義也什師本龍樹之正傳精義畢陳故取用為講習之書也是經龍樹有釋名大智度論亦什師所譯傳論分般若方便兩道貫攝全經運空自在後得智無住行均以建立若僅有般若道之能至而無方便道能中之巧是亦不可故須二者並行乃為菩薩行也此義論中發揮極明什譯又能指出印度晚世中觀學者猶不知此故僅以一根本般若一往談空不識方便陷惡取空如是二道完整之般若惟中土傳存彌足珍貴抉擇般若要義者為中論所謂要義即以假成空也假名有二義從眾生邊言佛說有百八法假名凡小不解佛說意趣妄加執取以為名實相符即所謂法執今言空者即空其執取之實性也從佛邊言佛依眾生所解而安立故實為善巧俱是假名於生為執於佛為巧具此二義方見不壞假名而說實相之旨中論全解此義得此義者為青目居士青目以空假為中道之意而舉施設之談雖假名不實而實相不無此乃般若要義什師於七十二家註中獨取此家非無故也三瑜伽科此科一經三論以大論為本宗深密為提綱顯揚攝論為抉擇以瑜伽為宗者謂一切菩薩行不離瑜伽猶般若一切菩薩行不離於般若也瑜伽不拘定心亦通散心凡菩薩行皆謂之瑜伽也蓋瑜伽訓相應謂行與實相相應者原無分定散心也此云實相即般若之空空有密意必須研討詮釋空之深密者即解深密經主要之義此經以三性解空謂空乃三性中之圓成性是性必於依他法上無徧計所執相而得顯現然此乃瑜伽心境非瑜伽不能得也此為經中一要義又以七真如解空而以唯識真如為重即謂實相為唯識所現此亦由瑜伽心境見之深密以此解說以此行道故有分別瑜伽品之建立瑜伽師地論全宗此經故舉以為提綱也瑜伽師地論有十七地而以菩薩地為中堅全分區分四段以大乘道果十法配之十法之初為持任持依持之義謂此能持菩薩所發無上覺心由以得道證果菩薩之行三劫中難行苦行任重道遠若無任持其心者誰克臻此故十法中特詳持法而攝一切菩薩行言之菩薩地以此為主故為瑜伽之本宗也持猶儒言操存之義顯揚攝論皆依大論而加以抉擇但宗經不同耳顯揚宗深密攝論宗毘曇深密經談三性以徧計依他為染圓成為淨意示依他外別有圓成性蓋以心轉依皆為圓成性也毘曇言三性則謂依他具染淨二分是攝計圓於依他心轉依仍為依他淨依他但以依他上正智所行為圓成也深密分心與心性言毘曇合心與心性言是為二論宗經之異又顯揚所謂聖教乃貫徹般若之二諦法門非如小乘以四諦為教也又謂瑜伽即智度是以二諦為依智度為行實上承龍樹之般若學也攝論異此談緣起法以名言種為自性意謂一切法有種種差別以名言為自性此乃指唯識了別而言之也名言異了別亦異了別不離於名言此唯識思想之所安立也又於觀行則以意言為主意言者意識所分別顯現之同分影像由聞熏而生言者所以表白意義於口影像表白意義於心故以言為喻而以意簡之說現觀人道以意言為入處亦依唯識而談也如是緣起唯識依名言而現相故曰由名言種而說自性緣起觀行唯識則依聞熏而現影像故曰籍意言而入所知相此攝論之要義實導唯識學之先路者也此科以二論為抉擇一結般若之終一啟唯識之端合而得瑜伽之全也四涅槃科此有三經一論涅槃楞伽二經為本宗法華經為提綱而寶性論為之抉擇也涅槃要義顯示一切有情皆能成佛謂一切有情皆有佛性故爾然於成佛境界所謂佛身佛土佛功德佛作業等為眾所欲知欲得亦為涅槃學所應講者此即賅攝因果二義也法華經首云諸佛為一大事因緣出現於世為令眾生開示悟入佛之知見即佛之無上菩提開示者示之以果悟入者示之以因無上菩提之道先示果而後示道者欲令眾生發起意樂而悟入故又佛之所以如是說者蓋惟佛與佛乃能究竟諸法實相佛境乃能開示佛境法華揭舉如是二義故以之為此科提綱也至其結構則以三乘為方便聲聞能回小向大為指歸眾生聞佛說不了遂以初說三乘為實在於一乘之旨不信實則若以三乘為定則無大涅槃可言矣又涅槃經亦云佛之慈護眾生猶如一子即願眾生皆成佛也所說之意一貫到底而聞者分別不信故有一闡提人無佛種姓非佛族類自外於佛由是涅槃雖說有情皆有佛性而有一闡提不成佛法華雖說究竟歸於一乘而將說正法即有五百比丘退席此皆自外於佛者也所以有佛性與否全視眾生能否自家承當為定若樂欲世間於佛說無所欣羨則自居於一闡提也復次涅槃經傳本不全涼譯較多猶未完備故須以楞伽經補之楞伽詳佛境義涅槃詳說佛性由佛說百八句推闡諸佛內證即親證謂無名言無分別無影像離教分別也聖智第一義心心要此即法華所揭唯佛與佛乃能究竟之諸法實相佛境者諸佛所取究竟之實相故謂六度施設猶是化身佛方便之談自共實相乃法身佛等流所說由是楞伽可取以補足涅槃未詳佛境之義也但楞伽仍有未全必再取寶性論以補二經之缺此論於二經未詳之佛身功德作業等皆可得其概由此可知涅槃學殊不易談也寶謂三寶謂三寶之性皆歸於佛性此涅槃學要義唯本論所獨詳論以七句詮佛性初四句抉擇三性歸於一性之旨餘三句說菩提功德作業也此論可注意之點在說佛性即是餘處所言之空而以佛性說者恐人執空為空故以佛性實之如是二名同指一事非空外別有佛性佛性外別有空性是又涅槃學要義也五戒律科戒重實踐不尚議論故此科僅舉郁伽長者所問一經此經傳譯最早曹魏唐時併入寶積中列為第十九會長者問佛二分菩薩在家出家戒德行處佛所答者各盡其極謂在家眾三皈五戒此甚普通但推其極歸佛必至於自家成佛而後已又出家眾則以頭陀行為重提示出家行道如救頭燃不可高廣大床深居簡出也又出家無纍自較在家殊勝惟能於在家地學出家戒善知方便行六度行則功德亦可與出家等此乃戒學不共之談安立居士道場之依據也此周要義即為轉依以成佛為目標直趨捨染取淨之道然任重道遠必有為之增上相資者故於前講外復以二書助之一因明人正理論思惟論議皆因明之用然以思惟為尤重論議悟他而思惟自悟儒言思則得之也循因明之規則達自他皆悟之目標事半功倍之能未可忽也二華嚴經修慈分華嚴支分此為慈氏問佛所說可謂彌勒華嚴慈字關係極要居四無量之首無此即無餘三涅槃言慈為一切善法本即是佛性此與儒言仁人心也之語相通佛家說慈為佛心是心增長必修慈力所以華嚴謂菩薩修行必以慈心調伏蓋菩薩處生死流轉中時覺外苦逼惱必修慈心以自調伏方於無上菩提欣求無疲厭也儒者亦能於橫逆之來反求諸己學佛者何可不保任慈心自為調伏耶五三周典籍示要第二周已明各科正宗今此三周乃窮極各科之究竟所習之書亦十九種略詮於後一毘曇科此周毘曇止限於小乘小乘之學初有十八部後分為四系即上座有部正量大眾也前三屬上座後一即與之對立之大眾本部北方經部南方赤銅鍱皆直屬上座系者有部正量為上座之支系本科四書即有關四系由此可知小乘學後來變化之概略也一諸法集要經此集正法念處經之頌文而成正法念處解四念處中之法念處內容大同阿含實阿含之重編也最後附身念處經餘二念處未解理應別有惜未譯共詮法義異於常解乃以行為之法非法而說善行為法不善行為非法既偏重行為立論故其主要思想為業感正量部宗之而倡業感唯心之說又有菩薩一義以釋迦菩薩行慈心教授不捨有情至其極亦有六度之說是皆與大乘相近者也然其所持雖主張業感唯心而謂實有外境心剎那滅境則暫住遂言心境相離所以極力反對大乘境不離心之說奘師在印正當此派盛極一時有般若毱多者作破大乘論七百頌那寺大德不能駁奘師為論破之而有曲女城無遮大會之盛事也二入阿毘達磨論三四諦論二書皆俱舍論流行以後之作也俱舍論準經部義刊正有部而於兩部之說皆有指斥兩部受此評擊不得不自行訂正於是有部有入論之作經部有四諦論之撰也兩部各走極端如有部執實不惜與勝論外道同伍外道說句為實有有部視佛說如句義謂言詮名句文身皆有影像如心見分之生有影像相分現也經部以分別說解佛語不惜混同分別論者出大眾系雖為佛徒與上座不相侔也至謂無餘涅槃有如燈滅必煙消灰滅而後為無餘是又同斷滅論矣四論事標目節本此為南方斯里蘭卡七論之最後一論乃目連子帝須所集初六部為佛說內容正宗異義各有五百傳為千分現存各二百餘皆南方上座部破斥餘宗之要義也所破部派有十五類而以案達派南方大眾為重佔所破義又過半由此可見南方大眾上座二部之殊致大眾部思想後來漸近大乘如主張之二空義人空行空謂先但見五蘊不見眾生為眾生空涅槃時五蘊亦空為行空極近大乘八法空義故後世中觀派之清辨月稱取其說而與瑜伽為難如清辨取正量心境相離說破瑜伽唯識無境宗月稱八大義中曾據大眾行空義謂小乘亦有法空反對瑜伽法執遣淨而後究竟轉依之說此固不足以動瑜伽之毫末但於此可見小乘之善變也大乘之究竟在說生佛關係之密切彼此不離為一法界故愈究竟則愈近眾生小乘究竟趨於斷滅是愈究竟愈離眾生而大違一法界之義也二般若科此科有一別支即文殊般若後來與龍樹般若無著般若鼎足而三實則彼此相成而不相反也其義即據奘譯第七分曼殊室利品實則六七八分皆與文殊般若有關所說為甚深般若所得之法界平等相而歸宿於一相莊嚴三昧法門諸佛眾生一切法就一法界觀之莫不平等故其究竟無住無著所以如此觀者文殊自言專為利樂有情故真正利樂有情當如金剛般若所謂有想無想等我皆令人無餘涅槃而滅度之而無有一眾生得滅度者是也以離眾生相及滅度想故此猶用智如禹治水行其所無事又如舜之由仁義行非行仁義也若非於最究竟甚深般若處立足即不能無住縱橫利樂有情故文殊般若平等法界無別見證乃正以利樂有情四字為安足處也復次般若學分三期即龍樹提婆無著世親陳那護法以瑜伽思想釋般若當推陳護二家為究竟也陳那般若為般若圓集要義論論解八千頌之小品般若止及根本未言方便蓋以瑜伽全部皆為方便故也論以三十二義綜攝經要菩薩行以十六空見中邊論十散動見莊嚴經論為能所對治蓋以所邊空對治能邊之散動也又甚深般若以空性為所緣能無十散動則能緣十六空也全部般若悉以此十六空十種散動對治之義貫之為後來瑜伽般若之正軌也護法般若為廣百論釋論為提婆作龍樹中論最初抉擇般若提婆廣百論繼之抉擇益精護法此釋乃最後抉擇般若之作也論破法自性執護法以真無俗有釋之俗有即八百句皆有真無即此名言無也二諦定義各家解說不同護法於真諦不多置辯特詳於俗諦俗諦以親證安立為主不取世間言說故此俗有必於根本智後始有大用一則具足方便一則與果相順以真正道果須先有佛說而後隨順修行方得出世勝果此乃俗有之效驗故說方便俗不可廢如是以真端其趣俗會其通自能生死蕭然利樂無盡也後之中觀派亦言俗有真無淆亂紫朱應當揀辨末舉掌珍論以為簡除異端之始是書為清辨故與無著世親立異之作講真般若學非悉其偽而簡之不可也夫龍樹以一相所謂無相實相說般若無著以三相所謂無相相說般若感機不同一三異說而用意固同方便之義易地皆然也其次所據亦一皆以有情所據之妄法為依妄法即般若所謂色即是空名言性無空即是色離言性有亦即瑜伽之虛妄分別有妄法是常聖人亦現既以妄法為依故與有情不離有情無盡則妄法無盡聖人功德作業亦復無盡此龍樹無著學用心所依皆一之義也清辨乃謂無著不愜般若原意自稱直承龍樹但一往談空以無分別智一竿到底生佛不涉背道而馳墮於斷滅戲論中自誤誤人伊於胡底過去曆史無人簡別瑜伽學者既甘與為伍尊之為中觀系自謂瑜伽系而成平列之兩派其後更進而視龍樹為空無著為有空有相待遺害無窮故於此周料簡異說以截橫流而揚正理也三瑜伽科此科究竟在於華嚴經共三十九品今取七品頌文以為講習倣龍樹據頌以釋華嚴之意也七品中以十地品為總樞於此得見一心輾轉究極法界之義菩薩於每地勝進前必發大心令心意樂增勝擴大此心見佛聞法輾轉增廣是為瑜伽最根本之處也於十地前取須彌頂說十住法門夜摩宮說十行法門兜率官說十向法門三處讚頌及十回向義地後取如來出現品示佛之出現令眾生於佛身口意境業見聞功德相應而得悟入道果最後取普賢行願讚合此七品全部華嚴精神見矣有回向見眾生與佛之關係有如來出現見佛與眾生不離生佛交感法界緣起不能已也法界無盡願行亦無盡也瑜伽學究竟於法界故以斯經居其首也復次此科仍以陳那護法二家之學為究竟陳書不全茲舉小本觀所緣論釋兼見二家之概所緣即境觀所緣即觀境論說內境即境不離心謂有此心即有此境圓滿佛法成熟有情皆菩薩觀行之境若無此心亦無此境也故說境在內而非在外即唯識瑜伽之究竟說此義一明其餘迎刃解矣陳那本論組織善巧如此要義止數頌耳護法之釋亦甚精微彼解內境據佛之十處內外處說及根境互為因義根為內能境為外能刊定為五識境而明根境功能互通渾然一體也其詳俟講本論時發揮次舉二論以見護法學說一為寶生論此釋世親二十論之作常言唯識無境護法乃以染淨唯識為言佛法捨染取淨所依則在一心故以染淨釋成唯識而於踐履之義更為實在又依此釋有二殊勝一自趨中道知唯心現即無淨可欣無染可厭無著無住無所往而不自在也二易集資糧證無上菩提須無邊功德資糧然眾生無邊何能溥濟諸佛無量安能普供若知唯心之義而意樂回向即便得之如以粒飯普施沙界以一瓣香獻十方佛皆得圓滿心至故也如此則轉覺外界有窮而心量無限資糧易集菩薩道易行也論云此唯識觀乃大乘清淨無過失方便正路於此可見護法瑜伽學之究竟也二為成唯識論節本前論見護法學之精神此則見其學說規模也此論為奘基二師取十家不及十家止六七人之說所編成護法之說即攝其中今為節出以存其真面目十家雜錯憑何以抉護法之說耶此則有取於密嚴之準則也護法據密嚴此經奘師以後傳入立說且就染淨唯識而言今舉四則以見其概此四皆以意識第六為主一二分二取義二分謂見相是依他相二取為能所是計所執前人於此渾然不別護法區分條然不紊二自證義一心之起有二功能如燈自照照他即自證內證境外也前屬現量後多比非量亦有現量前是而後非此依密嚴心有內外取纏之義前人亦所不詳者也三不離義常言境不離心護法則說心不離心蓋自心與他心有增上之用一念存誠未有不動者耳四假名義尋常假名依實而有護法則謂破實而立後得智所安立凡此皆護法之唯識學也密嚴經以阿賴耶為如來藏自性清淨為眾生本有之義有情本心殆即護法學主旨之所在也四涅槃科此科初取大雲經經為涅槃之別裁資料大同抉擇有異佛說如來常樂我淨之教眾生聞而未解此經重加敷說其宗要在明如來法身與涅槃同旨而說法微異故謂之別裁也此經傳譯不全僅存初分今取其初品大眾犍度以為講習品中列舉大眾所問法要以百千不共法門宣說眾生實性佛性可藉以見其法門內容也經以法界為法身所指與涅槃不同故抉擇亦異涅槃雖及法界但無如此明顯有此法身而後有法界等流佛教諸佛法界平等智慧平等法界為所證涅槃智慧為能證菩提由佛慧等故而後有自他受用身悉施眾生服甘露味也故涅槃之言緣起必推至法界緣起謂佛興教化由界等而慧等慧等而後有自他受用身也是義大涅槃經未及詳唯此經特有雖為別裁仍不可少猶般若之有文殊般若也惜傳譯未全番藏亦同此少分為遺憾耳番藏文字結構不似由漢重譯談究竟涅槃學與般若瑜伽同必須推極於陳那護法戒賢之傳也陳那書缺不著護法宗密嚴戒賢宗佛地治此二經則二家之學可以窺知矣二經俱說佛之所以為佛者佛地一名固已顯見密嚴之密原具微密厚密二義嚴謂莊嚴奘取厚義名厚嚴經未譯後之譯本取密義名密嚴經也乃形容佛之身土轉依有賴功行之積集細入無間其積也厚仍說佛之所以為佛也佛譯為覺含能所二面特重所覺所覺者佛之所知所證所得證此即佛不證則非佛也二經皆說及此點密嚴說佛所證自源頭言謂之賴耶此雖凡小之心而非凡小所知唯佛乃能徹底究了故謂賴耶自性善淨意據自性本寂言為佛境也佛地就其究竟處說謂之清淨法界此指離垢清淨言賴耶性寂而有所蔽離垢則究竟清淨矣如日處雲霧雖自體無損而離雲霧時亦謂之清淨也故二經所詳同指眾生之本心言一而不異佛者只在認識此本心而已復次此心就本源說觀行作無相觀謂善淨賴耶必在無相觀行上見之無相云者性離計執不與煩惱相應之謂就究竟處說則清淨法界之平等相為佛智所緣前者依眾生說由無相觀而悟法界後者依佛說已證法界由智緣平等相而施設教化之安立以接近眾生生佛交感總名一法界此無相與平等相遍一切法如虛空之遍諸色由此而後法之本來面目始得顯現去諸執著而後有大用也亦如繪事後素必先有素地而後文彩始得顯露也平等相即法之本來面目得此則能盡法之大用也護法戒賢之學同闡此義護法所注唯識三十頌宗主密嚴已可見矣戒賢注述現存佛地經論由奘師傳譯中土奘譯雖題親光等造勘對藏譯佛地戒賢注知論中主文皆戒賢說雖未標名實在其列兩家為那寺正宗而皆歸於涅槃可見涅槃學之重要矣又此二籍為那寺講學最後結論而為華譯那寺學說之開端奘師之學即從此出五戒律科此科初次兩周所舉之書原已足用但推論其極發揮其精神須研習佛之本生本事以此皆佛之菩薩行戒律之典範也服堯之服誦堯之言學者當以自勉佛一期化身只數十年實不足以觀其行事必須遠推過去近合現跡而後見其精神也茲舉六度集經舉佛所行讚一詳過去一讚現跡皆非託之空言者六度集經依六度分類編集佛往生之行以布施持戒等皆根於戒而戒為六度精神之所寄非所以拘束人乃導人於立己者也顏淵問仁請目子以四勿舉之蓋即仁之精神所在戒亦如是六度精神即涵攝於科條間由此行之謂之難行難於以精神貫徹於行事也經中施度首述尸毘佛救鴿因緣至不惜施捨身命為求無上菩提而布施即無一念不捨此身如一念不捨則行有所未至此精神徹底貫注行事之示範也儒云載諸空言不如見之實事之春秋教義為深著是亦內典中之春秋也今取此講習則足以啟景仰菩薩之心那寺戒學原以菩薩本生鬘為重但漢譯不全只存施度十四本生寄歸傳云原有卅四本生故列為參考經以投身飼虎開端精神尤為偉大先師釋悲中詳之可資啟發矣佛所行讚為佛傳中最可傳之作乃據小乘各部共傳之說而敷述者以馬鳴之卓越文學天才加以渲染信為不朽之傑構也中土二譯以涼譯文筆簡潔能傳其神此雖據小乘之見然真誠流露感發至深如述佛厭苦出離段雖尊優為王子於心終有所不足遊觀得見老病死便思出離此非懼苦求避乃有感於無常迅速人生大有事在不容稍躭安樂此與子在川上之嘆同逝者一去不返故曰朝聞道夕死可矣不覺其言之深切也孟子所謂有終身之憂無一朝之患蓋聖人無不有此感發有此一念斯所以異乎飽食終日無所用心之因循墮落者耳戒攝本生本事依毘曇家以十二分教配列三藏之先例今番藏即採此法又於此有須申明者各周講習皆未及出家律以主講者非出家眾不能引為己任律中無此規矩也如欲習出家律應以淨譯說一切有部戒本律攝百一羯磨三書為主蓋淨師實得那寺之真傳也今不列入講習內此周義理以一法界為主闡明生佛交感之關係積集資糧應有方便故附舉二籍以資人德之助一集量論陳那之作皆為量論此其自集各量論之書也雖似專說因明而目的乃以之深入佛說之門以為非如是即於佛說不得其解也故於論端尊佛為量者可知非泛談因明之著又論中特詳比量比量方法在於遮詮如云甲意云非乙所以簡別餘法也能以此義理會佛說則知空者簡別自性意云非自性非空無之謂學者思想循此途徑則於佛說無不通達如般若之非與無瑜伽之離言涅槃之常樂我淨皆為簡別餘法者如眾生初執無常為常等有四倒佛即說無常等以除之若復撥常為無常仍墮倒見最後乃舉常樂我淨而治其倒此所說常即示非無常之謂皆因遣執方便立說非實有常無常也集量即示此方法以為一貫之道也二大集虛空藏所問經抉擇分大集者眾會義大乘之終結亦猶小乘阿含以八眾誦為結局故以之為三周講習之殿軍大乘法義結聚於此十方世界菩薩各暢所問佛則有問必答今取抉擇分以概其要經以卅五義抉擇無一不以平等為歸如般若講緣生智觀緣智必推極於第一義諦之本來不生始見般若甚深理趣雖本不生而俗諦中隨凡安立此則般若中之平等理趣也心無高下差別俗諦安立中無明與明等諸法皆離染淨等分別僅示其本來如是而已瑜伽宗要在如理相應即所謂不離一切智智也六度萬行悉皆回向於一切智智舉足下足無非佛事此則瑜伽之平等甚深理趣也涅槃之義謂於生死中不沾著能如是則不但生死即涅槃諸菩薩所行亦莫不同是涅槃此即涅槃平等甚深理趣也前此講習各科至此無不抉擇以究竟顯揚論以最勝智擇作結以顯教今竊其意以大集抉擇分作結以為本綱要之點睛經揭勝智超小乘簡擇以入道亦即分分轉依而證擇滅無為之意如一分未明則一分未轉非勝智無以導之於究意也小乘得擇滅而不究竟者即於簡擇不究竟顯揚病小乘之隘特別闡明究竟之抉擇今取大集此分作講習五十書之總結亦示究竟抉擇之意也又此五科講習之必歷三周者一方依義理推闡一方依歷史開展理事兼至乃得盡其學故一經一緯合之乃見其全此亦不可不辨者一九四三年十月一日講於蜀院
