body:
  text: 阿毗曇心論頌講要今於阿毗曇心論分三番講述一者文獻源流二者學說系統三者研習資取一文獻源流由文獻言毗曇為佛學三藏之一論藏現存小乘各部毗曇種類頗多其較有組織者北傳則有說一切有部身發智足六足七種南傳則有上座七論此外部派未定者有舍利弗毗曇一種雖是一種但內有五分皆各成體系別具組織者也進而考各類自身組織之關係如有部身足但由立說互有牽涉湊合而成正如成唯識論所依之六經各自為類並非如交蘆之必相倚持也一類本身關係且難明各類互相交涉更難言矣但古今學者於此同題未嘗懈於探討止無定論可述耳吾人認為欲解答此一難題必須上溯毗曇之本源毗曇源出佛說所謂阿毗曇無者譯云對法阿毗為對向曇無為法法依常釋即佛對世俗安立之言教按實言之則指勝義涅槃也無論勝義世俗其義蘊必待分別乃得瞭然如美果之待解剖而得味佛語亦待分別方能受用故法句經云法歸分別也若此分別恰對彼法即可以為證行之資佛嘗自作對法所以真實毗曇應上推至佛所自說者世傳佛說毗曇由迦旃延那撰集呈佛印可見分別功德論及撰集三藏傳即所謂九分毗曇也智論謂之毗勒九分之名僅見圓測深密經疏所引真諦三藏傳中真諦傳原文佚即分別說戒分別說世間分別說因緣分別說界分別說同隨得分別說名味句分別說集定分別說集業分別說諸陰也但測疏中但有引文而無釋義藏譯經疏此段亦被刪略無由考證幸尋真諦譯籍九分猶能得其確解如真諦譯俱舍論中分別說世間一詞奘譯為世施設則知分別說三字即當於施設之意同隨得一詞見陳譯顯識論及隨相論中意指種子習氣所聚諸陰即衆蘊集定集業即雜定雜業也至九分組織真諦云每分有六千頌合共有五萬四千頌惜全文早佚致後人傳說各異其詞大毗婆沙論卷七十四云佛說法有八萬法蘊即八萬法門或謂八萬四千法門每一法門各如論法蘊足論量有六千頌其言殆即指九分毗曇而法蘊足當為九分之末諸陰分前八蘊失傳今以法蘊足類推每分各有萬法故謂八萬法門也但後來傳者或說一萬五萬十五萬等不一最後毗婆沙師評斷為對治衆生八萬種行而有八萬法門此乃不明八萬法蘊之真相而臆為之說也又解釋九分者相傳以目犍連舍利弗兩家為最早目連之作隨文順釋或決擇要義舍利弗則以義歸類此如中土春秋諸傳之並行遂為後來毗曇之張本其中以舍利弗毗曇尤為切要蓋彼能依義歸類佛說為問非問攝相應處所五分也今此五分之節略本猶存即現存之舍利弗毗曇也其後五分分散獨立即為南方之各種毗曇而北傳之品類足實本此五分改編而成者此為北傳毗曇之主要者相傳為世友造實則止初五事品為世友作餘則各家之言也迦延目連之釋現無全本迦延釋存北傳之施設足論者現番藏僅存世間因業三分漢譯止存因分一品世間分但餘題目而已觀此三分名目固屬九分所本有其餘如婆沙引文並不限此三分可見現存迦延之釋非全豹也至目連釋北傳有法蘊足乃九分之末餘無存矣或者前八分均為施設足論亦未可知今書不全無由考核又北傳中有立世阿毗曇論似為分別說世間之集籍又有佛阿毗曇經傳有九卷今存二卷文不連貫似為分別說戒之集籍一向歸於律藏中是即毗曇文獻流傳之概略知此而後可言心論在文獻上之地位也佛說毗曇有本有釋展轉派生而有各論今原籍不存各論又復異義紛歧殊難得其要領幸現籍中有此阿毗曇心論能具備原本雛形擷取各論精要實一毗曇提綱之作也是論為法勝所作自曹魏時來華僧人即盛稱之其後百餘年道安師弟乃請譯出慧遠勒成定本特為之序現存出三藏記序中略述譯家之說而謂此論管統衆經領其宗會故作者以心為名其人以阿毗曇經源流廣大難卒尋究是以探其幽致別撰斯部由此可知法勝之撰斯論實欲勾勒毗曇經之綱領攝取諸論之精要者也但隋唐時人如吉藏等不解毗曇經源委誤認心論為毗婆沙論之節要蓋未聞原有巨部阿毗曇經一見稱廣大毗曇即以為指婆沙言之也依真諦云毗曇經有五萬四千頌以五百頌一卷計當有百餘卷其分量實較吉藏所見涼譯稱舊譯非唐譯婆沙為多所以序有廣大難究之嘆此以舊說證作論之要旨者也一若依現存本結構言亦復殊勝頌凡二百五十區分十品自界品以至契經品為論之根本八品名稱次第皆與真諦傳說毗曇九分之語相應九分中初為戒品此論八品中無戒者蓋為後來編者歸入毗奈耶中故耳原來佛說經中有法有律如增一中含多雜戒經道安對於譯家不知簡別已有煩言道安參譯中含增一嘗慨嘆曰凡諸學士撰此阿含其中往往有律語外國不通與沙彌白衣共視也而今以後幸共護之使與律同又譏康孟祥曰中本起康孟祥出出大愛道品乃不知是禁經比丘尼法堪嫌切直割而去之此乃大鄙可痛恨者也可知佛所說經法戒具備釋經之毗曇亦即法律俱釋也後之纂者為之分別歸類法入阿毗曇律入毗奈耶如是後之論師乃除戒分而僅集法義故但與餘八品相應也心論八品界定業行因使同隨得賢聖世間此世為器世間論作有情世間當另有所偏重契經諸陰與經大同唯次第少異按九分中有定無慧殊不可解細尋其故乃知誤譯名味句分蓋味字梵文為便繕那慧字為般羅若二字之後分音倒其前分則形近故由傳寫而誤也便字書寫為般羅為故易致誤因此一誤乃成名句文之味而失般若之慧矣誤慧為味不得其解乃注之曰此非飲食之味乃文句之味也故心論八品實合毗曇經之八分是義湮沒久矣使無真諦傳說經論源流亦幾無人能識之矣此就結構以證心論具備原籍之雛形者也一再尋此論義理實兼採各種毗曇之長如初界品以三科談有為乃舍利弗毗曇釋經之特色契經品以三門識智使釋諸蘊又為品類足釋毗曇經之勝義此論擷取成說乃所以為毗曇之心歟一又此論體裁為韻文亦屬特創慧遠稟譯人之說讚為天樂今梵本不存然以此論蛻變之俱舍論觀之亦可間接知此論頌文之優美也俱舍頌實由心論展轉增益所成時人目為聰明論蓋尋常九分教十二分教中所有之頌與經文相關乃重述義理而為之者頌體音節限制綦嚴較中土平仄尤甚故以義理作頌易而以法相名數造頌難所以十二分教中戒分論分少有據以作頌者各種毗曇初無頌制法勝為此首創亦足知其技之神也在曹魏嘉平中有曇迦囉者初傳戒至中土者自云初習外典精通文辭自負無難解之義後於某寺見此心論反復不得其解心竊異之請寺僧開示乃嘆服佛法深廣而出家焉出高僧傳故此論內容形式俱臻上乘其能馳譽五印信非偶然後人注書據今所可知者有優婆扇多與古世親之釋有某家之廣釋有法救補訂之雜心論世親改訂之俱合論然終無能勝於原作之精美也是論初來中土苻秦時有鳩摩羅佛提童覺散譯道安參與但以頌文難出遂改作修多羅體不限字數音節高下仿百論之制標要義而成散文其後東晉孝武泰元十六年有僧迦提婆等多人重譯直至翌年復加改訂乃成今此講本此由文獻源流以探究此論之大要者也二學說系統次依學說系統言小乘部派紛繁分裂之由不一要皆解釋佛說不同而各行其是之所致耳此從各類毗曇皆可見之今依現存毗曇較為完備之上座一系以言其屢次分派之大略最初解釋佛說者以佛九分毗曇皆為施設安立之意即一切法相名數義解莫非由佛安立故有八萬四千法蘊之衆傳之者於此審求所安立法相等體性之假實問題凡有兩種解釋化地部持分別說犢子部持一切說因所持解說方法之異故犢子徑說一切佛所安立全實而於補特伽羅亦許為實也化地部之分別說逐漸因主張不同復有派系分出其中心問題為法法相互之關係即能所知能所生因果過未假實三要義也於此亦有持分別說與一切說之異持分別說者為法藏部持一切說者為說一切有部如是二派於分別所知上初則言世間有無正見信根展轉而有初果二果乃至阿羅漢退不退之主張各異蓋即爭辨所知之實為一切實或分別實也次於因果實不實上則論及天中有無梵行過去實不實上則論及三世有無也是等問題皆有其發展次第至一切有部堅持非但一切法有乃三世法有法與世為一體同而用異正用為現已用為過當用為未故隨一法即有三世復有二教二理之根據此見部執異論二教即佛說言依正法及內外法十二處二理為有境一切法所知有果能所生至此刊定三世有無二部乃儼然對立關於小乘各派諍論之中心問題成實論羅什譯之十論品列舉異說而得十種但此論僅平列其說若考見其前後次第發展之跡當更求之南傳論事中其書共二十三品每品十章左右初品十章列陳與南方上座系相異而最重要之說可見各派論爭發展次第一補特伽羅有二阿羅漢退以上爭論所知三天中無梵行四分斷煩惱五凡夫捨欲貪恚以上爭論因果六一初有七過去蘊有八一分過去有九一切法念處十過未法如是有以上爭論過未由此可知問題開展先所知次因果後三世如首章即化地與犢子所爭之問題第二至第七章為法藏部與有部所以分裂之由第八章乃飲光所持之說而從有部分出之因末後二章則經量部從飲光別出之論由成實論以見爭執之中心由論事以得問題之演變次第今即據以談學說體系也復次依各種毗曇而言關於所知法因果法之實在問題已於迦旃延子所著之發智論導出有部思想之端緒直至世友婆須密所集論明言三世有義乃於有部說漸見完成介此二者之間則有法勝此毗曇心論一書特重因果而恰在迦延重視所知問題之後也迦延之著有八聚即蘊是否本於佛說之九分除戒分今難考知彼於述古外復有雜蘊一分則出己意撰集者首述世第一法即言有無世間正見乃至阿羅漢退不退等事法勝心論第九亦為雜品意同迦延於解述佛語外自為決擇其初頌云已說隨相應一一分別法於上衆雜義今略說善聽意謂前之八品乃隨佛說次第今則依己意撰集所未說之雜義也於諸義中特重諸有為法有因有果蓋決定因果實有而後修習始有歸宿不為唐勞如是由此而涉及解脫應有修習乃推論至天中有無梵行論品第十首言威儀不威儀即論天中有無律儀之問題也然心論未及三世有無至世友所集論始有專章談一切有此等學說雖皆為有部之所據然至三世有之說出始成說一切有部也其後有部以迦濕彌羅為中堅排斥異說自居為正統以非難餘義是即毗婆沙師派之所為也其說定一尊於迦旃延子世友法勝雖有創立道理修習皆然一切有義之功而全不加以重視徑目為外國師西方師或犍陀羅師如是毗曇心論雖創說一切有而非有部正統所宗乃為外國師西方師所重最後成經量部復為犍陀羅之世親所深信依此組織而編成一聰明之俱舍論據經部說破斥有部集小乘毗曇之大成故從學說系統觀之此心論實與各部學說相關關涉經量部者尤多乃至後來大乘瑜伽說亦有聯繫瑜伽說多與經部有關故依大乘立場以窺小乘學說此心論可謂為大小乘之樞紐也又從學說上推論法勝時代當在世親之前迦延之後尋常誤認心論為婆沙綱要實未詳察耳如心論初釋有漏義謂能生煩惱故名有漏此說是否本之毗曇今已難詳但其解釋於理未備因涅槃是無漏法凡夫心緣計執亦生煩惱豈涅槃亦有漏耶至法救此為作五事毗婆沙之法救與世友同時者異人雜心論出於此特有補訂而以隨增義救其弊謂凡夫以心安住煩惱而增長心緣滅諦雖隨生煩惱而不能安住增長如手觸熱鐵故涅槃非煩惱之所隨更不增長煩惱也此義乃法救取啓婆沙者故彼有以廣說婆沙義莊嚴心論之言若法勝出婆沙師後自當攝取此完善之說是其時代早於婆沙無疑至於法勝與迦延關係可於心論行品見之行品言六因四相據婆沙說六因無教係迦延據佛教理所創說而四相中復有生生等四相義以釋有為法亦迦延所獨有法勝書中引用其義其在迦延之後明矣再與世友相較而論世友乃有部四大家法救妙音世友覺天之一四家於三世有義各有勝解即類相位待四說是也但法勝心論中全未提及三世有說至法救雜心論始為補出足知其生年在四家之前也又四家中妙音有毗曇甘露味論取材與心論同源其釋有漏即採隨增之義則已較法勝進步而近於婆沙又於八正道有但為無漏與通有無漏二說心論無但無漏說而妙音存之是亦近於婆沙之處由此可以刊定法勝時代在婆沙四大家前迦延世友之間而心論之作實有部創義而非婆沙綱要也三研習資取末依研習資取以談心論之要者佛學關於小乘部門者從深密經之說當為四諦法輪即佛初時教法但上座一系對四諦之解釋先後極不一致其能始終相貫者唯於心論見之因在小乘文獻學說地位上極占重要故所發揮四諦之義亦得一貫之旨此先舉全論組織證之論本八品即準四諦次第建立焦鏡雜心論序即有此說上承毗曇經文依九分組八品下貫經量部義蓋經部從譬喻師說四諦以名色為苦業惑為集二盡為滅止觀為道舊毗曇師分別論者有部婆沙師等各有異說即由心論啓發而來論以界行二品為苦業使二品為集賢聖品為滅定慧品為道契經品乃總說是其義也但此中以界說名色界乃三科之一佛說一切法義舊約於蘊處界三科以對機不一意有偏重詳於名則說蘊五蘊之四皆屬名是為心法詳於色則說處除意處及法處一分均謂之色名色並重則說界有心界為心故今特提界義非表名色之為苦歟故謂其說四諦乃小乘始終相貫之義也至於四諦之義本相聯繫或從苦諦說起此乃小乘佛學之發端所謂佛以苦諦為師也深知世法為苦即苦諦求苦諦之因即苦集諦求苦集滅為苦集滅諦趣苦滅之道即趣滅道諦此乃依世間法次第而說者或從出世法立說則先以滅諦為實法得滅有道即道諦修道斷集集斷則苦解脫也自下文分兩大段先辨別四諦次略究心論文義順世法說先述苦諦即界行二品苦諦之法為有漏法謂之苦者即實有其事為緣生而有自性者界品明有自性行品即明緣生因有自性故此法為界因其緣生故此法為行行乃有漏法別名謂由造作而生也第一界品有十四頌除初二歸敬頌外餘分三段首明三科有七頌乃辨諸法之自共相次有四頌明諸門分別末頌結成諸法各有自性之義有漏法之謂漏以與煩惱相屬有煩惱則有見疑無明由是而有非常執常乃至不淨執淨等四倒由此四倒即成有漏漏失功德沉淪流轉復有種種煩惱生起所謂苦之實者即指此也五蘊與煩惱俱者謂之取蘊本論為受陰諸遠離煩惱之無漏有為但是蘊而非取蘊故此蘊有二種即取蘊非取蘊也其次明處本論譯入言色蘊有十一種其無表色本論譯為無教為法處一分亦屬色蘊餘法處一分及意處則歸識蘊此言處蘊之相攝又十八界七界為心於處為法處於蘊為識蘊蘊之受想行三處之法處無表色及三無為於處為法處於界為法界是又三科相攝之義也三科之中唯蘊屬有為而不攝三無為法耳佛所說法三科攝盡而三科隨義立名法無別異故以相攝法門顯之積聚為蘊出生為處種族兼有自性餘依二義為界三科和合即盡有性之法矣本論以界為主於異門分別出九門概之所謂可見不可見有對無對善惡無記有漏無漏三界繫有尋伺等有無所緣有無執受有無為是等門類乃阿毗達磨所常用以楷定法相者依佛散說集之廣則有百餘門茲略舉九門以辨諸法雖各自為類而相有相適之處必歷盡各門而後見其各別次結頌言諸法離他性各自住己性小乘之如此安立諸法各有自性者謂了知法有自性故而後始離顛倒除法自性外無別我我所等增益相也第二行品有十八頌初頌總說謂法有自性者非自生而各具緣起蓋有為之法皆有生滅而非常住勢力羸弱若離衆伴終無能生之義也次之九頌即明俱起法緣謂緣生法有先後有俱起以先後之義隱今但說俱起凡有色心相應行心所法不相應行四種法緣心若起時心所俱生而色法至少亦有八法俱起所謂四大四色香味觸法不相應行法則有為法相由生住異滅四相展轉相為亦必與諸法俱起也生等自身能有遷流之用者以其各有生生乃至滅滅四有為相次有七頌明因緣種類即六因四緣六因者謂所作新譯能作共俱有自然同類普遍遍行相應報異熟因也六因之義佛但有散說非如四緣之常在一處說能作因最寬除自體外皆屬之俱生因與相應因皆為同時義但相應僅限於心而俱生旁及於色寬狹有殊故立二名同類因謂色心前後性同範圍亦寬遍行唯限煩惱即見苦及見集斷之五見疑無明能生五部煩惱有此起則同類異類隨起故為遍行異熟因愈狹惟善不善心法之所感也約此六因而成四緣所作因為增上緣餘五因為因緣等無間所緣緣有說不攝六因有說攝屬所作因中也小乘因緣義廣蓋以衆伴建立法之自性其性極為復雜必用一切衆緣力而成也然諸法非畢備六因而後生最少二因所作俱生亦能生終無一因而生者至於四緣則心法具四緣生滅盡無想定具三緣生其餘色法則二緣生也末頌結明行義行即種種因緣所作亦能作種種緣故曰造作為行合此界行二品以見緣生有自性義是為小乘教義根本之所在大乘教法亦即於此與小乘相異蓋謂緣生無自性也此中差別在小乘多數避開自己使一切歸之於法而謂除法以外自己無主大乘則攝一切法歸於自心故大乘毗曇經以無始時來界為所知依毗曇心論一系特提界字廣攝心法不廢因義則大小不無可通之處也次述集諦集諦為苦因有漏法皆苦以其沉淪流轉不能自脫也衆生處此毫無苦之自覺而聖說之為苦者依衆生倒執而云然衆生所求為常樂我淨而所得恰與相反復於無常而執為常是即流轉不得出離之義名之為苦也流轉有因是為集諦本論說苦之因乃依佛說二因二緣生死不絶謂隨眠業以次第業使二品成為集諦隨眠染心而業運相續此則本論之殊勝義也隨眠就煩惱之能為習氣勢力而言非泛指煩惱於心有相應義謂令心渾濁而後有流轉業報是此所重者不在業業之善惡黑白雖與生死有關而非定為生死若有隨眠染心為業增上則必流轉矣茲依兩品頌文分解其義第三業品有三十二頌初頌總說次有六頌分別業自性次十二頌說業成就失壞次有九頌說業差別次有一頌談業果末後二頌釋疑難前言界行諸法於種種世間界趣中生起所以畫分此等界趣者乃業為之故當思擇頌云莊嚴者如畫師描畫鉤勒衆像如是業力莊嚴世界成繫縛苦諸欲求離此苦者應求離此描繪等業業即言行能感當果通常區分為身口意三類生有多種頌作有有諸行之起隨之而有種種自體頌作種種身顯現三業又分為五身口各有表無表表字頌釋教成四類意唯無表為一類表謂動作見於外者無表即表之餘習所謂內在影像是也他人有心豫忖度之亦藉有表得之至於心之真實動作實無表也身口表業與意無表有善惡無記三性但身口無表不說無記又依身口二種表色言有有覆頌云隱沒無覆二無記性有覆無記色繫在色界以色界煩惱為定力所伏成無記性此煩惱所生之色謂之有覆無記無覆無記色通欲色二界欲界煩惱唯是不善故不能生有覆無記身口無表善不善有三類有由禪定得者有由修道無漏得者有由受別解脫戒得者受戒無表與心不俱唯在欲界禪與無漏無表則與心俱通上二界是即業之種類與性質也自第八頌至十九頌說業成壞隨文易知不復解說自二十頌至二十八頌說業差別者論依佛隨處散說集之或以十業道說或以報說或以學說或以黑白等四說或以曲等三說或以淨等說今俱會歸於三業中第二十九頌釋業之果由善惡業得善惡果為等流果得無記果為異熟果善業兼得解脫離繫果無漏業非黑非白但有等流而無異熟故不繫末後釋難謂色隨心相屬色隨心繫今問身口二業屬所造色所依能造大種為何地攝答言有漏屬自地如欲界身口業為欲界大種所造無漏業隨所依身力得而是彼所生地大種所造也如在欲界得道彼身口業欲界大種所造次釋三障疑難謂佛說業惑報三障無間業障見道惑障修道由報障故惡道受惡業此中以無間業為障最甚後解三業中意業力大如文應知此品談業非但依心亦依色言色為心果故一念之動仍歸於心身口動作雖依色法而形成然總由心生是知業之真實在心而不在身後來經部所持思業為體之說即由此修正而得謂發身之思為身業與言相隨之思為語業決定身語之思為心業是即業由心生之義以思之種子勢力為無表非別有色法如受戒時由誓願之思力潛伏於心即能礙後時不善法起也大乘說業與經部合轍可勘成業論及二十唯識本論則開經部之緒也第四使品亦三十二頌使即隨眠意謂隨眠染心如使者之隨主不離體是煩惱佛說煩惱為七種隨眠凡有三義一者煩惱勢力隱伏謂之微細二者勢力增長謂之隨增三者相續不斷謂之隨縛煩惱於俱生相應之法具此三義故云隨眠染心也七種隨眠者謂欲貪欲界有貪上二界瞋癡慢疑見至於阿毗達磨則詳談九十八使乃為明晰修道方便而言之也九十八使即就七隨眠之行相種類界繫三界部類見苦等五部分別而成行相者謂見有五種並貪嗔癡慢疑為十隨眠界繫者依心境說衆生散心境界為欲界定心則至上二界此有修得生得之判如在欲界久修禪定則定境現或由久修故受生色無色界異熟也又自修斷部類言於對治上有四諦差別或有煩惱由見四諦故即不生起者是為見道所斷或有煩惱見諦以後更賴漸次修習乃不起者即修道斷依於修道方便細分之則成九十八使良以隨眠微細故於修學者不厭其詳細分別也本品三十二頌初頌總說謂三有生死以隨眠為根本以其為業侶而生衆苦是即佛說隨眠所當思也下分三段一說隨眠自性二說所緣三說相應初八頌明見修所斷隨眠自性此依四諦差別於見苦諦斷者有二十八種以三界說欲界十種即五見貪瞋癡慢疑上二界除瞋各有九種見集諦滅諦斷者各有十九種即於見苦斷中各除三界中身見邊見戒取三種見道諦斷者有二十二種於見苦中除三界中身邊二見修斷為十欲界斷貪瞋癡慢上二界無瞋共有十種如是合為九十八種隨眠也或以界繫為主或以煩惱部類為主亦可知其隨眠自性差別也次有二十三頌明煩惱所緣與相應煩惱有遍行與非遍行之別佛法由心求解脫故小乘用功亦復內觀返照故於心病之煩惱再三致意也遍行煩惱有三行相一遍緣二遍隨增三遍為因生即六因中之遍行因也於自界自地三界九地五部頌云五種法一切煩惱皆與相關三界各有十一種為見苦見集所斷見苦斷七種謂無明疑五見見集斷四種謂無明疑邪見見取合之為三十三種遍行也次言他界他地亦能緣但除身見與邊見由身見必待親緣自界地而起故又邊見即於己陰中計存斷常故更次則為佛說之七隨眠次下扼縛及受流談隨眠相應有苦樂等五受身心六識及後無慚愧等八隨煩惱為相應末有三頌明斷義佛說隨眠斷有四類即見所斷中遍知斷如自界緣無漏緣惑能緣斷如他界緣惑所緣斷如有漏緣惑三種修所斷中對治斷一種五部中見苦集斷惑為自他緣見滅道斷惑為有無漏緣然此斷惑唯在無間道中一剎那斷至解脫道則永斷煩惱也次說由斷隨眠而得九種遍知欲界有四即見苦集斷見滅斷見道斷修斷上二界有五即見苦集斷見滅斷見道斷色修斷無色修斷末頌以四義明隨眠與心相應一謂隨眠染心若不相應即不成染故二為智障故若無隨眠與心相應何有智障之說如云近小人則遠君子三能違善行有此隨眠善法不起四無善起若隨眠與心不相應善心云何不起由是故知隨眠與心定相應也小乘中或持不相應之說彼乃以心為主而立論謂若有隨眠與心相應所有善法云何自生今從煩惱染心立論說似不同理實無異蓋能詳心性本淨之義則此相應不相應之諍自然平息性淨塵染隨眠染心謂之塵染即名相應一旦聞熏啓發自覺自主煩惱不能為惑謂之本淨即名不相應也三為滅諦所謂滅者即斷有漏法以有漏法長繫衆生於生死故斷此法即為離繫如是離繫有法可指名離繫得亦即常言之涅槃法也又離繫得藉人而顯即就能體現離繫者假名為人依無漏善言名為賢聖故本論依此立名賢聖品也阿毗曇經以能體現離繫者屬之於道故無此分今依梵本俱舍論相當於此品者觀之為道與補特伽羅品是此品亦可以屬道而不別開也然心論雖依經造又循四諦加以組織為顯滅諦特出此品缺經之世間分仍為八分至於本論所釋之殊勝義為漸觀頓得理有衆相故以漸觀果為一類故以頓得此與餘部之言頓觀者異第五賢聖品有二十六頌分為四段初頌總說所安立義謂苦因之集以煩惱為體煩惱即煩勞為恐布之本能斷即聖所得為滅也依何而斷此有三事一者等正精進二者方便善方便三者正智煩惱倒起正治此倒為智發生此智則有方便即行一切善法入正次第所謂漸入佳境次第超勝則非精進不為功也次段十九頌依人分別次有五頌依法分別末頌總結人為假設故歸之於法尋常依人分為五道即資糧加行見修無學道也初資糧道有五方便一不淨觀二持息念三界差別觀此三亦名三處觀此三方便皆為集中心思之最初法門從身說起令心定於一處使勿流散然後方有斷惑證滅之可言也常人多煩惱者以其心散亂不住故也四者別相念住由此方便即進於四念住先觀身等之自相如身自相即四大造色等所成之衆相五者總相念住令心住身等之真實相已又各別觀無常等共相如是方便皆是入道資糧謂之資糧道一次說加行道謂即於四諦法之每諦四相苦空無常無我苦因集生緣集滅盡妙離滅道如行出道而見諦諦相關之處因此四諦之實又當別觀此十六行相而後確知於是次第有暖頂忍世第一法等四加行至世第一法一相一剎那開涅槃門仍觀苦諦行相漸次乃至道諦行相真實見道又四加行所攝地即定地世第一法及忍依六定地未至中間初禪二禪三禪四禪餘則依七加欲界地世第一法一剎那次涉見道位自此以四諦十六心漸證諦理十六心者謂苦法智忍苦法智苦類智忍苦類智乃至道諦例知於苦法智未成就時為忍忍謂忍可即於未曾經歷之事加以注意之義其明知決定者即謂之智此智以欲界苦法為所緣見道以人為本位類推上二界苦亦復如是故名類忍類智如是四諦有法與類之別於法類中復有忍智之異依此三層十六心觀分別四諦自然於四諦之實明白清楚是為漸觀與此相反即頓觀也自第十六心以上為修道或謂前十五心為見道第十六心住果為修道經部與大乘十六心均為見道十六心以上為修道謂前十五心為初果向十六心即初果從初果預流到四果向為修道至住四果為無學道於四果中因根之利鈍得果差別又分出二十七賢聖隨法行者依教而行為利根隨信行者依師而行為鈍根是此隨信隨法皆屬十五心攝此時未離欲界欲為初果向若以世俗道離欲界修斷六品煩惱為二果向若離欲界修斷九品煩惱為三果向每界修斷煩惱分上上等九品至第十六心名為住果鈍根者轉名信解脫謂信師說而得解脫也利根者轉名見到謂由自慧獨有所見而得解脫也初二三果即依三界九品修所斷煩惱差別而分為二十七聖最後阿羅漢果亦有時非時二種解脫時解脫者有時衣食資具住處住伴一切順緣具足始能修行證道也解脫情形在得盡智無生智得此二智即能真感我生已盡不受後有梵行已立所作已辦等四諦之實我生即集諦不受為苦諦梵行為道諦所作為滅諦所以小乘自始至終不出四諦知我生已盡不受後有等為盡智知我生已盡不復更生為無生智解脫以有時非時別故阿羅漢區分為退思護安住勝進不動六種前五鈍根為時解脫第六利根非時解脫又利根者於二智外尚得如實智成就正等解脫解脫不得滅盡定者為慧解脫得滅盡定者為俱解脫此上為依人分則之要略也一復次依法分別者人有利鈍法則所證能證之道無以異也法同一相而得果有殊此果就三無漏根分法對有情有漏無漏有增上作用者為根即未知根已知根具知根體即意喜樂捨信勤念定慧九根於無漏見道中為未知當知根修道以上為已知根無學道為具知根此等法從見道勝進入修道時捨而不斷修道入無學道亦然又鈍根信解脫具勝進者至見道位亦可轉得見到阿羅漢亦然由勝進故退等五種亦可轉為不動是為從法分別末頌總結明漸修頓得義成立漸修頓得之理教有多種此則略舉其一謂苦集為惡滅道為德如是四諦惡德二種均須現證不能同時故成次第如人之於一時不能俯仰異見也雖漸現觀而得果則頓謂無間道解脫有為斷惑無為其果皆一道而得如伐柯微盡最後頓倒明乎此則不受頓現觀家之疑難也心論較俱舍尤見要約小乘根本要義具備於此矣四述道諦本論釋道諦有智定二品道在斷惑唯智為能以煩惱正因無智起也而智又依定發是以本論所釋特勝義即在定慧相資廣生功德也尋常定智為次此論先智後定者蓋有密意如中含聖道經言聖道八聖道一道即是正定餘則定之資具也本論次第亦重視定法如前集諦業與隨眠二品所重在後隨眠此處當知亦爾此正明定慧非但因果為次實有相資之義所以中含正定亦由正見慧展轉而得如是展轉相資即止觀雙運究極之意前言羅漢於二智外有如實智非但小乘作如是說龍樹般若亦重此智蓋以表止觀雙運之境界雙運亦是任運之境也如是定慧相資而後廣生功德此功德由定生亦由慧生也又此功德利他所顯聲聞雖無利他大行然亦有聚衆教化之事有異獨覺之孑身自了也第六智品有二十五頌首頌總明智慧之性即能洞觀四諦實相也四諦不外二面一者一切有即三界生死所謂苦集之實二者無此有即為涅槃所謂滅道之實此皆依智慧而能審知是即此品明智之範圍也次言智慧差別種類有六頌智有十種約而為三一為世間有漏智指與出世無漏相順智非法法之世俗智也二為法智三為類智法智緣欲界類智緣上二界此二為出世無漏智也由此開為十智法類觀四諦有苦集滅道之異即隨應而有四諦之名蓋自他相續有漏法皆為苦諦見道但能觀自相續修道兼能觀他則有他心智亦從三智中出最後無學道中得盡智無生智此二智境界亦是四諦是即由三智開出之十智也又此三智亦有相互異同之處此於十智觀四諦十六行相上具不具緣見之法類二智具緣十六行相世俗智不緣十六行相但於未見道前緣下地苦粗障相上地淨妙離相又苦等四智各有四相無漏他心智如道智有四行相有漏他心智非緣十六行相盡智無生智各有十四行相除空無我所以者何一者不須謂我生已盡有世俗我故不須空無我行二者自覺我生已盡有此生盡相在不復以空無我為境界也此外有無漏智以四諦自相為智境乃共相智前最勝者也次說智之成就修習有九頌明見道十六心中何心成就何智三界九地中何地成就何智既得智已於諸位及修功德時修習何智頌云第一無漏心等者謂第一苦法智忍相應無漏心中成就世俗智第二苦法智成就世俗苦法三智第四苦類智成就者於上增一為世法苦類四智第六集法智成就世法苦類集五智第十滅法智成就世法苦類集滅六智第十四道法智成就世法苦類集滅道七智此中不說第三五九十一十三十五法忍相應無漏心者忍非智性忍中不得智故又第八十二十六三類智皆攝苦類智故亦不說修道離欲各增一智即他心智無學鈍根成就九智除無生智利根者十智成滿又上地未至地中間地除他心根本四禪成就十智無色界有八除世俗他心二智又以修言見道中自法修修道中則自他並修謂得忍即可修智也蓋見道創見諦故於餘智忍未曾嫻練故於現在未來唯修自分修道位中已嫻諸智諸忍故智現前現在當來自他並修也是於三心中等者謂見道三心苦集滅三類智修世智若依欲界乃至第四禪地得證現觀此現觀邊修習四禪乃至欲界七地世智故此世智亦名現觀邊智得諦邊際名現觀邊此時出無分別觀所謂根本智境入分別觀後得智境故修世俗智也不言道類智修世智者以佛道無量無邊皆未修習具勝進心者出無分別觀已猶勤精進求未修道未遑息心分別世事又三心能得諦際者以苦集滅衆生均有皆同類故道則不然衆生根性不同三乘聖道互有無也修道一心道類智離欲者修七智除世俗盡智無生智未離欲者修六智又除他心智也以非無學果不修盡無生智以未離欲心有躁動不修他心智以修八等至中最後非非想斷欲界欲證第三果不修世智次言修道位中所修之智十七無漏心等者謂住初果未離欲界六種欲者於十七無漏心即九無間道與八解脫道中修習七智除他心此道在未至地心不靜故盡無生智非無學故信解脫勝進者增益諸根成見至時修習六智此就未離欲而言又除世俗智也得不還果時得根本禪故修八智除盡無生智非無學故又離四禪三無色七地欲九解脫道中修習八智此中若以世俗智離欲現在未來均修八智若以無漏智離欲現在修六智苦集滅道四類智及滅道法智未來修習八智雜修禪定學諸神通中神足他心宿命三通善解脫道中亦修八智以諸神通道漏無漏又依根本四禪故也此七地離欲無間道及有頂第一有離欲八解脫道中俱修七智除他心盡無生智有頂離欲九無間道修習六智又除世俗智若在上地離欲修習上地無漏智亦能兼修下地無漏智下地則不能修上地以勝能修劣劣不能修勝也次言無學道漏無漏等者謂羅漢智相應初心修一切地有漏無漏諸功德法以斷一切結止觀任運得正解脫故也然但修習自相似法如退法羅漢則修九地下下品德如來羅漢則修九地上上品德又此初心與彼苦集類智相應以緣非想非非想蘊作我生已盡不受後有想故次有五頌說智慧互緣先言智見忍之不同所謂決定為智推度為見忍可為忍諸忍非智盡無生智非見意識地中善有漏智亦見亦智亦慧意地五見是煩惱性當知是見亦有觀察及俗決定亦名智慧餘有漏慧皆非見性法智未知智等者正明諸智互緣法類二智各各互緣九智法智除類類智除法因智集智果智苦智緣有漏他心及世智道智緣九智除世俗智滅智解脫智無所緣餘世智他心盡無生智各各緣十智又法智斷欲界惑亦復能斷上界惑否是亦能斷謂滅頌作息法二智於修道位即能斷上二界惑也所以者何其人生於欲界觀欲界苦極見過失為離此苦求對治道斷欲界苦以心猛故相連而斷色無色苦色無色苦實類智斷今隨法智後無間即斷而言法智斷也又法智在無間道類在解脫道斷惑在無間道中故言欲界法智斷色無色欲而非欲界類智也修道位中所修仍十六心而所斷不同謂修道中斷修道惑其惑又有九品之不同也末有四頌談智所生功德此有二類一不共功德即佛之十八不共法小乘視佛亦是無學羅漢所謂十力四無畏三念住大悲也此種功德皆十智所從出如十力中處非處力十智所生餘力皆是處非處力差別四無畏中初無畏是十智所生餘三無畏是初無畏差別也二共功德此又分二一者共聖二者共俗共聖者無諍願智四無礙解此羅漢之有為功德此亦十智所從出無諍以世智為性願智除他心盡無生智以七智為性法辭二無礙解世智為性辨義無礙解十智為性共俗者即六通八等至三三昧四無量八解脫八勝處十遍處此中除漏盡通世間亦復有此等德神足天眼天耳世智為性宿命法類世苦集道智為性他心通法類世道他心智為性漏盡通無漏九智為性除世智身念住八智為性除他心滅智受心念住九智為性除滅智法念住十智為性此中但及六通念住功德者餘多由定力生歸於定品蓋定慧功德相通也第七定品有二十八頌初頌總說智依於諸定行無罣礙行者謂定為智依智是心相應法之慧心所即與實相相符之了別也於實相明白決定而非執著云何此智必依於定耶以定能持心不高不下不掉舉不昏沉對所緣境即能合泊發生智慧心與境有合離有時緣境太過而掉舉有時緣不及境而昏沉必於所緣境無過不及之平靜狀態乃為定而無罣礙即於緣境心不旁涉通途但就心言定令之一事不著空空蕩蕩不思善不思惡而謂之無罣礙是正禪宗一分病根所在不知心離緣境無所謂定無罣礙之言全在心與境之合泊此所言境即教證也初學必以聖教為境久久則涉離教之證境又法之實相即就心力所能徹底辨別者而言能於所緣徹底辨別是即為慧能令心力與境合泊以自然發揮力量是即為定所以頌言定為智依也次有七頌明定之種類凡有八種即四禪色界四靜慮四無色無色界四等至也此色無色界一面有界可指一面亦就心境而判若欲界中修色無色界定心者即有彼界之境也如是八定不可偏廢有四禪則能專一故以靜慮為名有無色等至乃能充量故以空無邊等立名頌云決定者即示二類之不可或缺也又此八定各各可分為味淨無漏三種與貪等煩惱相應者為味著定定所以生慧辨境證解脫也有此貪味成染污定則失求定之意矣善有漏定雖不能斷惑與惑不俱故謂之淨若能斷惑而又是淨謂之無漏七定各具三種最上非想非非想無無漏定以心太暗昧不能單獨斷惑故斷惑須生無所有處又定之根本為四禪各由禪支構成初禪有五支謂尋伺喜樂心一境性心於境推求粗觀為尋細察為伺但推求結果止得境界之概念不得實相言語文字因而生焉然修定之初實不能不藉助於彼故列為初支也喜樂如次為心身由修定所得之受心一境性即心住於捨與境合泊平等正受之狀態真正之定即在於此故為禪支中之最主要者心一境性有二義一謂心住於捨不掉不沉二謂心與緣境一致純一無雜初禪所生梵天身有種種優劣只具眼耳身意四識色界無味嗅故能至心一境性也二禪四支喜樂心一境性加內等淨即正信謂於種種由離惑而得之淨境具深淨信無復猶豫三禪五支樂心一境性加念行捨正知行捨者於樂不著而求勝進念於所緣明記不忘正知於心止舉捨時能分別知四禪四支心一境性行捨淨念淨不苦不樂四禪所生梵界色身精細無出入息唯淨無漏四禪如應與其諸支相應非染污禪皆備諸支又此禪中特有之法餘禪不說者當知餘禪中無如尋伺唯初禪有無出入息唯四禪有也如是歷觀四禪構成次第心力轉強身益簡化初禪已離嗅味覺二禪則泯身之優劣區分至第四禪無出入息心力發揮更見推廣矣欲界無禪到初禪時有未至禪以此時離味著而有淨無漏故初禪與二禪之中為中間禪二至三三至四之間亦有之不另立以初禪有尋伺二禪無尋伺須經此無尋唯伺之過渡位次有六頌明定功德定有種種名目即有種種德用此用為六通四無量十遍處八勝處八解脫十智此等由定力起謂之定德置於慧中謂之慧德慧德中有四禪無色定德中有十智六通足見定慧相資交互為用也下言何地有何功德者四無量中除喜六通中除漏盡慧之他心智及十智中之法智皆遍四禪除入中說四等者說八解脫八勝處十遍處也八解脫即內有色觀外色內無色觀外色三淨色空無邊識無邊無所有非想非非想滅定解脫也此解脫以離貪言前四滅色貪次四斷無色貪八勝處即除入者即內有色觀外色少分內有色觀外色多分內無色觀外色少分內無色觀外色多分觀青觀黃觀赤觀白也是八勝處即八解脫之初三解脫前四勝處即彼前二解脫後四勝處即彼第三解脫所以特標前三解脫為八勝處者以其能尅制煩惱也常人煩惱多由色起今以慧析之於色唯得青等四色而已此但光線所起之顯色概念何實之有十遍處者地水火風青黃赤白空識此實八解脫由觀之程度不同而立初四為初二解脫初四勝處中四為第三解脫後四勝處後二為第四五二種解脫以八勝處觀猶為境界限制如觀青不能觀黃等此則觀一相能遍一切相也是此解脫勝處遍處三者相聯可知其遍禪地之多少也初四勝處喜無量初二解脫唯在初二禪中除前四勝處餘四及淨色解脫前八遍處唯在第四禪中除前三解脫餘四空無邊識無邊無所有非非想空遍處識遍處如自名即自地攝滅盡攝在非非想處餘無漏法九地所攝次後餘頌言定之成就前言定有味淨無漏三種八種定中初禪不能度自地欲以是不能至上而有味著故已離自地欲向上而未至上地則成就初禪淨定及諸功德若住上地則成就無漏也以功德言唯淨無漏定有味定中無妙無漏無染等者言成就定之因緣定之因緣隻同類因味與味為因淨無漏與淨無漏為因八定以味淨無漏分別則無漏有同類因七種除非想非非想味淨各八又無漏定無染行相相同能互為因如曾成就無漏初禪得後起無漏無所有處彼無漏初禪得可為其同類因也頌云七種謂之因者非一時具七因也八種味淨則止能自地為因粗細勝劣行相異故頌云淨味相應禪當知因有一無漏禪次第等者此言定之等無間緣關係較為復雜先列表如次無漏淨味初禪六自二淨無漏上二各二七自三淨味無漏上四二自二味淨二禪八自二上四下二九自三上四下二四自二下二三禪十自二上四下四十一自三上四下四五自二下三四禪十十一六自二下四空無邊處十十一七自二下五識無邊處九自二上三下四十自三下四上三八自二下六無所有處七自二上一下四八自三下四上一九自二下七非想非非想處五自一無無漏下四六自二下四十自二下八此中無漏禪之等無間緣如無漏初禪定心無間能起六種無漏定心謂自地與上二禪三禪各具淨無漏二種也合為六種不起三禪以上者力不及也以下例知每一地止能與自地相近之上下各二地生關係過此則力不能及又六定心非一時起謂此心無間或起自地淨定或無漏定或起上二地淨無漏定餘亦準此淨六有七八九十生十一者言淨定之等無間緣如淨初禪心無間能起七種定心謂自地淨味無漏三種二禪三禪淨無漏各二合為七種淨唯味著自地他地不起下此準知味相應諸禪興二乃至十者言味定之等無間緣如味初禪心無間能起二種定心即自地味淨二種也味是煩惱不能生無漏而能生自地淨定又不能生上定由未離欲行相違故上能味下退時能得下地生得淨定緊接自地之下地可具味淨二種隔一地則止具味定一種如表中三禪五定心中自二二禪二初禪則止有味一不得淨故下準例知淨以無漏禪下三頌言定及功德之所緣淨及無漏四禪緣一切地有無漏法味定唯緣自地諸有漏法無色淨及無漏定唯緣自及上地有無漏法不緣下地味定與禪同唯緣自地有漏也餘色界四無量等諸功德法則緣欲界也未有六頌言成就諸聖所共功德先說熏禪數數嫻習禪定之謂即辨修習真實真正熏禪應依第四禪有漏無漏自地上地交雜修習使心調柔如意則心自在於諸禪定任運出入此時三禪愛盡將所得果住第四禪五淨居或廣果天中即至阿羅漢圓滿一切定發揮諸功德所謂願智無諍四無礙辨諸聖共功德也於法自在成就願智於三世法隨願現前利益有情成就無諍以諍必破衆故智慧無礙成就四無礙辨慧至無礙極矣故無礙辨後大乘謂為陀羅尼欲界初禪四禪三地有願智無諍依欲界四禪五地法辨辭辨唯依欲界初禪二地須言語故應辨義辨則依九地斷欲亦復生下明成就味淨無漏禪及孰能斷惑淨禪二時得斷欲時及上地投生下時味定則上地退時及上投生下時得無漏唯是斷惑時得世俗中間定亦能斷惑蓋中間定必入根本入根本必須斷下地惑也中間定唯與捨受相應無喜樂著味故能斷惑末頌言定功德十四變化心四禪合有十四變化心各成就自地與下地初禪二自一欲界一二禪三自一欲禪各一三禪四自一下三四禪五自一下四上地見聞及覺起下地眼耳身根發下地識了別識若現前則根成就識滅則根亦不成就小乘如是析心可見其用功之切實處也以上辨別四諦大段竟次下第二大段後決擇法義第八契經品有四十頌是即毗曇經九分之最末一分也以上諸分皆就諸法義類相從而集此分乃彙列各法而成故云法蘊或言諸蘊本論對於義類相從之數分諸門分別解釋較詳此分多為彙集佛說之原義故於諸門分別間有而不詳蓋諸門分別乃論家之事非經所有也初頌總說據優婆扇多心論釋及雜心論引此頌云止說經中少分則此品所說經文並不完全而有簡擇歟但經第九分究有幾許經耶就現存各種毗曇與此品相關者考之如法蘊足有二十一經舍利弗毗曇亦釋經九分但次第不順第一問分有十經品類足千問品與舍利弗毗曇問分意同乃問答分別也有二十經各有五十門分別故有千問此乃漢土所存者此外南傳七種毗曇分別論即與問分相同而列十八經按此已知各論所據數量次第互有差異大抵仍以本論此品所據較為近古且正確耳但觀優婆扇多之言當知此品仍有所檢除也次頌以下釋二十一經初經三界謂欲界有十處即地獄畜生餓鬼人六欲天十種有情色界十七處梵衆梵輔大梵少光無量光光音少淨無量淨遍淨無雲福生廣果無煩無熱善見蓋見色究竟天無色界四處空無邊識無邊無所有非非想如是三界即三有也第二經七識住即欲界善趣人天色界初二三禪前三無色界此七處為識所住不壞見斷修斷非斷識故立為識住餘處壞識第三經九衆生住於前七識住增無想天非想非非想處天以衆生樂住不去故立為衆生居第四經四識住即色受想行有漏四蘊也為識所依著與識俱相長養故名識住第五經十二有支從無明乃至老死衆生自體由是而生也又以三世分別由過去無明行支而有現在中間八支循至而有未來生老死也第六經六界即地水火風空識乃士夫成身之資也第七經四諦謂苦集滅道有為諸行苦滅為果集道為因果著因微見著則易知微也第八經四沙門果即初果至阿羅漢果有六法為果體無漏五蘊及擇滅是最勝羅漢果在九地除非想非非想攝三果在六地除四無色攝初二果唯在未至地未離欲故第九經四通行即苦遲苦速樂遲樂速四道行是由根有利鈍隨信行者遲隨法行者速地有本末根本四禪利鈍根無漏法勝俱名為樂餘地無漏法弱且不易得故名為苦故耳第十經四不壞淨即於佛法僧戒淨信不疑也第十一經四修定所得修習四禪能得四種利益一得現法樂住如修淨無漏初禪二得知見謂得生死智通三以種種方便得分別慧所謂諸功德法四得漏盡謂最後學心相應行故第十二經四神足即欲勤心觀此聖道也頌名善有為法由定力能引發功德故名神功德足第十三經四正斷即於已未生惡令盡不復起已未生善相續增廣不復失此乃精進修習所得慧功德之所作也第十四經四念住即身受心法之隨順自共相觀也第十五經四聖種謂於衣食臥具斷愛樂崇尚知足為入德之門即以無貪善根性為聖種也凡此種種皆是修定所生之種種功德所謂諸慧分別就廣義言亦名神足亦名正斷亦名念住亦名聖種均由慧成以德用不同立名乃異故頌中以亦字示之第十六經道品約三十七品之法體為十種即頌言淨信精進念喜及倚覺輕安護捨思惟尋戒思定是法謂道品又此三十七品通常判為七門由處所故而有四念住由方便故而有四正斷由一意故定故而有四神足由鈍根故而有五根由利根故而有五力由見道故而有七覺支由修道思維道故而有八正道前提神足正斷念住別為解釋故此道品就餘四門說若以界地判初禪具三十七二禪與未至各說三十六除正思惟或喜三四及中間禪各說三十五除正思惟及喜前三無色具三十二除喜正思正語正業正命最上非想非非想處有二十一除覺支道支及身念處與欲界所具同以無無漏故第十七經四食即摶識思觸此等皆能長養人身故謂之食欲界摶食以香味觸為體餘三皆以有漏識思觸為體通於三界第十八經三三昧即空無相無願此以四諦十六行分別具空無我行相為空三昧具滅淨妙離為無相三昧此外十行無常苦因集生緣道如行出即無願三昧也第十九經四倒即於苦上所起之常樂我淨顛倒此倒以身邊戒取三見為性於見苦時則斷也第二十經五見即身見邊見邪見見取戒取五見若於苦諦上起正見見苦時則斷如是隨應於道上起正見見道時則斷也第二十一經二十二根有為之法從緣所生相互為依其力勝者即有增上作用謂之為根如草木有根枝葉花果從此能生有為法亦爾根有二十二種概括有漏無漏流轉還滅頌云諸界在於內者謂十八界之內界及男女命根是流轉之依身有三根男女二根有嗣續增上之用亦衆生相別故命根為有情生死所依於種類有相續及持增上故次五受根苦樂憂喜捨於染淨法有增上力用次五淨根信勤念定慧於清淨法有增上力為還滅之依次三無漏根此即意喜樂捨及五淨根九法為體九法在無漏位為無漏根於無漏法有增上故在見道中名未知根修道中名已知根無學道中名具知根又三無漏根唯是無漏眼等五根男女命根憂苦受根唯有漏餘通有無漏經意止此所餘諸頌為諸門分別乃論家所辨欲界四善八等五頌論主諸門分別二十二根非經原義一三界繫門二三性門三色非色門四心心所門五報有報門六生時最初得幾根門七歿時最後拾幾根門八三斷門如文應知此二十一經皆佛所雅言隨處傳誦流布極廣佛說教法可以四諦盡之雖有種種廣說要皆為四諦之莊嚴闡明染淨因果之理而已所以此品特於四諦之餘復集為聚是知經之組織實有此二類之別契經品即以雜聚為說也若取諸根義下顯示論家解經之方式本有多種今於此論略出三門謂識智使識六識說諸法之依謂諸法為識所識乃有其體不可識則無其體蓋非識所識則有無無從言之也智十智說諸法轉淨之本謂法由智知即能轉淨使九十八使說諸法成染之由謂法因煩惱隨眠則成染污此與大乘瑜伽唯識不無妙契之處佛所說法經此三門分別即歸落於染淨因果之四諦故曰佛說皆可以四諦盡之也此義於品類足論言之綦詳此處但提大綱而已先言識所識者前五根所對境為前五識所識非五根所對境為意識所識此判一切法為六識所識也次言智所知者一切法又分欲界色界無色界有為無漏與無為五種前四種又分心相應行不相應行二種第五無為又分善與無記綜合即成十種為十智所知十種又約為有漏有為三界無漏有為及無為三種五法為法智所知即欲界相應不相應無漏有為相應不相應及無為善七法三界相應不相應與無為善為類智所知他心智唯緣三法欲色二界及無漏有為相應法世俗智知十法集智因智苦智果智知六種法三界相應不相應滅智知一法無為善道智知二法有為無漏相應不相應餘盡智無生智九法除無為無記如是諸法為屬何界屬何智知即可知其究竟淨否也後言使所使者自地煩惱隨眠自地所繫法下地惑不隨眠上地法上勝下劣故上地惑不隨眠下地法已離下地欲故又九十八使中唯屬見苦斷者唯隨眠見苦斷法乃至屬修道斷者亦然而遍行煩惱隨所遍行皆能隨眠又法若通三界者三界惑皆能隨眠如意識尋伺但通欲色二界憂根唯在欲界皆隨應為各界隨眠所染由此三門而知佛所說法無不適於四諦也第九雜品有二十六頌本論依經組織之八品已完此外為決擇前文而無次第連屬成此雜品大體仍與各品相順有同顯揚論未決擇分之體裁也初頌總說結上啓下以次則決擇三十一義第一決擇心法前界品雖名色俱攝而偏重於名契經品後示解經方式仍以識智使三種心法出之今此文特先提心法為言可見本論立說主眼所重在心而非色也心法必有境隨境所解不同而有其行相行即心對境之了解也心之了境異於鏡之照物而有受之領納想之構畫行相故謂心法有境有行也心由所依不同而有眼識乃至意識之區別然心法相互之間復有相應行相所謂依緣行時事自體五者皆能一致相順是為相應心所義如心說同一類故第二決擇有為法行有為法即行心法之行乃相應行今泛言行亦有其特點一從緣生而非自生二以緣生故即有因果或以彼行為因為彼行果或為彼行因有彼行果三有因果即有時間謂三世法四有時間即有言說安立謂之言依而為種種思想所行謂之道路也第三決擇有為染淨染有種種名謂惡隱沒穢污下賤黑淨亦有種種名謂之可愛果又可修習纍積故名習修以上就相應行言之也第四決擇不相應行此有十四種即無想天無想定滅盡定衆同分衆生於一趣中有相似處之謂句身名身文身命根得於事成就之謂異生性即與聖相違亦衆同分蓋聖與聖同凡與凡同也生住異滅此等法非色非心而與餘有為法俱起故名不相應行後有三頌為此法之諸門分別一三性門二定是善得生住異滅通三性餘七無記二三界繫門無想天無想定色界繫滅盡定無色繫名句文欲色界繫餘連三界繫三有漏無漏門得生住異滅通漏無漏餘唯有漏四別明捨斷異性門此異生性最初苦法智忍相應無漏聖心生時捨凡夫於流轉中此地歿捨此地體彼地生得彼地無覆無記報未得聖法非究竟捨若凡若聖離此地欲盡即斷盡此地異生性第五決擇三無為即擇滅虛空非擇滅無為之法不待緣成而為常法復無生住異滅四相此有三類由智慧數數簡擇滅諸煩惱而現之相謂之擇滅無為由無質礙相名虛空無為有法由緣缺不生非由智慧簡擇而滅名非擇滅無為以上五義前四有為第五無為攝十八界盡即界品中之要義也第六決擇俱時因因之於果有增益無損減俱時因即俱有因與相應因故曰或俱依俱有倚生相應也第七決擇異時因此即同類因遍行因與等無間緣此因就法已生而立未生則無前後次第可言也第八決擇果種類果有五種此處止舉異熟果乃異熟因所得者是果屬有情類以是不共果故不共者有情各有執受也果有有為無為之別解脫離繫果是無為餘則有為也第九決擇緣他境此言俱有法不互緣也心心所起彼此相應同一所緣而俱起不能互緣亦不緣自境雖與心同時而境屬於他不同類也故心以為所行第十決擇能緣無處所能緣之心隨所緣變所緣普遍不拘一隅故能緣心亦無處所而遍於一切也如是因果五義又行品中之要義也第十一決擇解脫斷惑時道解脫與斷皆對煩惱而言有道即可斷惑解脫道有生滅屬有為法此言解脫是道生時抑道滅時耶尅實談時生有己生正生將生滅有已滅正滅將滅三分而道之前後相屬有無間道有解脫道此云斷惑解脫在無間道滅時斷惑解脫道生時解脫也第十二決擇有無愛斷有愛者為三有之愛著此五道斷即見苦集滅道及修道斷無有愛者對三有之斷愛著此唯修道斷也第十三決擇無欲斷滅三界愛斷謂之無欲界愛餘煩惱結斷謂斷界一切貪等隨眠及隨眠所隨增事斷謂滅界第十四決擇十心欲界善不善無記色界善有覆無覆無記無色善有覆無覆無記加無漏心是為十心此中染心得十善心得六欲界善無記色界善無覆無記無色界善無漏心無記心唯得無記也第十五決擇道品具根三十七道品有六法為根即信進念定慧與善第十六決擇相應是他法相應者與他性相應而非自性以無一性二剎那俱起故如是等義乃依隨眠賢聖二品而言也第十七決擇但斷緣縛煩惱之於法乃由所緣或相應而縛上言相應是他性故斷所緣不能同時斷相應縛必待異時斷也第十八決擇斷而不離謂見修道中分分斷惑是故有解有縛斷而不離如苦智已生集智未起見集猶為縛也第十九決擇四不壞淨此由見諦而生謂見諦時於佛法僧戒生堅固淨信是名不壞見苦集滅者於法戒不壞見道時則得四不壞淨也第二十決擇二修現在修者為習修現在前故未來修者為得修得隨續故以上又為智品之要義也下諸決擇乃就各種契經泛說其義第二十一決擇隨心轉心法之起有衆多心所隨轉此外心與心所之生住異滅及無表色亦皆隨心俱起也第二十二決擇斷知分別斷但就有漏言以是雜染可斷法故知通有無漏皆是智所知故第二十三抉擇遠近分別佛說法有遠近過去未來其用不顯故說為遠現在正用即說為近第二十四決擇善惡業定造無問業定入地獄修無漏行定得解脫第二十五決擇見處漏見謂五見出生義為處若法是五見所從出能增長見為見緣縛相應縛者是名見處即有漏法第二十六決擇具根多少凡聖於根成就最多十九最少為八第二十七決擇五觸此觸非但一類視其相應可分為五即有對觸依所對相而說增語觸意識身相應觸緣一切法故又緣多名故明觸無明觸非明無明觸第二十八決擇二道得果無漏果由二道得即由無間道斷惑由解脫道證解脫第二十九決擇羅漢入滅心羅漢最後心為異熟無記心非善惡心以壽盡時任運入滅無作為故第三十決擇四有衆生生死流轉之體有四階段即生有本有死有中有第三十一決擇厭及離於四諦中緣苦集所起忍智即有厭起緣四諦智即得離上來決擇三十一義似為零亂無序實則皆是一家獨到之說世親作俱舍頌將此諸義補訂於各品中可知其重視此一家之說也今略示其要如言一切法有以因果所緣成立其義蓋有因果有所緣說有一切法無法則無因果之實又無緣不生心故初之二義即明此也又如道生時解脫道滅時斷惑以生滅立說即示同時異世之義謂一生一滅雖則同時而正滅為現在正生為未來即是異世次後解脫巳生為現在無間已滅為過去仍為一時之事也故言二道得果遠近三世分別皆成立三世有說後之有部亦從此啓發也又如言心緣他境不緣自性斷所緣不斷相應乃至或斷或縛等義皆成立現觀漸次之說也由是可知三十一義實為其有異餘家而提出自宗之主張者也末後論品示論議之方隅此殆為印度當時風氣凡論師達一切義要能問答裁決如婆沙卷一一八有云迦濕彌羅有一論師入北印暗林伽藍自稱論師不受僧使寺主試之問云三界繫業同時受報否答云非也即免僧使可知論師要能問答此品所出十問如初之威儀不威儀乃言天上有無梵行乃至四果進退等皆當時諍論問題也心論之要今此說竟
