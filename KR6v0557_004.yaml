body:
  text: 佛學必修五科研讀次第五科講習乃依先師釋教之說而立意在直指精微以階深造故編次群書三周區別周各以一要義貫通反覆研尋歷三五載亦可與入道矣初周主於心性本寂自覺有此心而後有此學故心存則學存異於外鑠此之謂知本次周盡心之用寂相著明則真智沛發捨染趨淨必循軌轉依而不可遏三周充用之量佛與衆生遍具此心交感緣起依等而相同謂之一法界弘願行於無極朝全界之圓淨斯乃此學之終鵠也初周毗曇科兩種講習所資凡五十書初周先取根本要文五經七論而已法句經二卷吳譯藏要本佛說以法句始原構不可得而見矣此從阿含輯之品類次第略具舊觀由此知佛教之本也南傳法句始於雙品心性本淨宗義最明瑜伽思所成地節引法句古注可先參研再及出曜譬喻諸譯阿毗曇心論頌一卷晉譯院刻稿本毗曇所以解佛說也迦延九分結集佛語自詮是為毗曇本經心論抉擇舊文上座正傳則又為晚出諸論所據九分始於界品意在明因有部毗曇改其次第未可從也今取法勝自釋並參考論經雜心甘露味等繹其文義般若科兩種能斷金剛般若經一卷淨譯院刻本金剛經結九部般若之終所以明般若歸趣於一心也發無上心乃有何住何行云何調伏之問所以住行調伏者乃在般若羅什譯傳大品於摩訶薩大心一章別開為金剛品經要於此見矣宜用隋譯無著論對讀菩提資糧論頌一卷隋譯藏要本般若必取資於方便菩提莊嚴燦然始末龍樹之所以建菩薩正行之典範今存自在比丘釋文可以參讀又可取十住婆沙參考瑜伽科兩種摩訶衍寶嚴經一卷失譯院刻會瑜伽釋本瑜伽三乘階梯終歸於菩薩藏寶積經迦葉品舉十六相以攝藏中教授今經其異譯也經談中道以離言心性實之瑜伽本此開宗抉擇分中解經全文豈無故歟今即用瑜伽釋合讀辨中邊論頌一卷唐譯藏要本論據般若寶積以建立者三心性勝義以空性為心性也平等方便唯識待於無境有無義相等也漸次觀門能所因果由境而後及識也此瑜伽究竟義亦即大乘究竟義後世中觀學徒雖力破之安能動其毫末哉唐譯論釋改易文次應取陳譯合讀涅槃科兩種勝鬘師子吼經一卷宋譯藏要本涅槃明法身不壞因於攝持正法勝鬘十四義由此輾轉而生至說如來藏心感受生死故為出世正因則尤屬內學大本之談矣可用唐譯本參讀大乘法界無差別論一卷唐譯院刻稿本必於菩提存心乃涉涅槃之樊論稱菩提心者此也十二門義曲暢其宗可作如來藏章異門而讀戒律科兩種清淨毗尼方廣經一卷秦譯院刻稿本經說一切衆生界即法界探此心源以得戒體又詳大戒殊勝因緣亦本於心勝也攝論所謂毗奈耶瞿沙方廣契經即是此書可與晉宋異譯及攝論釋文參讀菩薩戒本羯磨二卷唐譯藏要本攝六度為學處菩薩心戒增上之義著矣備列科條此為通軌唐譯文義最勝可取慧沼勸發心集參讀上舉五經五論悉歸於性寂自心一義故成一周如何保任此心固有待於嫻習止觀從容踐履次下兩籍堪作準繩可熟習之解脫道論十二卷梁譯藏要本此集上座學說精英舊師軌範所存僅此唐宋習止觀者皆未及知由有相而無相則在運用之妙又未可拘拘論說也六門教授習定論一卷唐譯藏要本此依瑜伽修所成地而嚴密組織之寂因作意一義創見於此譯文蓋所謂不離一切智相應心也據以通習般若瑜伽涅槃三科觀行皆無礙矣次周次周所習皆各科正宗故卷帙稍繁凡十九種毗曇科四種四阿含經毗曇讀十六卷晉宋等譯院刻稿本佛說歸於分別毗曇家言從此而出今用毗曇九分之意選録經文略見後先學說相承之跡而已以四諦義通經歸極於無餘涅槃經亦謂之盡有漏成無漏可知原有轉依之義惜小乘毗曇終不得其解也阿毗達磨俱舍論頌一卷唐譯院刻會譯本世親依分別說之方法料簡有宗撰茲頌本兼取有經兩部之長故盡一書而諸義備印土傳習謂之聰明論也分別三科謂蘊假而界處實者蓋欲由種子依創明大本逮後一聞攝論即盡棄所學而學焉非無故矣頌義應用世親自釋與顯宗對讀大乘阿毗達磨經頌一卷唐譯院編稿本此經久已失傳今從攝論莊嚴等書對勘輯之經說十類佛語首以無始時界為依又謂一依具染淨二分由是釋成轉依新義以易解脫舊言故結之曰轉依即解脫也通般若之微言闢瑜伽之廣軌樞機在此顧可忽諸應取攝論莊嚴釋文合讀大乘阿毗達磨集論七卷唐譯藏要本此集大乘論經諸思擇處蓋由所見之真所涉之廣所用之切而集之也故本事分諸門分別法執不存抉擇諦得條疏終歸無住此其為大乘毗曇不共義歟可與雜集論合讀般若科四種維摩詰所說經三卷秦譯藏要本經以菩薩解脫法門為宗不盡有為而不住無為一語盡之可謂能得方便般若之神髓者矣心佛衆生三無差別惟聲聞學人不知衆生性故不知心性不知佛性無上菩提望而卻步是誠愚不可及維摩提嘶警策用全力以周旋又何其真切也經文可與唐譯對讀摩訶般若波羅蜜經草七卷秦譯院刻稿本大智度論節本二十卷秦譯院刻稿本龍樹創宏般若羅什得其真傳故所譯經論篇章開合具見匠心經以法名受三假開宗以涅槃如幻結論遮小宗之拘執示佛語之真詮不壞假名而說實相是般若之正義也論判般若方便兩道貫攝全經運空自在後得智無住行方以建立與瑜伽說何殊乃其義不傳印度遂有中觀紛執以迄於今亦憾事矣論文繁重今節録解經文句成二十卷以便研學中論頌一卷秦譯院刻本般若歷百八法而觀空中論示其方隅之作也緣起法如幻化而有自性執者蓋由取因假設為之論以假名成空滅除戲論要旨在此惟青目釋能得其意據無畏論銷文不逾規矩今應以唐譯般若燈刊定文義更於青目釋求其正解又可參考順中論瑜伽科四種解深密經五卷唐譯藏要本經解不了義佛語於空性義尤三致意焉三相以成無性七如以判勝義皆分別說空而示異於一切說也依他無執而知圓成唯識真如唯識所現此悉繫於瑜伽故分別瑜伽一品至詳且盡論之宗經中可見也經分染淨法為依圓而發起觀行必從依他著力此又旁通於大乘毗曇經矣可取宋陳異譯對讀瑜伽師地論本地分菩薩地十六卷唐譯藏要本瑜伽繫重心於菩薩地亦猶華嚴之有十地品也十法四周敷陳道果而獨詳明持法自種姓發心以至一切菩提分無不攝焉蓋三祇難行精勤不息必任持此心不失乃有堪能則捨六度萬行觸處憑依又何以致其操存之功歟此論可取涼宋異譯及大乘莊嚴經論對讀又宜參考瑜伽抉擇分真實品一段顯揚聖教論頌一卷唐譯院刻本攝大乘論本一卷唐譯藏要本顯揚宗深密經攝論宗毗曇經俱說依他為雜染而一則別淨法為圓成一則通依他有淨分立意不無微異矣顯揚以二諦立綱視慧度瑜伽為一此承前般若之說攝論由名言種而說自性緣起藉意言而入所知相此啓後唯識之宗學說潛移亦不可不知也顯揚釋思所成謂離九事攝論解無分別智謂離五相無思其所不思無分別其所不分別如此而已矣顯揚頌可取釋論尋繹文義攝論可取陳魏隋異譯及世親釋論合讀涅槃科四種妙法蓮華經七卷秦譯藏要本大般涅槃經正法分八卷涼譯院刻本三乘方便之義不著聲聞回大之事無徵則一切衆生皆有佛性亦未易言也法華於此著語無多曲譬而喻堪云涅槃之先河矣佛出世間唯一因緣開示佛智說法意無不慈而聞者或未能信以是究竟勝義垂滅乃宣涅槃卅二問最初長壽因緣即在慈護衆生又說一闡提於佛語無絲毫信受此與法華之義可謂後先相貫也惟一闡提窮極世欲故於佛語漠然衆生有佛性云者直下承當由己所欲而由人乎哉法華可以魏譯優婆提舍參讀梵藏僅傳略本今判為正法分先讀並以大法鼓經及本有今無偈論參讀楞伽阿跋多羅寶經四卷宋譯藏要本經依毗曇百八句推闡諸佛內證聖智第一義心原始要終為涅槃學之正軌唯佛與佛乃盡實際故經說自共法相一出於法佛等流誠所謂佛境也至以阿賴耶識解如來藏謂為善不善因及其致也心轉依而即真如亦即解脫三法會歸則又益窮勝鬘之奧蘊矣可用唐譯本合讀究竟一乘寶性論偈一卷魏譯藏要本涅槃宣說三寶同一性相常住不變論初三句抉擇此宗餘四句說性菩提功德業蓋又今本涅槃未傳之義也空寂與佛性一法而異詮斯乃說意之殊豈空性而外別有佛性也哉拘拘空有之見難以得其真矣頌本取釋繹文又可用佛性論參考戒律科一種郁伽長者所問經一卷曹魏譯院刻稿本經說菩薩二聚居家出家戒德行處各盡其極入道之實未容稍忽也出家功德殊勝而在家地亦可以方便度行學出家戒是乃不共之談堪以建立居士道場者也可用優婆塞戒經參讀此周要旨在於轉依道遠時長困行艱慮果何以增上相資習次兩書當有所得因明入正理論一卷唐譯藏要本思惟論議有軌可循則致用宏而事功倍因明其必學也方式運用或逐時推移而真實簡持酌中立說無逾於入論矣可用理門論參讀以盡其義大方廣佛華嚴經修慈分一卷唐譯院刻稿本涅槃經謂慈為善本慈即佛性誠哉有得於道心實德之言也唯心有慈乃不忍於己而難已於圓滿佛智之求不忍於人而弗捨於成熟有情之願菩提根本豈不在是歟修慈分說三劫廣行應修慈心以自調伏庶幾於菩提分安樂不疲處流轉中無感苦逼學者欲習增上止觀應知所務矣三周三周窮各科之究竟所習之書亦十九種毗曇科四種諸法集要經十卷宋譯院刻本阿含別裁有正法念處經晚世一分小乘之所宗也今準法句集其伽陀義本唯心說詳業感而以慈忍教授不捨有情推論至於六度亦幾與大乘相通矣可用念處經對讀入阿毗達磨論二卷唐譯院刻稿本四諦論四卷陳譯院刻本俱舍論出而有部經部學說變通各極其致二論略表見之入論視佛說為法句乃謂名句文身依語而生如智帶義影像而現儼然外宗是執自性實有之極也四諦論力反一切有說矯枉過正至不惜與分別論者合流而謂涅槃因滅為有餘果滅為無餘則又沈空之至也各趨一端迷途不反其難語於法界之真為失均矣論事標目一卷院編稿本論事為錫蘭今斯里蘭卡所傳小乘部執異論標目二百有餘一一據上座本宗破之今條列所破而諸家異義燦然畢見矣其中時出新說如案達派謂有生法二空中觀家嘗據以自飾其宗亦可見小乘之善變也宜與異部宗輪論對讀般若科四種大般若經曼殊室利分二卷唐譯院刻稿本法界以平等相建立惟甚深般若得之無住縱橫莊嚴一相此文殊學與龍樹無著鼎峙者也經謂法界即是如來更無所證我來親近專為利樂一切有情蓋由無得研窮乃能利生純摯言外之意不可深長思歟宜用梁譯本參讀佛母般若圓集要義論一卷宋譯院刻合釋論本論有二殊勝義文字般若之為法界等流也實相般若之為自性淨識也淨識其境法界其依而般若緣起源泉混混矣三十二門總攝經要差別十六空對治十散動瑜伽正軌不紊絲毫是尤難能可貴也今存三寶尊釋論可以參讀廣百論釋十卷唐譯院刻稿本百論廣破法自性執護法以真無俗有釋之最精蓋謂俗諦親證為先方乃起說意兼後得依他而有之也又謂俗有託佛悲願信順修行意不失於世出世間勝道也真無以端其趣俗有以得其通遂能生死蕭然利樂無盡此證性空最極善巧者又豈徒託空言一法不立已哉晚世中觀亦以二諦為說紫朱鄭雅應知有辨矣可以百字論參讀大乘掌珍論二卷唐譯藏要本般若而瑜伽一相而三相說固一貫也空性實然而於有情未能恝置其立說之大本一也空不異色妄法是常依他後得之必為利生所據又一也清辨獨以中觀標異緣無所緣行無所行蕩然無寄一往趨空是齊末之玄談曾何與於實際正學銷沉竟與噲伍馴至分河空有視若固然亦迷倒之甚矣今附其書掌珍於末以見異萌之田應加料簡而已瑜伽科四種華嚴七品頌本三卷唐譯院編稿本展轉一心深入法界此菩薩瑜伽之極致而華嚴所備詳者也今以十地品為總樞取三處讚及十回向翼其前如來出現及普賢行願從其後各集頌文以便研誦蓋倣龍樹婆沙但釋本偈之意也回向所以連一心於法界出現又舉法界以感赴有情法界緣起之義由此見之矣頌文仍用長行繹文而讀觀所緣論釋一卷唐譯藏要本唯識觀行之所據萬法備於一心而已法有待於心緣緣有待於心現故內境建立又最為根本之義也意識繼前五識而起不能徑緣外色護法釋特簡別之根境互因而本識功能渾然無跡又別具深意焉孰謂此師立說遂支離滅裂歟今傳譯本不全應取陳唐兩譯論文合讀得其全蘊成唯識寶生論五卷唐譯藏要本能所唯心現此無境唯識也貪信亦唯心現此染淨唯識也徒解無境不謂之善住大乘深識愛源唯自心而後謂之善住也此護法之所以釋成二十唯識者也省識心源兩離欣戚殷勤意樂度極無邊此清淨方便而為善住也由是而友教有功身語成業以至他心得實佛境是歸唯識之要均確然可指斯之謂成唯識也未有至誠而不動者求其在我而已矣論文殘缺應以奘譯二十唯識補之成唯識論節本四卷唐譯院編稿本有成唯識而不足以見護法之真此旁論深蕪師說雜錯為之障也今準頌本略刪節之則可觀矣唯識以染淨立極染淨唯意識憑依故由習氣濁心能所自轉而說二取有異於二分由內外取纏而說自證是而證境非由所緣非離自性而說境不離心心亦不離心由見真而了幻遣實而假詮而說識現非真亦可安立致用是皆護法創義一一取證於密嚴以成之者密嚴善淨賴耶等同法界之極唱者也護法所宗豈不在斯歟唐譯頌文多所改削可取轉識論刊之涅槃科三種大方等大雲經大衆犍度一卷涼譯院刻稿本此為涅槃經之別裁以百千不共法門宣說衆生實性佛性常住傳譯未全今取初品存其綱要經說佛以法界為身法界等而慧等而後悉施衆生服甘露味是則涅槃之有緣起固不外乎法界緣起也大乘密嚴經三卷唐譯藏要本佛地經論七卷唐譯藏要本二經均說佛之所以為佛者又均以覺與所覺說之密嚴窮其源故曰善淨賴耶佛地極其致故曰清淨法界其實一也賴耶為瑜伽行境以無相為指歸衆生之所以合於佛也法界為聖智所緣由平等而顯實佛之所以契乎衆生也此生佛交感為一法界者也無相平等云者遍如虛空法乃成用繪事後素必有以為之質也識淨而知心同界淨而知理同入道之要亦以賢聖之心為心而已矣密嚴見護法所宗佛地存戒賢緒論那爛陀學之重涅槃也至矣盡矣蔑以加矣戒律科二種六度集經八卷吳譯院刻稿本菩薩戒學之難以其精神貫徹行事之難也長劫三祇受生千萬學處不廢六度即六度皆有難行此釋尊往事之足徵非徒載之空言也今習集經以知其概本事本生繫之律藏從毗曇家之所判也可以菩薩本生鬘論參讀佛所行讚五卷涼譯院刻稿本釋尊行事五部有共同之說馬鳴能文略藻飾之遂以傳千古矣隨緣起化事本不常而一期行跡真誠流露小宗所見雖淺亦多所啓發也援本事例附戒律科末習之可與宋譯本對讀是周義理以一法界為主學不能已於利他也長養菩提資糧善集亦有方便之書應知研習集量論釋節本六卷院編稿本陳那自輯量論所以為深入佛說之門也佛語所詮無非遮說集量發明比量因喻用在簡餘遮詮顯義故以意逆志而般若非執瑜伽離言涅槃無倒二以貫之矣可用理門論對讀大集虛空藏所問經抉擇分三卷唐譯藏要稿本大經之有大集亦猶阿含之誦八衆問非一義法非一途所以結衆會之終也虛空藏問以三十五義抉擇概括正宗罄無遺蘊而入般若理趣平等甚深入瑜伽理趣亦乎等甚深菩薩所行同於涅槃入法界理趣又無不平等甚深通習各科善知抉擇捨此無由矣五科佛學各以義理推闡遂時開展故必歷三周而盡其學合五科而識其全經之緯之成章以達此純異乎判教之陋說也所習五十書時有一二精義足以省發華鬘莊嚴此學乃益深切著明融洽身心不離塵濁以曲致其運用由是學者道為己任而自成剛健篤實之風則千百年來此學交困於神祕虛浮偏枯滯寂者必可一旦昭蘇復以真精神著見於世今茲講習所以植院學之基即所以立此學之本關係至重願共學者知所勉焉一九四三年九月稿
