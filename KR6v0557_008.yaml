body:
  text: 能斷金剛般若經講要般若諸經以大般若第二分即大品為主幹金剛經則其根本也龍樹判大品前後為兩道般若道以善現般若為主經有明文推重所謂菩薩般若當於須菩提品中求也善現之精義此經即盡攝之又方便道與般若道次第相生而方便為究竟方便二十一品之要旨此經復井然備之故治般若學者以此為挈領之助便利無窮金剛經流行於印土之時代已不可考但勘之什譯二分般若有金剛品立名取義均與之相關可證其與二分並行流傳甚早也奘譯新本般若出即已面目全非不如羅什傳龍樹學心知其意猶能存古也逮彌勒無著世親時猶相繼注釋直至奘淨兩師抵印仍及見其盛是又足徵此經在印流行之久至於傳來中土自東晉迄中唐三百餘年間前後凡經六譯元代尚有據番本重譯之者此經創譯於姚秦羅什什於弘始三年入長安翌年即出之當時應有講述惜其門下僧肇之注不存莫得其詳但經文流布後影響甚大梁開善智藏當時三大家之一因持誦獲福延年廣加倡導信者日衆昭明太子又科判為三十二分益便誦持後百餘年菩提流支東傳彌勒無著學亦於入洛之翌年元魏永平二年重譯此經並出世親釋論與金剛仙論而後義學愈明繼此歷陳隋唐各代迭有翻譯其為之注疏者至唐已達八百家宋人所集舊疏今猶存五十三種是經流傳如此宏遠自有其不可磨滅之價值在絶非偶然也此次講本於六譯獨取淨譯以其翻出最晚深諳舊譯得失而去取特精也清人通理著金剛新脈疏即嘗推重之謂能去奘師之泛存什譯之妙文足傳神義無欠缺云云今謂淨譯最可貴處在能傳印土當時所宗之本學有所受非同泛泛不但譯筆謹嚴而已餘譯中有隋譯為未加修飾之原稿唐人稱為直本由以見梵本之面目可資參考又注疏中印土著述有彌勒頌世親釋及無著論本世親釋兩種今並取之但講意側重於會通方便般若二十一品之精義此乃中印注疏家所未嘗道及者並不拘合於古注先譯經名具足稱為能斷金剛般若波羅蜜多經無著論本七句義中最後一句即釋經之名義唐賢窺基圭峰皆用之唯隋譯無著論文字晦澀解者不免穿鑿今須校刊藏譯始得其真梵本經題原為能斷金剛無著解之分為二番一依能斷意解般若為菩薩行之導首具有能斷之力所斷為何即與正行相俱之見及邪行見也一切邪行以煩惱身見為首是為邪行見菩薩種種散動分別即是法執為正行見正行見難知平常不知為見邪行見難斷感根深固非具極細密極堅牢之性如金剛者不能破壞細者智因故能知所不能知牢者不壞故能斷所不能斷般若行中聞思修慧即具此金剛之性而有能斷之用亦是金剛亦是能斷故謂之金剛能斷也二依金剛形象解如畫金剛杵形兩端寬廣中間窄狹以象菩薩行地前地上歷時久遠範圍甚寬而入地一段僅一念頃為時極促也地前為勝行地論譯信行地必於義理決定毫無疑惑此非易事故須時長遠地上之行凡佛所具皆應具足分分積集以至圓滿亦非歷劫不為功唯中間入地意樂清淨即淨心地一念間染淨俱離現觀實相為時短促故極窄也此借金剛杵形以況菩薩行初中後廣狹之殊與前番從能斷義立説者又不同也次釋經文三分序分與流通分例同餘經可不贅述正宗分依無著判又為三段分配七句義之前三句一種姓不斷二發起行相三行所住處一種姓不斷者此經全部詳般若行三世諸佛皆由此行而得成就如是展轉相承不絶依佛家言世必有佛佛不常住如是佛佛相承有似儒者先後聖之繼起佛種乃不斷矣經首妙生讚佛善攝善囑二語即揭示此意無著論本特為提出蓋以示菩薩行之根源也二發起行相者菩薩自發心以至成佛皆行般若行而有總相為之依緣經文妙生三問云何住云何修行云何攝伏其心即其相也三行所住處者般若行以三相為依進而求次第亦如戒學之有學處而得種種住處焉依無著釋住處廣有十八略而為六今以六住處分攝地前入地地上三段攝波羅蜜淨欲離障四住處屬地前淨心住處為入地究竟住處屬地上從初發心以至成佛盡於此矣一序分如是我聞退坐一面文義明顯略不詮釋二正宗分三一佛種不斷爾時具壽妙生在大衆中能以最勝付囑囑諸菩薩佛於弟子根已成熟者轉法輪時能以五句義發起行至地為最勝利益益之其未成熟者則涅槃時以五句義為最勝付囑囑之為其不退之因如是攝受不捨故佛種不斷二發起行相世尊若有發趣菩薩乘者願樂欲聞三乘菩提以菩薩為勝佛種不斷實有賴於菩薩乘之發趣也云何發趣行耶此有三問以一應字貫之隋譯依原文直譯故三問有三應字應住應修應攝伏皆行之總相也龍樹智論四十二釋以念修住三者初念謂分別取相正分別非顛倒必先於事菩提等功德事了知然後心有所繫念茲在茲次修謂與定共行若心散亂則不能相續復習行與定俱相續一境是之謂修三住謂得道不失善能服膺護持之又從無著論釋住者謂行之發動即心之欲願先於勝法有欲求願望乃能作意住彼也修行者釋同龍樹即相應三摩鉢底等至與定心俱行也攝伏其心者於出定後折伏散亂之心制令還住也如是三者顯示行之全部過程復名三道初攝取相法為攝取道次由修無分別定成滿為成就道三謂服膺不失為不失道一切菩薩行皆不越此三種層次三行所住處六攝住處即發心住處佛告妙生若有發趣菩薩乘者當生如是心更求趣想故行所住處首標發心者認得此心而後住修攝伏諸事乃有所依也佛言當生是心又以當生二字提起願望必自覺有此心而後此心始存也經説心之所緣有二句一謂所有一切衆生之類我皆令入無餘圓寂涅槃而圓寂之二謂雖令無量衆生證圓寂已而無有一衆生入圓寂者此皆菩薩發趣當生之心就總相説曰衆生之類即指一切有情識知覺之生物就差別説又分三類以受生判為卵等四生以依處判為有色無色無色者細色也非色全無也以取境判為有想無想非有想非無想心思構畫為想此亦有粗細之別無餘圓寂異於方便及有餘乃有情真實安隱歸宿之處有情流轉生死原屬不安且非得所故當令之入圓寂安隱處所云寂者即去其不安之原因也菩薩雖發此心而無我見以平等心等視衆生離自他差別之想視有情事即己本分事有情即我一有情未成佛即自我未入圓寂也若有衆生想則我想自體我執有情想我所執壽者想乃至一期壽命住執更求趣想命根既斷轉趨後有執諸人我想展轉相生無有窮盡不復成為菩薩矣以此段對勘二分般若實賅攝其中金剛品一品要義彼文詳載須菩提問何故名摩訶薩佛答能發不可壞如金剛喻心是心堅固不退而有十相一者我當於無量生死中大誓莊嚴二者我當捨一切有三者我當等心於一切衆生四者我當以三乘度一切衆生入無餘滅五者我度一切生已無一滅者六者我當了解一切法不生相七者我當純以薩婆若心行六度八者我當學智慧了達一切法九者我當了達諸法一相智門十者我當了達乃至無量智門此中前五對有情後五對一切法但二者相關先須興出離流轉之想披功德鎧大誓莊嚴非有大力不能出離欲令一切有情同其出離有此實感乃能捨一切有能捨則心自平等於一切衆生皆能滅度而無自他差別之想但此必須於一切流轉法徹底了解不生之相不生云者謂如幻師幻草木為象馬隨因變化非自然生此不生之相須於一切事上體驗即以面向一切智智之心行之於六度行與智應而得之亦即六度賴般若之導引了達一切法所知通相一相與所知別相無量相也十心次第相關如是如是菩薩發心正如儒者所言尚志佛之攝益付囑於菩薩者莫先於此有金剛喻心而後有金剛喻行乃至佛之成佛最後一念亦為金剛三昧所得智慧即金剛般若是則始終展轉不離此一大心矣今經於發心但舉十句中間三句以平等一體之心又為十者肝髓也須菩提般若精義萃於金剛品此段抉擇益得其要矣波羅蜜淨住處復次妙生菩薩不住於事應行布施所得福聚不可思量亦復如是菩薩發心以後所事不出於六度四攝但須清淨無著始成方便龍樹智論謂方便為智之淳淨者即無著不住也心經云行深般若波羅蜜深字即指方便今經云應行布施所以示六度之發端意實攝餘五度住者取相有著行施而於事取相著想則所得果報限於人天之有量福德不能積集以趣證無上菩提若能不住於事隨處五塵法乃至相想則施福喻如虛空任舉一方皆不可量始為菩提資糧也行施如是其餘五度亦然此即波羅蜜之清淨義上文所言般若行之總相每一住處皆含有之如第一發心住處經云當生如是心即示住相菩薩有衆生想則不名菩薩即示修相謂應無想而修也由有我想等即示攝伏相此中住指行之發起修明反復修習攝則遣除散動收攝不失也今第二淨度住處三相者經云應行布施即住不住於事等即修乃至相想亦不應住即攝伏也又三相之修就所對言七句義中別開為第四對治句所治為邪行正行二見今以施言菩薩以不行施為邪行能行施即邪行見之對治也然行施而住於事等即為散動分別為與正行相俱之見不住事等即正行見之對治也對治二見乃盡修義全經言修皆準此又三相中攝伏就所離言七句義中別開為第五不失句由離二邊護持所修使不失壞通常解離二邊為中道尚覺空泛按實則依義不依語而已謂必與實際境界相應不可徒在語言文字上揣摩也依語則隨語執有自性不知其語為衆生施設原來非有也但施設亦有自來即離言自性原來非無也惟依離言自性義行施與實際相應方為清淨具此正見而後心有散動隨時能收攝矣經中各段佛説即非與是名云云皆明此義又彌勒頌世親釋謂妙生三問祇有此一段為總答發心數句答云何住不住事等行施數句答云何修行乃至相想亦不應住答云何攝伏答問之文止此自下各段則皆斷疑事發心即住所餘不外依此展轉相生增上而已此解自亦可通但今據無著論不取其説復次此段與大品般若相關之處即在不住於事而行布施不住為須菩提般若之精義佛命須菩提説般若謙讓而後説不住法門故大品所談要不外此也又本經以下諸段各各與方便般若二十一品立義相當方便初無盡品次攝五品皆説六度甚深如虛空無盡即此經所説不住行施福聚如空難量彼就因言行無所著難知如空而無盡無盡故方便甚深成滿勝義今就果言則無盡難量也又攝五品説依一度作甚深行而賅其餘五度即本經之説布施以概餘五而無著世親兩論皆以六度入施釋之也欲住處妙生汝意云何可以具足勝相觀如來否應以勝相無相觀於如來龍樹智論九十四云菩薩大悲化衆應具色身相好示人勝儀引生敬信是亦化事之不可缺者故此經第三住處即説菩薩行六度而得佛身色身法身之所由本段先就求佛色身行言經中妙生答語深得佛旨謂佛説勝相以引導衆生非即如衆生所執而實有其相故云勝相即非勝相也佛廣其意謂衆生煩惱身見為首以佛勝相破彼染執其實是假故云所有勝相皆是虛妄應以勝相無相觀於如來始得勝義離言自性而對治之也此段具上説之菩薩行三相者不以勝相觀屬於住所有勝相皆是虛妄等屬於修應以勝相無相觀屬於攝伏也以下各段例此可知次求佛法身行有二一言説法身二證得法身妙生言頗有衆生於當來世法尚應捨何況非法佛家計時以五百歲為一紀正像末法歲各五百後五百歲即指末法也其時法既衰微故妙生疑問是經所説句義尚獲有生實想否佛答凡具戒德慧菩薩皆生實想以彼等已於過去無量佛所廣植善根佛亦於彼等悉知悉見護念不忘也此段與方便般若之方便品相當彼處詳言菩薩由無量劫供養承事諸佛廣植善根故能行於方便又謂佛常護念諸菩薩皆與此經文義相通又佛所説法即是法身法在即佛在也菩薩於法具真實想復於無量佛所多植善根乃能如説奉行而得生現生攝當得無量福聚蓋其依教修學遠離人我分別及法非法等想是故功德難量也此中法者指事蘊處界等想者指名有此事謂之法無此事即非法有此名謂之想無此名即非想事名有無四類皆於境界上分別諸餘區別悉攝於此我等想者即於五蘊等事上所生增益之執小乘已離此增益不作我想但常聞説五蘊等故遂生事想不知事我相待而成表面雖唯事想實則我義隨逐隱伏但不自覺耳故所觀察仍屬粗淺菩薩用心深細既知法我相待有法想即有我執且知無法想亦不究竟以法想之有無仍相待立細微法想仍存必於境界非法想非非法想始成實想無著釋此義云第三無法想轉此猶有法取有法取者謂取無法故謂無法想即有法執無法有法相待起故此如先有五蘊等法而後云五蘊等空是意許有蘊而説之為空所以經云不應取法不應取非法菩薩離我於法非法皆不應取如來於此深義説筏喻法門佛所説法喻同於筏既濟流轉大河筏亦應捨以其為方便不可執菩薩欲求佛法身依教修學必如是了解方能如教而住是為莫能存續佛之法身者下證得法身中先就智為自性之證得説妙生汝意云何如來於無上菩提有所證否皆是無為所顯現故上説如教修行是説行道今云有所證否是説證果菩薩既如法行究有所證有所説否妙生深契佛意以為世俗有此欲願而勝義無證無説一切聖者不過據無為法之開顯而安立即從開顯淺深差別之耳無分別為有學如性清淨而為無學無為之法非道所生有佛無佛法爾常住何有所得而謂所證所説耶此段與方便般若三慧品義相當般若謂菩薩之慧為道相智聲聞慧為一切智佛慧為一切種智由此道趣證無上菩提乃如實際如性法性而得如我衆生等性而得無所住於實相作證法固不可得也道無法涅槃亦無法道之所緣無為為義無增無減不作義非義分別但從世俗諦以無為法作聖果差別以示分位而已實無證無説也次就福為自性之證得法身説妙生汝意云何若善男子善女人説非佛法是名佛法此中所説福德是於事上顯示實相若於所説言詞妄生執著何異扣盤捫燭耶菩薩誠能理會實相則此福德實為甚多然與持誦此經乃至四句偈印人計字法以三十二字為一偈而能為人説者又弗如也蓋由言説法身而生福相證得法身彼布施功德終可計量而此法施則無上菩提諸佛世尊悉從之出佛佛相生展轉無窮德可量乎經説非佛法是名佛法則又以遣法施之名字計執也菩薩求佛法身諸佛以法為身至此方為究竟本段與方便般若中道樹品菩薩行品相當道樹品言不得衆生而為衆生求菩提如植樹空中求生花果實為甚難故經就福德喻説其難能也有疑衆生不可得福德云何有應知以福德為福德則不可得若作方便仍有福德因果自然所以利益有情也二乘昧此斷惑證道棄絶人世遂無福德可言菩薩大心留惑不證願與衆生作不請友自有福聚方便也此品説為衆生行次菩薩行品乃説菩薩行佛之所行皆所應行一切佛法無非菩薩境界但無得失損益計較行所當行得真實相斯可矣離障礙住處前三住處已概説菩薩行此下側重離障入道以前雖波羅蜜淨知求佛身而修行過程中障礙尚多應分別除遣諸障細別有十二門約為二類前十在加行位前順解脫分後二屬加行位順決擇分加行云者鄰近證道策勵加功之謂也妙生汝意云何諸預流者頗作是念是故説我得無諍住加行以前十障言其根本慢障而已慢即執以為實之增上慢此屬菩薩行之大障妙生由小入大善解空故無諍第一今就近取譬舉小乘道果為例小果初斷見道所斷惑者為預流次斷修道所斷欲界六品惑者為一來三斷欲界九品惑不重生欲界者為不還四斷修所斷上二界惑淨出離三界為阿羅漢諍者障之異名有二障在則以為於果有得易起我法實有等執而為一切慢之根本惟解都無所得成無諍住者乃能離之妙生即以己事為證也妙生於汝意云何如來昔在燃燈佛所實無可取次離少聞障雖知遣慢而離群索居孤陋寡聞是慢根猶未盡也佛之圓滿菩薩行在於多聞然聞而有得則非多以於法有取故佛於燃燈佛所無取無得遂成多聞不如言執著以少為足也妙生若有菩薩作如是語我當成就莊嚴佛土不住色聲香味觸法心第三離小緣作意障所聞雖多而作意攀緣心量有限緣境狹小亦足為障莊嚴國土一語之所指在於一切清淨並莊嚴之想亦無之然後始成真莊嚴菩薩生心動念皆不應有所住前説行施不住就不住事言今説不住則就不住生心言生心無住其量自廣則不以事為限得離小緣作意而入道矣第四離捨衆生障多聞廣緣若為自利仍為大障應遠離之佛説大身非身者意謂菩薩為衆生而受身非為自私不厭其大如是隨類受身皆能為尊為首為導也以彼非身説名為身者顯示了知法無自性不以此身為私故能成其大也妙生於汝意云何如殑伽河中所有沙尊重弟子第五離樂著外論無實障世間有種種學問但按之空洞無用而常易惑人菩薩於此不應樂著推之名利恭敬皆須遠離河沙福聚不及受持此經一偈為人解説者此經宣説諸法勝義能生實信較世間一切自然遠勝也制底謂過去佛塔世間尊敬處諸佛從此經生故經之所在尊同制底也以上各段對勘方便般若可見初離慢段與三善品相當般若謂種善根而無方便尚難得菩提何況不種種善根有方便即了知諸法無生不取果報反此為增上慢雖種善根無益也小乘且知有慢不能證果況求證無上菩提乎次離少聞等四段與遍學品相當菩薩為求一切智智故應遍學遍學根本在得諸道然不以四句得而以無法即無戲論得如是為遍學乃離少聞障也戲論者隨處心有所執之謂如本經云我當莊嚴國土之為妄語也菩薩不住事等生心乃得離小緣作意障如是學超二乘以成佛為的故得大身以無自性為方便展轉增上而悲願益切乃得離捨衆生障最後校量福德顯示外論無樂著之價值菩薩雖遍學之而了知無實故不執著以是離樂著外論障是皆菩薩遍學之事也妙生於汝意云何頗有少法是如來所説否佛説非界故名世界第六離影像自在無巧便障影像為菩薩觀行所緣境界菩薩緣境須有自在巧便了知境由心變不可心隨境轉菩薩所念無非法世佛三者欲於此方便自在必先了知影像之實相如緣法時應知無有少法是如來所説以法之實在有佛無佛法爾如是非關佛説始有但由佛説而顯故有四十九年不説一字之語明乎此乃能於法自在巧便又如緣世應知器世間析為微塵即無實在無著釋為細作方便又有情世間一由所緣生起之不實二由佛説名言之安立亦非實在無著釋為不念名身方便如是了知乃能於世得自在方便也緣佛見次段妙生於汝意云何可以三十二大丈夫相觀如來否是故説為大丈夫相第七離缺福資糧障生而不知是為無福故念佛為集福資糧然三十二相乃佛隨順衆生心境而示現佛之所以為佛者在法性而不在色法故言不應以三十二相觀於如來也此又有待於精進故次段以離懈怠為教妙生若有男子女人是故名為最勝波羅蜜第八離懈怠利養樂著障懈怠由於樂著利養故佛特提此法門之殊勝以策勵精進用恆沙身命布施其事難能而受持此經一頌為他宣説之福有勝於彼經意顯示惟有能捨恆沙身命布施者乃能如説修行堪受此經趣等正覺此經處處提示趣向究竟法門就施言則以無所得為歸非深解義趣不能受持菩薩以無所得心捨恆沙身命而行施豈小乘拘拘自了所能幾及者宜妙生聞之而感動悲泣也佛於此説經名顯示般若總攝一切菩薩行得趣於究竟然説般若波羅蜜猶屬名言不可執名而妄生分別故曰即非般若波羅蜜妙生引申佛説顯其了解佛意至末法時尚有能信受者況當正法時而可懈怠不生慚愧乎佛可其意更告以聞經不布第一希有謂聞無所得空而不驚怖乃能發起精進也此最勝波羅蜜為無量佛之所宣説行者於此能實信隨行便得離懈怠利養樂著矣以上各段勘與方便般若三次品相當般若謂菩薩行為次第行凡有二義一發心以來以六念為易行次第易行謂行之無弊者六念即念佛法僧施戒天與此經念佛法世等義全同二次第行者自行教他讚事勸人需大精進乃可成辦即此經之離懈怠利養樂著也又次第行不離一切智智相應之心是為精進之根本義菩薩一切行無不有此用心在如是自能精進不息新學漸行隨順佛説而得順忍即此經所謂諸佛離想與聞經不驚不怖不畏也妙生如來説忍辱波羅蜜多菩薩不住於事應行其施第九離不能忍苦障前説離懈怠以勗精進但精進須出於自然此則有賴乎忍忍兼身心而言不但身能忍苦此心於甚深法義尤須諦信不移但存忍想以行忍其力甚微故如來説忍即非忍也次引述本生過去於深山修忍辱行為鬥諍王割截身體王偕宮人入山宮人於王倦眠時瞻禮忍行仙人王覺尋至其地詢知其為修忍行者乃割截其肢體仙人無所動容且謂將來成佛時當以智慧劒斷王三毒云當時不起我等想即無所謂忍想亦無無忍想此心安住不動故無嗔恨之想多生作忍辱仙人亦復如是如是心得無生無起法忍知一切法如幻化遂能行忍而無忍想乃真實為菩薩行矣是故行者應離諸想苦想無著論釋有三類一流轉苦二衆生相違苦三受用缺乏苦發趣無上菩提而無所住此所以對治不忍之因佛自釋不住色等有二因緣一者無法可住知法本無可住二者不應得少為足菩薩本願發趣無上菩提未達究竟無所應住此對治流轉苦復次六度中舉施為例菩薩為利生而行施不應有衆生之想而生瞋等未得法忍未能離衆生想則應隨順佛語經説如來是實語者就世諦説如語者就勝義諦説不誑語者就世諦修行染淨説不異語者就勝義修行染淨説皆與實相相應佛所説法不如衆生之所執故非實隨順實相故非妄此對治衆生相違苦菩薩不行施不能證實相行施而住於事則如人入暗迷行失道不住事則如人有目日光明照見種種色此對治受用缺乏苦布施如是一切行應無所住亦爾勘此段與方便般若一念具足等三品相當初一念具足品謂菩薩行般若行不離不二相則能一念具足一切行以一切行同一不二相故般若謂由生法二忍具足一切行即此經所説忍波羅蜜義也般若所謂不離不二相即此經我無是想亦無非想不應住法不應住非法龍樹智論釋一念謂菩薩得無生法忍斷一切惑除諸憶想分別安住無相心中不見三輪是名不二相蓋有此無生法忍之一念即是不二即能具足一切行次是故應離諸想發趣無上菩提之心以下與般若六喻品相當般若謂一切法如夢響影焰幻化此釋諸法一相無相云何差別之疑謂此差別乃就衆生所見而言如遠望雲霧樓閣山城若有所見近則無覩在佛一相無相而衆生取著於相有種種不同菩薩行住五陰如夢幻空法中行雖行諸法具足波羅蜜而不妨於空此住無所住即此經應離諸想發趣無上菩提之意也次是故應無所住而行布施以下與般若四攝品相當四攝以施為首賅攝餘三菩薩之行四攝不住果報無所執受但為利益衆生如是行者能得一切智智謂與一切智智相應也而於諸法無不照明依龍樹釋即具足成就之意即此經不住事行施如人有目見種種色之義也妙生若有善男子善女人能於此經受持讀誦不可思議所生福聚第十離缺智資糧障菩薩之得無生法忍有賴於智慧之積集如人有目日光明照即示有智慧而行布施之效云何積智資糧則在如説而行得五種功德是行廣即無量略則為十種法行如是漸與佛智相契而得佛之護念故佛悉知悉見此為第一如來憶念親近功德又當生當攝無量福聚有福然後有智無量劫以身布施不如聞此經典不生毀謗何況受持解説以此能為出世因堪荷如來無上菩提故也此為第二攝受福德功德又此經有不可思稱功德且針對凡小專為發最上乘者説凡小智劣於此福聚不能思議稱量此為第三讚法修行功德又經之所在必有受持之者法之流通至為重要故天人等尊同佛塔此為第四天等供養功德乃至受持而遭輕辱能盡惡業速至菩提此為第五滅罪功德此上積集智慧資糧行因求智慧之精微故不厭積集之深厚此加行前所有事難可為喻藉福聚之增大以況之所説福聚展轉增勝極至於佛之所行皆就利益衆生而言福非為己佛行之殊勝亦緣利生之廣大無量耳此段經文即從般若四攝品法施財施之義推闡而生故與彼品經義相當今不煩釋已説離加行前十障次説離加行位二障加行以前為信解行至加行臨入證道乃著重諦察為諦察行如人入室必先審察以得其門也以是此位諸障亦異於前前粗此細細故難知今詳示之復次妙生白佛言世尊若有發趣菩薩乘者實無有法可名發趣菩薩乘者一離證道時喜動障臨證道時每以自得而歡喜散動按實即微細我慢也妙生問與前同其意則異前問屬於勝解功行已成過去臨證復生疑意窮究所證是否實自有之此問即諦察問也佛答實無所謂自我之法發趣菩薩乘者蓋前勝解時雖無住生心而不知不覺間仍有發趣大乘之我執在微細我慢潛伏而不自知即未究竟離障臨實證時方知無法發趣大乘正所以對治證道時喜動也此在四加行中屬暖頂位頂即忍惟審察之究竟處菩薩至此常因法愛致成頂墮惟了知實無有法可名發趣菩薩乘者乃得離喜動障而超越之也妙生於汝意云何如來於燃燈佛所如來説一切法者即是佛法二離不成就教授障臨證道時謂實有所證仍是微細我慢於無法可得猶有未徹成就教授而後洞然教授即授記也釋迦最後於燃燈佛所得授記而悟實無所證蓋如來者真實如性之異名即於真實如性上安立一切法性常不變異名如佛從此來故名如來但法性為二障所纏而不現雜垢清淨乃見真實無倒是即真如清淨法性也但稱法性祇名為如清淨法性則名真如依無著釋如金在礦但有金性提煉清淨始名為金如來即於此上安立名言若謂如來於此外別有可證是如來與如為二即成異法是為妄語是為戲論故此所證從戲論看則非實從實性看則非虛一切法是佛法皆是如性清淨所開顯故非法者謂無有離法性之法必於佛説有此信解始為成就教授此相當四加行之忍世第一法忍謂與印定道理實相相順之謂菩薩於此道理觀察必至甚極然後能除二障至於證道勘上兩段經文初與般若善達品相當般若謂菩薩行如幻人所行以善達諸法實相雖無有衆生而為衆生行道若有少法可得則菩薩行為徒勞不成其為正覺此去我障次與般若實際品相當實際即法性菩薩行與實際相應須親近諸佛聞性空教然後行之不失薩婆若此經之成就教授雖無法可證而得燃燈之授記即順性空教而行入於一切智智海也此去法障淨心住處此住即現觀亦謂之證道此有總別二相由信解而先證得全體總相其後分分圓滿即別相也淨心住處偏就總説究竟住處偏就別説皆證道事也總者得其全即無不具足又全則能容一切兼有廣大之義因此具足廣大之境為現證自體故以身言之妙生譬如丈夫其身長大無壽者無更求趣長大之長是成長義所謂盡量充實也所證實際自性有具足廣大二義一切善根無有欠缺則得轉依故云具足一切有情攝為己體平等無別即成廣大就所證境界説菩薩行由初信解至此現觀乃實證之就能證言則不見有衆生亦無少法可名菩薩者蓋菩薩之理解無所得即其自身本性之無所得非由外鑠一經悟解即自離執也勘此段與方便般若具足品相當般若舉二義一以方便力和合行六度無不具足二菩薩心量廣大無法可得而能大誓莊嚴與此經其身長大之意相合龍樹釋之喻如市廛必須交易大心人則隨需即與不加計較此正菩薩行之廣大處乃內在不能自己之意樂行非徒理解空論而已究竟住處究竟住處總括地上而言菩薩入地即謂之究竟者菩薩法與佛法歸趣一致但分圓滿圓有異耳般若經以向與果及無間道與解脫道為喻因地上所求所得無非佛地皆屬究竟也此住據佛地分為六種圓滿所謂淨土見智福德身語意也初一為外餘五為內妙生若有菩薩言我當成就佛土莊嚴説名其是菩薩菩薩初為佛土清淨圓滿龍樹釋謂菩薩之求淨土為令衆生易度因佛土無三惡道所見所聞無非實相乃至風林水鳥皆宣法音衆生生此自易入道矣然佛土之淨以無所得而淨所謂嚴勝亦不如衆生之所執著菩薩以信解二無我理證無我法以是嚴淨佛土始得與佛之圓滿淨土相契此段與方便般若淨土品相當般若謂菩薩應淨佛土除自他身等粗業粗業者破戒起惑離道貪果乃至取諸法相皆是龍樹釋取法相謂於法性空中取相生著心謂為色乃至三界善不善有無為法等離此諸取乃能淨佛國土與此經信解一切法無性之義正同妙生於汝意云何如來有肉眼否現在心不可得二者見智圓滿佛之見智所謂五眼肉眼天眼業果與修果有異但俱以粗色為境屬於見慧眼知勝義諦法眼知世俗諦佛眼無所不知即一切種一切法一切相智也皆以心為境屬於智合此五眼為佛見智此皆用以教化利樂衆生者恆沙世界衆生種種性行其心流轉當下意念皆悉了知然後隨其根性説法順導也此在常見為不可能惟佛智得總持而後一以貫之流轉之謂相續相續故無持衆生不知妄執為常然流轉名亦隨世間言説假立如來知其無常不可久住順其實相依世言説故以無持而説心流轉也梵文陀羅有持與轉之二義今以非持説轉去衆生之執即於此心法名字上顯示實相也此等微細處淨譯頗能曲達如前文福聚之聚字梵文作塞建陀有肩荷與積聚二義平常福聚不能肩荷無上菩提即謂之非聚無荷屬於福類又謂之聚此以無荷説聚義例正同下面説三世心不可得正以顯心流轉之無常也此佛之圓滿見智地上菩薩由修而得之妙生於汝意云何若人以滿三千大千世界如來則不説福聚福聚第三福德圓滿就世俗言福聚甚多就勝義言則不成其為福聚佛之福德圓滿亦然妙生於汝意云何可以色身圓滿觀如來否是故如來説名具相第四身圓滿佛身具足三十二相八十種好乃隨順衆生而顯若從勝義不能以色身圓滿隨形好與具相三十二相觀如來也此諸相好入地菩薩皆修得成滿以上三段與方便般若畢定品相當般若謂菩薩入地後於佛道得決定隨類受生與佛相似不虞退墮於諸衆生作大義利又謂行般若行生神通波羅蜜即智證通智善通達而得無礙知一切衆生心意性行隨應教化此經就五眼説在佛為五眼在菩薩則為五通也又般若謂具神通波羅蜜者便能往諸世界見佛聞法福德相好皆得具足與此經説福德身相圓滿之意正同妙生於汝意云何如來作是念我説法耶無法可説是名説法第五語圓滿此就説法言之佛之説教隨順衆生契當實相所説圓滿而不以為有所説若言如來有所説法則為謗佛亦即戲論也無法可説是名説法者如實相説雖説而無所增益實際等於無説也説法如是謂之圓滿地上菩薩亦可分分得之此段與方便般若差別品相當般若謂諸法性空而有四諦安立者是佛方便為衆生説之實則無法可説也正與此經意同妙生白佛言世尊於當來世頗有衆生説非衆生是名衆生第六意圓滿又分六種其一就佛意之在衆生言佛常以衆生為其念處衆生於法能生實信即為佛所繫念知見是人但在佛並不作衆生分別亦非非衆生勝義中原無此等差別也妙生於汝意云何佛得無上正等覺時如來説為非法故名善法其二就佛意之在正覺言實無少法是佛所證無上正覺係就衆生所知者而假名之無上之梵語曰阿耨多羅義即微細不可得正等覺之梵語曰三藐三菩提三字有等遍二義等覺者諸佛所證是法平等無有高下故謂之遍所離無我衆生等流轉性與菩提性亦平等遍覺者一切善法皆正覺了故謂之遍然此隨順衆生依世俗言謂佛得無上菩提依勝義言一切諸法無有自性實無少法可證也妙生若三千大千世界中所有諸妙高山王故名愚夫衆生其三就佛意對於衆生施設義利言此經法門於世有大義利比之施福遠為殊勝經云曾無有一衆生是如來度者佛心如境如實知見既無通途之衆生執故亦無我等見又佛説法所以安立衆生於實際而衆生本當如是覺之使自得其所乃分內事實無所度也若有度生之見存則我等執隨之而起矣我等見固無無我之我等見亦復無有而佛説我等執者乃隨俗而説非如來説實有此我等見也是故佛説善法所以導引衆生住於實際説不善法亦但如衆生所執隨順言之乃至所謂愚夫衆生亦皆假名施設而已徹底推究説法之意方知佛説皆為不得已之施設也妙生於汝意云何應以具相故彼不能了其四就佛意攝取法身言佛持法為身此法即法性真如實際故不應從世諦禪境以具相觀於如來也所謂諸相非相非無相也乃以法性等為相也蓋佛緣是所緣非因緣法性而生以法為身故云應觀佛法性即導師法身也然法性離言説思惟但可內證非於色聲上可得而識故云法性非所識故彼不能了也具相亦非得正覺之因故次經云莫作是念如來以相具足得成正覺今譯缺文妙生諸有發趣菩薩乘者不應越取是故説取其五就佛意不著生死涅槃二邊言發趣菩薩乘者於法住法性不作斷滅見而視一切流轉如幻如化以之為用即不住涅槃然在用中於無我及無生法得忍解非流轉法自體為無我不從業惑生為無生能於恆沙七寶布施不取福聚即不住生死又不取福聚云者乃佛説法異門方便先除執著後顯正理所謂不取非無所取乃應正取不應越取也符順實際循矩不違是為正取不著生死而顯示有生死是即正取也以上各段與大品般若七喻品平等品相當七喻品説於諸法性空中有六道差別者乃由衆生顛倒而有因果業報然毛髮許非實有即與此經佛意在衆生一段意同平等品要義有四初説諸法平等性為淨歸於實相無相無凡夫所執著相故然據世俗諦説諸佛證得平等性為無上菩提與此經正覺段無有少法是所證意同次説諸法義利但能引發覺道不能資助果圓若不圓滿不得正覺但以無著教化衆生與此經施設義利段意同三説諸佛與平等性無別龍樹釋謂得平等性為佛實不可分此非凡小戲論所及知與此經佛以法為身段意同最後説有為無為法其性平等是為勝義即佛智境界佛於勝義不動不離意而益衆生與此經不住生死涅槃一段意同其六佛行住不染即舉止無不清淨之意此指佛化身之用後得智者而言化佛行動自然毫無染著也又分三層初威儀經云妙生如有説言如來若來若去都無去來故名如來行往坐臥為四威儀如來從如而來從如而去來去與法界合隨衆生所感而顯現雖有其事並無著意故謂之都無去來也妙生若有男子女人故名法想法想次就名色身觀行自在説色身指器世間名身指有情世間佛之舉止自在兩皆無染就器世間言佛於三千大千世界作極微觀而觀極微亦復非實妙生推闡佛意謂有情世間亦同其不實在若以此兩世間為實在則佛應有聚執聚字在餘譯作摶或合乃常人認識上所以構成實體之原因蓋就同類事物取其通相相同之相作為一摶一聚心思分別以為實有遂生實體之執從將大地析為墨塵猶取極微與極微和合之相謂之微聚而生實解事物本身原無實與非實分別是為聚執綜合有情相同之情識執為有情聚亦復如是然此但屬世間假名無實體性愚夫妄執謂為世界謂為聚也聚執有譯作一合相者不甚恰當細作粗為一粗析細即不為一故云一合即不能兼分析與綜合之意妙生如有説云佛説我見云云示無聚執方便謂佛説我見者就外道執我假名我見非有所執如是於一切法皆應作如是知如是見如是解法之無實歸於法想假名分別不但觀法無實乃至觀法想亦復不實而於法想亦無所住然後始能究竟無聚執也妙生若有人以滿無量無數世界應作如是觀最後為説法不染説法所以開示衆生使其領會實相故於此亦應無染著説法通利勝世間施云何通利則在無倒顯示離言自性不增衆生之執是名正説亦即般若所謂不壞法性而説假名也以此佛之説法視衆生之著不著而異不著則説著則不説如聞者著空則不説空而説有有原無可説如聞有而解其不實則不妨説有也不著則順離言法性著則隨名言生執於此了然而後説空説有自在無礙云何正説經文以一切有為法一頌明示其例亦兼以結九分般若之終也頌以九喻顯因緣和合所生一切有為法皆空無實性所舉九事皆就常人習知者為譬使聞者不致隨語起著也是義極關重要餘處亦説有為法種種喻如小乘説色如聚沫受如水泡想如陽焰行如芭蕉識如幻化等大都就無常為言不足以達深義惟此九喻導引解空精闢無比諸家解釋出入略異今以三層分説初就見相識設喻以見一切有為法之自性有為法按實不外認識作用之能知見所知相及知之事識而已星以喻相謂星光微弱暗中閃爍月明則稀白晝全沒衆生世相亦復如是智慧日出則不復見翳以喻見病目空華無中生有我見不實殆亦如之燈以喻識油炬相資燈焰不絶由渴愛潤取相熾然又如油膏垢膩不淨可惡識以煩惱漏故亦染著不淨僅此一層衆生雖知有為不實不淨猶執實有受用事在故次舉三喻以明受用之發生由於取內外及事見其不實幻以喻外器世明假此幻彼變化無端也露以喻內身諸根不住如露見日則唏遇風即殞勢難久住也泡以喻受受假根塵和合而有起滅事過境遷皆不實在如水上泡起滅隨風也雖已明受用之非實但以衆生時間觀念極強或謂現在不實過未當實故最後復舉三喻以見三世之不實夢以喻過去往事成空不堪把捉夢中歷歷但憶念之偶然顯現醒後何所有耶電以喻現在明現在法剎那不住稍縱即逝也雲以喻未來來者無憑如雲變化開合不息且不測也綜合三類而後知有為法之無實體此即順乎法性之正説所以結一經之終地上菩薩求得佛意圓滿應隨佛説作如是觀乃能隨順衆生示其趣向而無所染著亦如佛之隨衆生所感而現著是故菩薩入地即為究竟住也此段勘與方便般若如化品相當般若所説要義有三一不動勝義而教化衆生如化人行化事隨感而應無所用心故無染著即此經言都無去來也乃至佛入涅槃亦復如化欲衆生知佛希有轉向精進也二佛事謂之佛化三乘事為三乘化有情事為惑業化前二是淨後一是染莫非化也化者似有實無與空無異於化不著一切假名分別即謂之空彼經云遠離一切法想為空遠離者假名分別與一切化事原自不符也知法如化即遠離一切假名分別故一切皆空即此經於世界乃至法想亦無所住之義三有問一切法如化尚有不如化者在否佛説凡法與生滅相合者如化又説涅槃非化寧非矛盾佛自解云涅槃非化乃為新學菩薩而言因其僅有信解未證無生法忍若聞涅槃如化修踐無憑易墮空見為學有其次第不能不先有階梯也就道理言涅槃者化法之法性亦不在化法之外得化法之實相空無自性即是涅槃故涅槃如化為佛之正説此頌惟説一切有為法如夢幻等於無為法不提一字即專為新學菩薩説教化法如化化法法性之涅槃亦復如化不言而喻故説有為即概括無為也考什師譯大品如化品改題為涅槃如化品雖未見經文中説然其含義推比而知可謂深得經旨而本經終結於此一頌實為新學菩薩入德之門也此頌在本經為結論而於般若學法為發端淨師在印得通人指授回國譯傳此經復作金剛般若末頌贊逑附刊世親釋後可資參考但須先明大品如化品要義心知其意始能領會也
